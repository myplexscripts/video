<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#09090b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hume">
<meta name="application-name" content="Hume">
<!-- Security hardening: limit referrer leakage and block legacy injection
     vectors. No default-src so script/img/connect stay unrestricted (the app
     talks to arbitrary Plex servers + TMDB), but plugins/base/forms are locked. -->
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'self'; form-action 'self'">
<title>Hume</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<!-- Warm up the connections the app reaches for first: the settings/TMDB
     Worker (hit at boot for sync) and TMDB's image + API CDNs. -->
<link rel="preconnect" href="https://hume-settings.contactdavidbusch.workers.dev" crossorigin>
<link rel="preconnect" href="https://image.tmdb.org" crossorigin>
<link rel="dns-prefetch" href="https://api.themoviedb.org">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Preload the two font weights that render above the fold -->
<link rel="preload" href="assets/fonts/Circular/Circular-Book.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="assets/fonts/Circular/Circular-Bold.ttf" as="font" type="font/ttf" crossorigin>
<!-- Preload HLS.js so the first video play never waits for the CDN -->
<link rel="preload" href="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js" as="script" crossorigin>
<script>
  if("serviceWorker" in navigator){
    addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
    // Re-send the connection info whenever a new SW takes control, so its
    // image-caching strategy always knows local vs remote/relay.
    navigator.serviceWorker.addEventListener("controllerchange",()=>{
      if(window.__swServerMsg && navigator.serviceWorker.controller)
        navigator.serviceWorker.controller.postMessage(window.__swServerMsg);
    });
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<style>
  @font-face{font-family:'Circular';font-weight:400;font-style:normal;font-display:swap;
    src:url('assets/fonts/Circular/Circular-Book.ttf') format('truetype')}
  @font-face{font-family:'Circular';font-weight:500;font-style:normal;font-display:swap;
    src:url('assets/fonts/Circular/Circular-Medium.ttf') format('truetype')}
  @font-face{font-family:'Circular';font-weight:700;font-style:normal;font-display:swap;
    src:url('assets/fonts/Circular/Circular-Bold.ttf') format('truetype')}
  @font-face{font-family:'Circular';font-weight:900;font-style:normal;font-display:swap;
    src:url('assets/fonts/Circular/Circular-Black.ttf') format('truetype')}
  :root{
    --bg:#0a0a0c; --bg2:#131316; --surface:rgba(255,255,255,.06); --surface2:rgba(255,255,255,.09);
    --surface3:rgba(255,255,255,.14); --glass:rgba(20,20,24,.8);
    --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.13);
    --text:#f5f5f7; --dim:#aeaeb6; --faint:#8e8e96;
    --accent:#e8b825; --accent2:#d4a620; --accent-wash:rgba(232,184,37,.14);
    --accent-glass:rgba(232,184,37,.85); --accent-glass-hover:rgba(232,184,37,.95);
    --radius:0px; --radius-sm:0px; --radius-xs:0px; --radius-lg:0px;
    --shadow-sm:0 1px 3px rgba(0,0,0,.3); --shadow:0 4px 24px rgba(0,0,0,.4);
    --shadow-lg:0 12px 48px rgba(0,0,0,.55);
    --font:'Inter','SF Pro Text',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    /* All headings render in this serif; body and UI use --font (Inter) */
    --font-head:'Playfair Display','Georgia','Times New Roman',serif;
    --ease:cubic-bezier(.22,1,.36,1);
    /* Floating menu-toggle/search pills sit at top:max(16px,safe-area) and are
       44px tall — flat pages need at least that much clearance so their first
       row of content doesn't render underneath the pills. */
    --pill-clear:max(76px,calc(env(safe-area-inset-top) + 60px));
    /* Shared horizontal rhythm: every top-level section (hero, rails, grids,
       toolbars, detail/collection heroes) aligns to this edge so content
       lines up into a single column instead of drifting between 36/44px. */
    --edge:72px;
    /* Backdrop images are scaled to the hero's full height and pinned right;
       this mask fades their left side into the blurred echo behind them with
       soft, rounded (vignette-like) edges rather than a hard vertical line. */
    --bg-vignette:radial-gradient(ellipse 86% 95% at 100% 50%,#000 48%,transparent 100%);
    /* ---- FROST ----
       The shared glass recipe for every translucent surface in the app —
       search bar, buttons, controls, nav, the rating panel, menus and
       overlays. The base recipe is a near-transparent dark tint, a wide
       backdrop blur, and a bright 1px rim:
         background: var(--frost-bg); backdrop-filter: blur(var(--frost-blur));
         border: 1px solid var(--frost-border);
       paired with a stack of inset shadows that catch light along the
       top/left edge and a soft outer drop shadow that seats it on the page. */
    --frost-bg:rgba(25,25,25,.1); --frost-bg-hover:rgba(55,55,55,.22);
    --frost-blur:28px; --frost-blur-lg:40px; --frost-sat:1.8;
    --frost-border:rgba(255,255,255,.35);
    /* A thinner, more translucent glass for panels that float directly over
       backdrop art (e.g. the rating panel) - lets the blurred/saturated
       artwork read through as a frosted tint instead of a solid card. */
    --frost-tint:rgba(20,20,24,.4);
    --frost-edge:
      inset 0 0 0 1px rgba(255,255,255,.07),
      inset 1.5px 2px 1px -1.5px rgba(255,255,255,.55),
      inset -1.5px -1.5px 1px -1px rgba(255,255,255,.3),
      inset -3px -8px 2px -7px rgba(255,255,255,.18),
      inset 0 -1px 3px rgba(0,0,0,.3),
      inset -1.5px 2.5px 0 -2px rgba(0,0,0,.35),
      inset 0 3px 5px -3px rgba(0,0,0,.35),
      inset 2px -6px 1px -5px rgba(0,0,0,.18);
    --frost-edge-sm:
      inset 0 0 0 1px rgba(255,255,255,.07),
      inset 1px 1px 1px -1px rgba(255,255,255,.5),
      inset -1px -1px 1px -1px rgba(255,255,255,.25),
      inset 0 -1px 2px rgba(0,0,0,.3),
      inset 0 2px 3px -2px rgba(0,0,0,.3);
    --frost-shadow-sm:var(--frost-edge-sm),0 1px 3px rgba(0,0,0,.3);
    --frost-shadow:var(--frost-edge),0 1px 4px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.32);
    --frost-shadow-lg:var(--frost-edge),0 4px 24px rgba(0,0,0,.4),0 16px 48px rgba(0,0,0,.42);
    /* ====================================================================
       DESIGN SYSTEM — SOURCE OF TRUTH
       All new UI work must reference these tokens. Do not hard-code values
       that exist here; add new steps to the nearest scale instead.
       ==================================================================== */
    /* TYPE SCALE
       label   → 11 px uppercase metadata/kickers   (--t-label)
       sm      → 12 px secondary counts/captions    (--t-sm)
       base    → 13 px body text, button labels     (--t-base)
       body    → 14 px descriptions, list text      (--t-body)
       ui      → 15 px prominent UI labels          (--t-ui)
       section → 21 px rail / grid section headings (--t-section)
       feature → 27 px featured-rail heading        (--t-feature)
       page    → 28 px page-level heading           (--t-page)
       display → clamp(28,3.8vw,48px) detail title  (--t-display)
       hero    → clamp(40,7.5vw,92px) hero / top    (--t-hero) */
    --t-label:11px; --t-sm:12px; --t-base:13px; --t-body:14px; --t-ui:15px;
    --t-section:21px; --t-feature:27px; --t-page:28px;
    --t-display:clamp(28px,3.8vw,48px); --t-hero:clamp(40px,7.5vw,92px);
    /* FONT WEIGHTS */
    --fw-normal:400; --fw-medium:500; --fw-semi:600; --fw-bold:700; --fw-xbold:800; --fw-black:900;
    /* COMPONENT HEIGHTS — every glass chrome element uses one of these */
    --h-nav:44px;   /* search box, menu-toggle, libNav title height alignment */
    --h-tab:38px;   /* secondary tab pills (lib-nav-tab, lib-tab) */
    /* CARD DIMENSIONS
       portrait cards (movies/shows): --card-w wide, 3:2 ratio (height auto)
       wide cards (episodes/extras):  --card-w-wide */
    --card-w:170px; --card-w-wide:280px; --grid-gap:24px; --rail-gap:20px;
    /* FLOATING NAV RULES
       Library page title → pure typography, no glass pill.
         font-size: 19px / weight 800 / letter-spacing -.025em
         text-shadow for legibility over any backdrop
       Tab buttons → glass pill, height var(--h-tab), frost styling.
       Search box / menu-toggle → glass pill, height var(--h-nav).
       All glass elements → backdrop-filter + var(--frost-*) tokens. */
    --nav-title-size:19px;
    --tab-h:56px;    /* height of mobile bottom tab bar (excludes safe-area) */
  }
  *{margin:0;padding:0;box-sizing:border-box}
  /* html background must match --bg so the safe-area inset on iOS (which is
     painted by the html/viewport layer, not body) is app-coloured not black. */
  html,body{height:100%;background:var(--bg)}
  body{color:var(--text);font-family:var(--font);
    -webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;text-size-adjust:100%;overflow:hidden;
    -webkit-touch-callout:none;user-select:none;-webkit-user-select:none}
  input,textarea{user-select:text;-webkit-user-select:text}
  button,input{font-family:inherit;color:inherit}
  button{cursor:pointer}
  /* All headings render serif; body and UI stay Inter (--font) */
  h1,h2,h3,h4{font-family:var(--font-head)}
  img{display:block;-webkit-touch-callout:none;-webkit-user-drag:none;user-drag:none}
  .hidden{display:none !important}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
    clip:rect(0,0,0,0);white-space:nowrap;border:0}
  .skip-link{position:fixed;top:-100px;left:12px;z-index:300;background:var(--accent);color:#141005;
    padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;
    transition:top .15s var(--ease)}
  .skip-link:focus-visible{top:12px}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
  ::-webkit-scrollbar{display:none}
  *{scrollbar-width:none}
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;
      transition-duration:.01ms !important;scroll-behavior:auto !important}
  }

  /* ---- BTN ---- */
  .btn{background:var(--accent-glass);backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));
    color:#141005;border:1px solid rgba(255,255,255,.3);padding:12px 24px;border-radius:0;
    font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:8px;
    box-shadow:var(--frost-edge-sm),0 4px 20px rgba(232,184,37,.25);
    transition:filter .15s var(--ease),background-color .15s var(--ease);letter-spacing:-.01em;touch-action:manipulation}
  .btn:hover{filter:brightness(1.08)}
  .btn:active{filter:brightness(.94)}
  .btn.glass{background:var(--frost-bg);backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));
    color:var(--text);border:1px solid var(--frost-border);box-shadow:var(--frost-shadow-sm)}
  .btn.glass:hover{background:var(--frost-bg-hover)}
  .btn i,.btn .svgi{font-size:17px;width:17px;height:17px}
  .btn.lg{padding:14px 30px;font-size:15px}
  .btn.sm{padding:8px 16px;font-size:13px}
  .btn.icon{width:48px;height:48px;padding:0;justify-content:center;border-radius:50%;font-size:19px}
  .btn.icon.active{background:var(--accent-glass);color:#141005;border-color:rgba(255,255,255,.3);box-shadow:var(--frost-edge-sm),0 4px 20px rgba(232,184,37,.25)}
  .btn.icon.active:hover{background:var(--accent-glass-hover)}

  /* ---- LOGIN ---- */
  #login{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:28px;text-align:center;padding:24px;z-index:1;
    background:radial-gradient(ellipse 900px 450px at 50% 30%, var(--accent-wash),transparent),var(--bg)}
  .logo-lockup{display:flex;align-items:center;gap:14px}
  .logo-lockup i,.logo-lockup .svgi{font-size:48px;width:48px;height:48px;color:var(--accent)}
  .logo-lockup h1{font-size:44px;font-weight:800;letter-spacing:-.03em}
  #login p{color:var(--dim);max-width:400px;line-height:1.6;font-size:14px}

  /* ---- SERVERS ---- */
  #servers{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;padding:24px;z-index:1}
  #servers h1{margin-bottom:6px;font-size:24px;font-weight:700;letter-spacing:-.02em}
  .server-card{background:var(--glass);backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));border:1px solid var(--frost-border);
    border-radius:var(--radius);padding:18px 22px;min-width:340px;display:flex;
    justify-content:space-between;align-items:center;gap:18px;box-shadow:var(--frost-shadow)}
  .server-card .sn{font-weight:600;font-size:15px}
  .server-card .meta{font-size:12px;color:var(--dim);margin-top:4px;display:flex;align-items:center;gap:8px}
  .badge{font-size:10px;text-transform:uppercase;letter-spacing:.8px;padding:3px 8px;border-radius:0;
    background:rgba(110,231,160,.12);color:#6ee7a0;font-weight:600}
  .badge.remote{background:var(--accent-wash);color:var(--accent)}
  .badge.relay{background:rgba(255,100,100,.1);color:#ff9090}

  /* ---- ULTRABLUR UNDERLAY ----
     Single fixed, blurred color wash derived from the current page's artwork.
     Used on detail-style pages (movie/show/season/collection/playlist) and the
     player. Grid/list pages leave it hidden to keep things calm and legible. */
  #ultraBlur{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .ub-layer{position:absolute;inset:-20%;background-size:cover;background-position:center;
    opacity:0;transition:opacity 1.2s var(--ease);filter:blur(110px) saturate(1.9) brightness(1.05)}
  .ub-layer.show{opacity:.65}
  .ub-scrim{position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(10,10,12,.35) 0%,rgba(10,10,12,.6) 50%,rgba(10,10,12,.78) 100%)}

  /* ---- APP SHELL ---- */
  #app{display:none;height:100%;position:relative;z-index:1}
  .shell{--nav-w:240px;display:grid;grid-template-columns:var(--nav-w) 1fr;height:100%;
    transition:grid-template-columns .22s var(--ease)}
  .shell.nav-collapsed{--nav-w:74px}
  .sidebar{background:rgba(15,15,19,.6);backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    -webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    display:flex;flex-direction:column;overflow-y:auto;z-index:20}
  .brand{display:flex;align-items:center;gap:10px;padding:22px 20px 20px}
  .brand i,.brand .svgi{font-size:24px;width:24px;height:24px;color:var(--accent)}
  .brand b{font-size:18px;font-weight:800;letter-spacing:-.02em}
  .brand .ver{font-size:10px;color:var(--faint);margin-left:4px}
  .nav{display:flex;flex-direction:column;padding:4px 10px;gap:2px}
  .nav-label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--faint);
    padding:18px 12px 6px;font-weight:700}
  .nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--radius-xs);
    color:var(--dim);background:transparent;border:none;text-align:left;font-size:14px;font-weight:500;
    width:100%;transition:background-color .15s var(--ease),color .15s var(--ease);
    position:relative;min-height:40px}
  .nav-item i{font-size:18px;width:20px;text-align:center}
  .nav-item .svgi{width:20px;height:18px}
  .nav-item:hover{background:rgba(255,255,255,.07);color:var(--text)}
  .nav-item.active{background:rgba(255,255,255,.12);color:var(--text)}
  .nav-item.active i{color:var(--accent)}
  .nav-item.active .svgi{color:var(--accent)}
  .nav-item.active::before{content:"";position:absolute;left:-10px;top:50%;transform:translateY(-50%);
    width:3px;height:18px;background:var(--accent)}
  .sidebar-foot{margin-top:auto;padding:10px;border-top:1px solid var(--line)}
  .nav-text{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .nav-collapse-btn .svgi{transition:transform .22s var(--ease)}
  /* ---- COLLAPSED SIDEBAR (desktop only): icons-only rail, persisted per-user.
     Guarded to >680px so the mobile off-canvas drawer always keeps its labels. */
  @media(min-width:681px){
    .nav-collapsed .nav-text,
    .nav-collapsed .brand b,
    .nav-collapsed .brand .ver{display:none}
    .nav-collapsed .brand{justify-content:center;padding-left:0;padding-right:0;gap:0}
    .nav-collapsed .nav{padding-left:8px;padding-right:8px}
    .nav-collapsed .nav-item{justify-content:center;padding-left:0;padding-right:0;gap:0}
    .nav-collapsed .sidebar-foot{padding-left:8px;padding-right:8px}
    /* Section labels ("Libraries", "More") collapse to a thin divider rule */
    .nav-collapsed .nav-label{font-size:0;padding:10px 12px;letter-spacing:0}
    .nav-collapsed .nav-label::after{content:"";display:block;height:1px;background:var(--line)}
    .nav-collapsed .nav-collapse-btn .svgi{transform:rotate(180deg)}
  }

  .main{overflow-y:auto;position:relative;scroll-behavior:smooth}
  .content{padding:0 0 max(80px,env(safe-area-inset-bottom));position:relative}
  #content > .rail-section:first-child,#content > .rail-head:first-child,
  #content > .grid-view:first-child,#content > .empty:first-child,
  #content > .loading:first-child,#content > .err:first-child,
  #content > .lib-tabs:first-child,#content > .search-head:first-child,
  #content > .lib-wrap:first-child,#content > .grid-view.lib-page:first-child,
  #content > .page-head:first-child{margin-top:var(--pill-clear)}

  /* ---- FLOATING GLASS BAR ----
     No header bar: a single floating "Liquid Glass" search pill hovers over
     the page (and, on mobile, a matching nav toggle). Both stay fixed in
     place while content and color scroll beneath them. */
  .menu-toggle{display:none;position:fixed;top:max(16px,env(safe-area-inset-top));
    left:max(16px,env(safe-area-inset-left));z-index:15;background:var(--frost-bg);
    backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    border:1px solid var(--frost-border);width:44px;height:44px;border-radius:50%;
    align-items:center;justify-content:center;font-size:18px;color:var(--text);
    box-shadow:var(--frost-shadow);
    transition:background-color .15s,box-shadow .15s}
  .menu-toggle:hover{background:var(--frost-bg-hover)}
  .searchbox{position:fixed;top:max(16px,env(safe-area-inset-top));
    right:max(24px,env(safe-area-inset-right));z-index:15;display:flex;align-items:center;gap:8px;
    background:var(--frost-bg);backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    border:1px solid var(--frost-border);border-radius:0;height:44px;padding:0 14px;width:44px;
    cursor:pointer;overflow:hidden;box-shadow:var(--frost-shadow);
    transition:width .38s var(--ease),background-color .15s,box-shadow .15s}
  .searchbox:focus-within{width:260px;cursor:default;background:var(--frost-bg-hover);box-shadow:var(--frost-shadow-lg)}
  .searchbox i,.searchbox .svgi{color:var(--faint);font-size:16px;width:16px;height:16px;flex:0 0 auto}
  .searchbox input{background:none;border:none;color:var(--text);font-size:13px;width:0;opacity:0;
    pointer-events:none;outline:none;font-family:var(--font);
    transition:width .38s var(--ease),opacity .25s}
  .searchbox:focus-within input{width:100%;opacity:1;pointer-events:auto}
  .searchbox input::placeholder{color:var(--faint);opacity:1}
  .searchbox:not(:focus-within) .svgi,
  .searchbox:not(:focus-within) input{color:#fff;mix-blend-mode:difference}
  .searchbox:not(:focus-within) input::placeholder{color:#fff;opacity:1}

  /* ---- HERO ---- */
  /* ---- HERO — editorial full-bleed ---- */
  .hero{position:relative;overflow:hidden;cursor:pointer;
    aspect-ratio:16/9;max-height:92vh;min-height:460px;
    display:flex;flex-direction:column;justify-content:flex-end}
  .hero-bg{position:absolute;inset:0;overflow:hidden}
  .hero-bg-blur{position:absolute;inset:-15%;background-size:cover;background-position:center;
    filter:blur(100px) saturate(1.9) brightness(1.05)}
  /* Full-bleed cover — image fills the entire hero frame */
  .hero-bg-img,.hero-video{position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;object-position:center 20%;
    opacity:0;transition:opacity .6s var(--ease)}
  .hero-bg-img.loaded,.hero-video.show{opacity:1}
  /* Cinematic bottom scrim — heavy at the foot for type legibility */
  .hero-scrim{position:absolute;inset:0;
    background:linear-gradient(to top,rgba(10,10,12,1) 0%,rgba(10,10,12,.82) 14%,rgba(10,10,12,.45) 38%,rgba(10,10,12,.1) 68%,transparent 88%)}
  .hero-top,.hero-bottom{position:relative;z-index:2;max-width:none}
  .hero-top{padding:0 var(--edge) 0}
  .hero-bottom{padding:16px var(--edge) 48px}
  .hero-kicker{display:inline-flex;align-items:center;gap:7px;font-size:11px;letter-spacing:1px;
    text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:18px}
  .hero-kicker i,.hero-kicker .svgi{font-size:16px}
  /* Editorial title — larger, tighter tracking, cinematic depth shadow */
  .hero h2{font-size:clamp(40px,8vw,110px);font-weight:900;letter-spacing:-.05em;line-height:.9;
    text-shadow:0 2px 40px rgba(0,0,0,.45),0 4px 80px rgba(0,0,0,.35)}
  /* Tagline: uppercase kicker beneath title */
  .hero-tagline{font-size:clamp(10px,1.1vw,13px);letter-spacing:.16em;text-transform:uppercase;
    color:rgba(255,255,255,.5);margin-top:14px;font-weight:500}
  .hero-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;color:var(--dim);font-size:13px;
    margin:18px 0 14px;font-weight:500}
  .hero-meta .sep{width:4px;height:4px;border-radius:50%;background:var(--faint)}
  .pill{display:inline-flex;align-items:center;gap:5px;background:var(--frost-bg);backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));
    -webkit-backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));border:1px solid var(--frost-border);border-radius:0;padding:4px 10px;
    font-size:12px;font-weight:600;box-shadow:var(--frost-shadow-sm)}
  .svgi{display:inline-block;width:1em;height:1em;flex:0 0 auto;background-color:currentColor;
    -webkit-mask:var(--i) center/contain no-repeat;mask:var(--i) center/contain no-repeat}
  .svgi.flip{transform:scaleX(-1)}
  .hero-summary{color:var(--dim);line-height:1.6;font-size:14px;max-width:560px;margin-bottom:24px;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .hero-actions{display:flex;gap:12px;flex-wrap:wrap}
  .hero-trailer-ctrls{position:absolute;right:var(--edge);bottom:24px;z-index:3;display:flex;gap:8px;
    opacity:0;transition:opacity .4s var(--ease)}
  .hero-trailer-ctrls.show{opacity:1}
  .hero-trailer-ctrls .pbtn{width:40px;height:40px;font-size:17px;border-radius:0}
  .title-logo{display:block;max-width:min(80%,680px);max-height:160px;width:auto;height:auto;
    object-fit:contain;object-position:left bottom;margin-bottom:2px;
    filter:drop-shadow(0 0 22px var(--img-glow,transparent))}
  /* Adaptive legibility veil for bright backdrops */
  .hero-scrim::after,.detail-scrim::after{content:"";position:absolute;inset:0;opacity:0;pointer-events:none;
    transition:opacity .45s var(--ease);
    background:linear-gradient(to top,rgba(6,6,8,.65) 0%,transparent 44%),
    linear-gradient(102deg,rgba(6,6,8,.6) 0%,transparent 58%)}
  .bright-bg .hero-scrim::after,.bright-bg .detail-scrim::after{opacity:1}
  .bright-bg .hero-top h2,.bright-bg .detail-top h2,.bright-bg .detail-info h2{
    text-shadow:0 2px 18px rgba(0,0,0,.85),0 1px 4px rgba(0,0,0,.72)}

  /* ---- SECTION / RAIL ----
     Each rail can carry its own ambient color wash (.rail-ambient), a
     blurred, saturated smear of its first item's art sitting behind the
     header — a per-row echo of the page-level UltraBlur underlay. */
  .rail-section{position:relative;padding:24px 0 0;overflow:hidden}
  .rail-ph{min-height:240px}
  /* ---- HUB GRID STYLE (2-column Spotify-style shelf) ---- */
  .hub-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:4px var(--edge) 16px}
  .hub-grid-item{display:flex;align-items:center;background:var(--surface2);border-radius:var(--radius-sm);
    overflow:hidden;border:none;cursor:pointer;text-align:left;color:inherit;font-family:var(--font);
    width:100%;transition:background-color .15s var(--ease)}
  .hub-grid-item:hover,.hub-grid-item:focus-visible{background:var(--surface3)}
  .hub-grid-thumb{width:72px;height:72px;flex:0 0 72px;object-fit:cover}
  .hub-grid-art{width:72px;height:72px;flex:0 0 72px;overflow:hidden}
  .hub-grid-title{font-size:13px;font-weight:700;padding:0 12px;line-height:1.35;
    overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  /* Per-rail ambient color washes removed — shelves/hubs use the flat dark bg */
  .rail-ambient{display:none}
  .rail-head{display:flex;align-items:flex-end;gap:12px;margin:0 var(--edge) 16px;position:relative}
  .rail-head-text{display:flex;flex-direction:column;gap:5px;min-width:0}
  .rail-lib{font-size:var(--t-label);text-transform:uppercase;letter-spacing:1.4px;color:var(--faint);font-weight:var(--fw-bold)}
  .rail-head h3{font-size:var(--t-section);font-weight:var(--fw-xbold);letter-spacing:-.02em}
  .featured .rail-head h3{font-size:var(--t-feature)}
  .rail-head .count{font-size:12px;color:var(--faint);font-weight:500;padding-bottom:3px}
  .rail-summary{color:var(--dim);font-size:13px;line-height:1.55;margin:-8px var(--edge) 12px;
    max-width:680px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  /* ---- HUB CAROUSEL STYLE ----
     A rotating hero banner for a single hub: shows one item at a time using
     the SAME layout as the home hero (logo top-left, ratings + metadata,
     summary, actions at the bottom). Auto-advances every 5s, pauses on
     hover/touch. Each slide reuses the .hero-* content classes; .hub-cs-slide
     carries the stacking/positioning for the wipe transition. */
  .hub-carousel-section{padding:0;overflow:visible}
  .hub-carousel{position:relative;aspect-ratio:16/9;max-height:92vh;min-height:480px;overflow:hidden;touch-action:pan-y}
  .hub-cs-slide{position:absolute;inset:0;transform:translateX(0);pointer-events:none;visibility:hidden;
    will-change:transform;display:flex;flex-direction:column;justify-content:flex-end;
    padding:0 var(--edge) 48px}
  .hub-cs-slide.active{visibility:visible;z-index:1;pointer-events:auto}
  /* Carousel slides: same full-bleed editorial treatment as standalone .hero */
  .hub-carousel .hero-bg-img{position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;object-position:center 20%}
  .hub-carousel .hero-bg-blur{-webkit-mask-image:none;mask-image:none}
  .hub-carousel .hero-scrim{background:linear-gradient(to top,rgba(10,10,12,1) 0%,rgba(10,10,12,.82) 14%,rgba(10,10,12,.45) 38%,rgba(10,10,12,.1) 68%,transparent 88%)}
  .hub-carousel .hero-top,.hub-carousel .hero-bottom{position:relative;z-index:2;padding:0;max-width:none;text-align:left}
  .hub-carousel .hero-meta{justify-content:flex-start}
  .hub-carousel .hero-actions{justify-content:flex-start}
  /* Slides aren't .hero elements — style title + summary directly */
  .hub-carousel .hero-top h2{font-size:clamp(28px,5vw,72px);font-weight:900;letter-spacing:-.05em;line-height:.9;
    text-shadow:0 2px 40px rgba(0,0,0,.45)}
  .hub-carousel .hero-top .hero-summary{color:var(--dim);line-height:1.6;font-size:14px;max-width:560px;text-align:left;margin:0 0 22px;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .hub-carousel .title-logo{display:block;height:auto;width:auto;max-width:min(72%,540px);max-height:120px;
    object-fit:contain;object-position:left bottom;margin:0 0 8px}
  /* Progress dots */
  .hub-carousel-dots{position:absolute;bottom:26px;right:var(--edge);display:flex;gap:6px;z-index:3}
  /* CW episode thumbnail shown in carousel slides on desktop */
  .cw-ep-thumb{display:none}
  @media(min-width:681px){
    .cw-ep-thumb{display:block;width:100%;max-width:360px;aspect-ratio:16/9;
      border-radius:0;object-fit:cover;margin-bottom:16px;
      box-shadow:var(--shadow-lg)}
  }
  .hub-cd{width:6px;height:6px;background:rgba(255,255,255,.3);
    border:none;cursor:pointer;padding:0;flex:0 0 auto;
    transition:background .2s,width .2s}
  .hub-cd.active{background:#fff;width:18px}
  /* Prev/next arrows (appear on hover) */
  .hub-ca{position:absolute;top:50%;transform:translateY(-50%);z-index:3;
    width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.4);
    border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:var(--text);opacity:0;transition:opacity .2s var(--ease)}
  .hub-carousel:hover .hub-ca{opacity:1}
  .hub-ca.prev{left:14px}.hub-ca.next{right:14px}
  .hub-ca .svgi{width:14px;height:14px}
  /* ── CW filmstrip (desktop only) ── */
  .cw-filmstrip{display:none}
  @media(min-width:681px){
    .cw-carousel .hub-cs-slide{padding-bottom:152px}
    .cw-carousel .hub-carousel-dots{display:none}
    .cw-carousel .cw-ep-thumb{display:none}
    .cw-filmstrip{position:absolute;bottom:22px;left:var(--edge);right:var(--edge);
      display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;z-index:4}
    .cw-filmstrip::-webkit-scrollbar{display:none}
    .cw-fs-card{flex:0 0 172px;position:relative;border-radius:0;overflow:hidden;
      cursor:pointer;opacity:.52;border:2px solid transparent;background:none;padding:0;
      transition:opacity .2s var(--ease),border-color .2s var(--ease)}
    .cw-fs-card.active{opacity:1;border-color:rgba(255,255,255,.78)}
    .cw-fs-card:not(.active):hover{opacity:.82}
    .cw-fs-card img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
    .cw-fs-prog{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.2)}
    .cw-fs-prog i{display:block;height:100%;background:var(--accent)}
    .cw-fs-label{position:absolute;inset:0;display:flex;align-items:flex-end;
      padding:4px 7px 8px;font-size:11px;font-weight:600;line-height:1.3;color:#fff;
      background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 55%);
      overflow:hidden;white-space:nowrap;text-overflow:ellipsis;pointer-events:none}
  }
  .rail-head.with-avatar{align-items:center}
  .rail-head-avatar{width:48px;height:48px;border-radius:50%;overflow:hidden;flex:0 0 auto;
    box-shadow:0 0 0 2px var(--bg),0 0 0 3px var(--frost-border),var(--frost-shadow-sm)}
  .rail-head-avatar img{width:100%;height:100%;object-fit:cover;display:block}
  .see-all{margin-left:auto;display:inline-flex;align-items:center;gap:4px;font-size:13px;
    font-weight:600;color:var(--dim);background:none;border:none;cursor:pointer;
    padding-bottom:3px;font-family:var(--font);transition:color .15s var(--ease)}
  .see-all:hover{color:var(--text)}
  .see-all i,.see-all .svgi{font-size:14px;width:14px;height:14px;transition:transform .15s var(--ease)}
  .see-all:hover i,.see-all:hover .svgi{transform:translateX(2px)}
  .carousel{display:flex;gap:20px;overflow-x:auto;padding:4px var(--edge) 16px;scroll-snap-type:x mandatory;
    scroll-padding-inline:var(--edge);-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain}
  .carousel::-webkit-scrollbar{height:0}
  /* ---- RAIL ARROWS ----
     Mouse/keyboard affordance for scrolling a rail (touch already swipes).
     Shown only when the rail overflows; the edge arrow hides at each end. */
  .rail-viewport{position:relative}
  .rail-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:4;
    width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:rgba(20,20,24,.7);backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));
    -webkit-backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));
    border:1px solid var(--frost-border);box-shadow:var(--frost-shadow);color:var(--text);
    cursor:pointer;opacity:0;pointer-events:none;transition:opacity .18s var(--ease),background-color .15s,transform .1s var(--ease)}
  .rail-arrow.prev{left:6px}
  .rail-arrow.next{right:6px}
  .rail-arrow .svgi{width:20px;height:20px}
  .rail-arrow:hover{background:rgba(40,40,46,.85)}
  .rail-arrow:active{transform:translateY(-50%) scale(.92)}
  .rail-arrow.edge{display:none}
  .rail-viewport.has-overflow:hover .rail-arrow:not(.edge),
  .rail-viewport.has-overflow:focus-within .rail-arrow:not(.edge){opacity:1;pointer-events:auto}
  @media (hover:none){ .rail-viewport.has-overflow .rail-arrow:not(.edge){opacity:1;pointer-events:auto} }
  .grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:24px;
    padding:4px var(--edge) 16px}

  /* ---- LIBRARY TABS ----
     Plex-style "Recommended" / "Library" switcher shown at the top of
     every library page. */
  .lib-tabs{display:flex;gap:8px;margin:0 var(--edge) 24px}
  .lib-tab{background:var(--frost-bg);backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));
    -webkit-backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));border:1px solid var(--frost-border);
    border-radius:0;height:38px;padding:0 20px;color:var(--dim);font-size:13px;
    font-weight:600;font-family:var(--font);cursor:pointer;box-shadow:var(--frost-shadow-sm);
    transition:background-color .15s,color .15s,border-color .15s}
  .lib-tab:hover{background:var(--frost-bg-hover);color:var(--text)}
  .lib-tab.active{background:var(--accent-glass);color:#141005;border-color:rgba(255,255,255,.3);box-shadow:var(--frost-edge-sm),0 4px 20px rgba(232,184,37,.25)}
  .lib-tab.active:hover{background:var(--accent-glass-hover)}
  #libNav{display:none;position:fixed;top:max(16px,env(safe-area-inset-top));left:calc(var(--nav-w,240px) + 16px);z-index:25;align-items:center;gap:8px;flex-wrap:nowrap;transition:left .22s var(--ease)}
  #libNav.visible{display:flex}
  /* Library title: pure typography — not a glass pill. Glass is for actions;
     a section label is identity text and should read as a heading. */
  #libNavName{font-size:var(--nav-title-size);font-weight:var(--fw-xbold);letter-spacing:-.025em;
    color:var(--text);white-space:nowrap;align-self:center;padding-right:6px;
    text-shadow:0 1px 10px rgba(0,0,0,.75),0 0 30px rgba(0,0,0,.5)}
  .lib-nav-tabs{display:flex;gap:6px}
  .lib-nav-tab{background:var(--frost-bg);backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));border:1px solid var(--frost-border);border-radius:0;height:38px;padding:0 16px;color:var(--dim);font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;box-shadow:var(--frost-shadow-sm);transition:background-color .15s,color .15s,border-color .15s;white-space:nowrap}
  .lib-nav-tab:hover{background:var(--frost-bg-hover);color:var(--text)}
  .lib-nav-tab.active{background:var(--accent-glass);color:#141005;border-color:rgba(255,255,255,.3);box-shadow:var(--frost-edge-sm),0 4px 20px rgba(232,184,37,.25)}
  .lib-nav-tab.active:hover{background:var(--accent-glass-hover)}
  /* Adaptive text inside frost pills — same difference-blend trick as the search box */
  .frost-text{color:#fff;mix-blend-mode:difference;display:inline-block}
  .lib-nav-tab.active .frost-text{color:#141005;mix-blend-mode:normal}
  .lib-filter-note{font-size:12px;color:var(--faint);padding:0 var(--edge) 12px;margin-top:calc(var(--pill-clear) + 8px)}

  /* ---- LIBRARY TOOLBAR ----
     A "Liquid Glass" control strip for the library grid: live, client-side
     sort / watch-state filter / genre filter — no round-trip, no reload. */
  .lib-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 var(--edge) 6px}
  .lib-toolbar .lib-title{font-size:var(--t-section);font-weight:var(--fw-xbold);letter-spacing:-.02em}
  .lib-toolbar .lib-count{font-size:12px;color:var(--faint);font-weight:500}
  .lib-toolbar .spacer{flex:1 1 auto}

  /* ---- PAGE HEADER ----
     Generic top-of-page heading used by library, playlists and "See All"
     pages so it's always clear what the user is looking at. */
  .page-head{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;margin:0 var(--edge) 18px}
  .page-head-text{display:flex;flex-direction:column;gap:5px;min-width:0}
  .page-head h2{font-size:var(--t-page);font-weight:var(--fw-black);letter-spacing:-.03em}
  .page-head .count{font-size:13px;color:var(--faint);font-weight:500;padding-bottom:3px}

  /* ---- SEARCH RESULTS HEADER ---- */
  .search-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin:0 var(--edge) 8px}
  .search-head h2{font-size:var(--t-page);font-weight:var(--fw-black);letter-spacing:-.03em}
  .search-head .count{font-size:13px;color:var(--faint);font-weight:500}
  .lib-ctrl-wrap{position:relative}
  .lib-ctrl{display:inline-flex;align-items:center;gap:8px;background:var(--frost-bg);
    backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));
    border:1px solid var(--frost-border);border-radius:0;height:38px;padding:0 14px;color:var(--text);
    font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);
    box-shadow:var(--frost-shadow-sm);transition:background-color .15s,border-color .15s}
  .lib-ctrl:hover{background:var(--frost-bg-hover)}
  .lib-ctrl i.lead,.lib-ctrl .svgi.lead{font-size:15px;width:15px;height:15px;color:var(--faint)}
  .lib-ctrl .cap{color:var(--faint);font-weight:500}
  .lib-ctrl i.caret,.lib-ctrl .svgi.caret{font-size:12px;width:12px;height:12px;color:var(--faint);transition:transform .15s var(--ease)}
  .lib-ctrl-wrap.open .lib-ctrl{background:var(--frost-bg-hover);border-color:var(--accent)}
  .lib-ctrl-wrap.open .lib-ctrl i.caret,.lib-ctrl-wrap.open .lib-ctrl .svgi.caret{transform:rotate(180deg)}
  .lib-menu{position:absolute;top:46px;right:0;z-index:14;min-width:210px;max-height:min(60vh,420px);
    overflow-y:auto;background:var(--glass);backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    -webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));border:1px solid var(--frost-border);
    border-radius:var(--radius);box-shadow:var(--frost-shadow-lg);padding:6px;display:none}
  .lib-ctrl-wrap.open .lib-menu{display:block}
  .lib-menu button{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;
    border:none;color:var(--text);padding:10px 12px;font-size:13px;font-weight:500;border-radius:0;
    cursor:pointer;transition:background-color .1s;min-height:40px;font-family:var(--font)}
  .lib-menu button:hover{background:var(--surface2)}
  .lib-menu button.active{color:var(--accent)}
  .lib-menu button i.ck,.lib-menu button .svgi.ck{font-size:15px;height:15px;color:var(--accent);opacity:0;width:16px;flex:0 0 auto}
  .lib-menu button.active i.ck,.lib-menu button.active .svgi.ck{opacity:1}
  .lib-menu button .ml{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ---- CARD ----
     Hover feedback is a single, gentle elevation cue (shadow) plus a soft
     play affordance — no movement, scaling, or stacked effects. */
  .card{scroll-snap-align:start;cursor:pointer;border:none;background:none;text-align:left;
    flex:0 0 auto;color:inherit;outline:none;border-radius:var(--radius-sm);touch-action:manipulation}
  .carousel .card{width:180px}
  .carousel .card.wide{width:262px}
  /* Gold focus ring lives on .art, not the card button, so it follows the visible image edge. */
  .card:focus-visible .art{
    box-shadow:0 0 0 2.5px var(--accent),0 0 0 6px rgba(232,184,37,.18),0 16px 48px rgba(232,184,37,.2) !important;
    outline:none}
  .art{position:relative;border-radius:0;overflow:hidden;background:var(--bg2);
    box-shadow:var(--shadow-sm);transition:box-shadow .2s var(--ease);aspect-ratio:2/3}
  .card.wide .art{aspect-ratio:16/9}
  .card.square .art{aspect-ratio:1/1}
  .card:hover .art{box-shadow:var(--shadow)}
  .art img:not(.bill-logo){width:100%;height:100%;object-fit:cover;display:block}
  .art .art-fallback{display:none;position:absolute;inset:0;align-items:center;justify-content:center;
    font-size:40px;color:var(--faint)}
  .art.broken img{display:none}
  .art.broken .art-fallback{display:flex}
  .art .play-hover{position:absolute;inset:0;background:rgba(0,0,0,.25);
    display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s var(--ease)}
  .card:hover .art .play-hover,.card:focus-visible .art .play-hover{opacity:1}
  .play-hover i,.play-hover .svgi{width:64px;height:64px;font-size:64px;color:#fff;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4))}
  .card.wide .play-hover .svgi{width:56px;height:56px;font-size:56px}
  .art .watch-prog{position:absolute;left:6px;right:6px;bottom:6px;height:4px;background:rgba(0,0,0,.5);
    overflow:hidden}
  .art .watch-prog > i{display:block;height:100%;background:var(--accent)}
  .art.ep-blur img{filter:blur(20px) brightness(.6);transform:scale(1.1)}
  .art .unwatched-dot{position:absolute;top:8px;right:8px;width:11px;height:11px;border-radius:50%;
    background:var(--accent);box-shadow:0 0 0 2px rgba(0,0,0,.45)}
  .art .watched-check{position:absolute;top:7px;right:7px;font-size:17px;line-height:1;
    color:var(--accent);filter:drop-shadow(0 1px 3px rgba(0,0,0,.7));pointer-events:none}
  .art .unwatched-badge{position:absolute;top:8px;right:8px;min-width:22px;height:22px;padding:0 6px;
    background:var(--accent);color:#141005;font-size:12px;font-weight:800;
    display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 2px rgba(0,0,0,.45)}

  /* The card for the episode whose page you're on gets an accent ring + a
     "Now viewing" tag so the current item reads as current in its own rail. */
  .card.current .art{outline:2.5px solid var(--accent);outline-offset:2px}
  .card.current .ct{color:var(--accent)}
  .art .now-badge{position:absolute;left:8px;top:8px;z-index:3;display:inline-flex;align-items:center;gap:5px;
    background:var(--accent);color:#141005;font-size:10px;font-weight:800;text-transform:uppercase;
    letter-spacing:.4px;padding:4px 9px;box-shadow:0 2px 12px rgba(0,0,0,.45)}
  .art .now-badge i,.art .now-badge .svgi{font-size:11px;width:11px;height:11px}

  /* Spotify-style mosaic cover for playlists/collections with no art of
     their own — built from the first few items' thumbnails. */
  .art .art-mosaic,.coll-art .art-mosaic{position:absolute;inset:0;display:grid;
    grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1px;background:var(--bg2)}
  .art-mosaic img{width:100%;height:100%;object-fit:cover;display:block}
  .art-mosaic.n1{grid-template-columns:1fr;grid-template-rows:1fr}
  .art-mosaic.n2{grid-template-rows:1fr}
  .art-mosaic.n3 img:first-child{grid-row:1/3}

  .card .ct{font-size:13.5px;margin-top:10px;line-height:1.3;font-weight:600;letter-spacing:-.01em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card .cs{font-size:12px;color:var(--dim);margin-top:3px;font-weight:500;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* Featured (first rail): bigger cards */
  .featured .carousel .card{width:260px}
  .featured .carousel .card.wide{width:344px}
  .featured .art img{aspect-ratio:2/3}
  .featured .art img.wide{aspect-ratio:16/9}

  /* ---- BILLBOARD CARD ----
     Secondary showcase card: square art + centered logo + blurred-art
     metadata panel beneath. Rules: only in billboard rails. */
  .carousel .card.billboard{width:var(--card-w-wide);display:flex;flex-direction:column;
    position:relative;overflow:hidden;border-radius:var(--radius);isolation:isolate;
    background:var(--bg2);transform:translateZ(0);clip-path:inset(0)}
  /* Shared blurred-art wash behind the whole card: the art's bottom dissolves
     into it and the meta strip rides on it, so there's no hard seam between them. */
  .card.billboard::before{content:'';position:absolute;inset:0;z-index:0;
    background:var(--bill-bg,var(--bg2)) center/cover no-repeat;
    filter:blur(30px) saturate(1.7) brightness(.32)}
  /* Art: square, rounded only at top; transparent bg + above the wash */
  .card.billboard .art{aspect-ratio:1/1;border-radius:0;flex:0 0 auto;
    z-index:1;background:transparent}
  /* Scrim for logo legibility; faded out at the very bottom with the image */
  .card.billboard .art::after{content:'';position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(to top,rgba(0,0,0,.7) 0%,rgba(0,0,0,.25) 28%,transparent 52%)}
  /* Logo wrapper: fixed height = 1/3 of card; object-fit:contain scales logo proportionally */
  .bill-logo-wrap{position:absolute;bottom:14px;left:14px;right:14px;height:93px;z-index:2;
    display:flex;justify-content:center;align-items:flex-end}
  .bill-logo{display:block;width:100%;height:100%;object-fit:contain;object-position:center bottom}
  @media(max-width:680px){.bill-logo-wrap{height:73px}}
  /* Trending rank badge */
  .bill-rank{position:absolute;top:10px;left:12px;z-index:3;font-size:clamp(28px,8vw,40px);
    font-weight:900;color:#fff;line-height:1;
    text-shadow:0 2px 12px rgba(0,0,0,.9),0 0 32px rgba(0,0,0,.7),1px 1px 0 rgba(0,0,0,.5)}
  /* Text fallback when no clearLogo is available */
  .bill-title{font-size:22px;font-weight:var(--fw-black);letter-spacing:-.03em;line-height:1.05;
    color:#fff;text-shadow:0 1px 10px rgba(0,0,0,.7);text-align:center;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  /* Metadata strip: rides the shared wash — no own blur, just a readability tint */
  .bill-meta{position:relative;z-index:1;flex:0 0 auto;
    padding:6px 12px 13px;text-align:center;overflow:hidden}
  .bill-meta::before{content:'';position:absolute;inset:-24px;z-index:-1;
    background:var(--bill-bg,var(--bg2)) center/cover no-repeat;
    filter:blur(48px) saturate(1.8) brightness(.52)}
  .bill-meta .cs{position:relative;z-index:1;font-size:var(--t-sm);font-weight:500;
    color:rgba(255,255,255,.82);white-space:normal;line-height:1.4;margin-top:0}
  /* Suppress legacy card text rows — all metadata lives in .bill-meta */
  .card.billboard .ct,.card.billboard > .cs,.bill-desc{display:none}
  @media(max-width:680px){.carousel .card.billboard{width:220px}}

  /* ---- EDITORIAL SECTION — magazine-style featured items ----
     Each card: square 1:1 art on the left, large overlapping title straddling
     the image/background boundary, right-aligned meta below. */
  .editorial-section{padding:0 0 48px;border-top:2px solid var(--text)}
  .editorial-head{display:flex;align-items:baseline;justify-content:space-between;
    gap:12px;padding:18px var(--edge) 20px}
  .editorial-head h2{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:var(--faint)}
  .editorial-head .count{font-size:11px;color:var(--faint);font-weight:500;letter-spacing:.06em}
  .editorial-card{position:relative;display:grid;grid-template-columns:55% 1fr;grid-template-rows:1fr auto;
    width:100%;cursor:pointer;border:none;background:none;color:inherit;font-family:var(--font);
    text-align:left;touch-action:manipulation;padding:32px 0 40px;gap:0}
  .editorial-card+.editorial-card{border-top:1px solid var(--line)}
  /* Square art: full left column, no horizontal padding */
  .ec-art{grid-column:1;grid-row:1/3;position:relative;overflow:hidden;aspect-ratio:1/1;align-self:start}
  .ec-art img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s var(--ease)}
  .editorial-card:hover .ec-art img,.editorial-card:focus-visible .ec-art img{transform:scale(1.03)}
  .ec-art .art-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:48px;color:var(--faint);background:var(--bg2)}
  /* Right-edge fade — image dissolves into background where the title overlaps */
  .ec-art::after{content:'';position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(to right,transparent 70%,var(--bg) 98%)}
  /* Title: spans both columns, right-side content right-aligned */
  .ec-title{grid-column:1/3;grid-row:1;align-self:center;pointer-events:none;
    padding:0 var(--edge) 0 48%;position:relative;z-index:1;text-align:right}
  .ec-title h3{font-size:clamp(22px,4vw,68px);font-weight:900;letter-spacing:-.04em;line-height:.95;
    text-shadow:0 2px 24px rgba(0,0,0,.95),0 4px 48px rgba(0,0,0,.8)}
  .ec-title .ec-logo{display:block;max-width:260px;max-height:96px;object-fit:contain;
    object-position:right center;margin-left:auto;filter:drop-shadow(0 2px 14px rgba(0,0,0,.95))}
  /* Meta + summary: right column only, right-aligned */
  .ec-meta{grid-column:2;grid-row:2;padding:14px var(--edge) 0 24px;text-align:right}
  .ec-label{font-size:var(--t-label);text-transform:uppercase;letter-spacing:1.4px;
    color:var(--faint);font-weight:700;margin-bottom:8px}
  .ec-summary{font-size:var(--t-body);color:var(--dim);line-height:1.65;
    display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}

  .loading,.empty{color:var(--dim);font-size:14px;padding:48px var(--edge)}
  .empty i,.empty .svgi{font-size:38px;color:var(--faint);display:block;margin-bottom:12px}
  .err{color:#ff8585;background:rgba(255,80,80,.08);border:1px solid rgba(255,80,80,.15);
    border-radius:var(--radius-sm);padding:16px 18px;margin:20px var(--edge);font-size:13.5px;
    display:flex;gap:10px;align-items:flex-start;backdrop-filter:blur(12px)}
  .err i,.err .svgi{font-size:18px;width:18px;height:18px;margin-top:1px;flex:0 0 auto}
  /* Distinct, non-alarming treatment for "can't reach the Plex server" -
     this is an external/network condition, not an app error. */
  .err.err-offline{color:var(--dim);background:var(--surface);border-color:var(--line2);
    align-items:center;flex-wrap:wrap;gap:14px}
  .err-offline i,.err-offline .svgi{font-size:22px;width:22px;height:22px;color:var(--faint);margin-top:0}
  .err-offline b{color:var(--text);font-size:14px}
  .err-offline .btn{margin-left:auto}

  /* ---- DETAIL ----
     Mobile: stacked column (info → square art → backdrop → summary).
     Desktop (>680px): two-column hero grid (info left, square art right) via
     .dp-hero--split, then full-bleed backdrop with bottom scrim, summary
     overlapping the scrim, and large-heading rails below. */
  .dp-wrap{background:var(--bg)}
  /* Mobile-first: single flex column. The fold (header → square art → meta →
     controls) fills the first viewport; backdrop + summary follow below. */
  .dp-hero{display:flex;flex-direction:column}
  .dp-fold{order:1;display:flex;flex-direction:column;min-height:100dvh;
    padding-bottom:calc(var(--tab-h,64px) + env(safe-area-inset-bottom) + 20px)}
  .dp-head{order:1}
  .dp-poster{order:2}
  /* margin-top:auto pushes meta + controls to the bottom of the fold, so the
     play row lands near the viewport bottom (header + art stay up top) */
  .dp-meta{order:3;margin-top:auto}
  .dp-controls{order:4}
  .dp-backdrop{order:5}
  .dp-summary-wrap{order:6}
  /* Header: serif title, wave divider, italic tagline — centered on mobile.
     Top padding aligns the title with the floating back button. */
  .dp-head{width:100%;display:flex;flex-direction:column;align-items:center;text-align:center;
    padding:var(--pill-clear) var(--edge) 0}
  .dp-kicker{display:inline-flex;align-items:center;gap:9px;font-size:11px;letter-spacing:1.3px;
    text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:14px;
    background:none;border:none;padding:0;cursor:pointer;font-family:var(--font)}
  .dp-kicker:hover{opacity:.75}
  .dp-kicker .svgi{width:14px;height:14px}
  .dp-title{font-size:clamp(30px,8vw,52px);font-weight:900;letter-spacing:-.04em;
    line-height:1.02;margin:0;max-width:18ch}
  /* SVG wave divider between title and stars */
  .wave-wrap{margin:18px 0;display:flex;justify-content:center}
  .wave-wrap svg{width:100%;max-width:240px;display:block}
  /* Pull quote — tagline sits above the billboard art (order:2 on mobile),
     a clean centered editorial treatment with accent rules above and below */
  .dp-dropquote{order:2;margin:0 auto;font-family:var(--font-head);font-style:italic;
    font-weight:500;font-size:clamp(22px,5vw,34px);line-height:1.35;color:var(--text);
    text-align:center;padding:52px var(--edge) 52px;max-width:20ch;position:relative}
  .dp-dropquote::before,.dp-dropquote::after{content:"";display:block;width:32px;height:2px;
    border-radius:2px;background:var(--quote-accent,var(--accent));opacity:.85;margin:0 auto}
  .dp-dropquote::before{margin-bottom:24px}
  .dp-dropquote::after{margin-top:24px}
  /* Stars inside the header, directly under the wave divider */
  .dp-head .dp-rate{padding:2px 0 0;width:auto}
  .dp-head .rate-stars button{width:34px;height:34px}
  /* Square art poster (1:1) — full bleed on mobile, directly under the header */
  .dp-poster{width:100%;background:var(--bg2);overflow:hidden;position:relative;flex-shrink:0;
    margin-top:22px}
  .dp-poster img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;opacity:0;
    transition:opacity .5s var(--ease)}
  .dp-poster img.loaded{opacity:1}
  /* Wide (16:9) variant for episode stills */
  .dp-poster--wide img{aspect-ratio:16/9}
  /* Portrait (2:3) variant for collection covers */
  .dp-poster--portrait img{aspect-ratio:2/3}
  /* Director/Writer overlay — bottom-right corner of the poster */
  .dp-credits{position:absolute;bottom:0;right:0;padding:44px 18px 16px;text-align:right;
    background:linear-gradient(135deg,transparent 30%,rgba(0,0,0,.82) 100%);
    max-width:80%;pointer-events:none;z-index:2}
  .dp-credits .cr-group{margin-bottom:10px}
  .dp-credits .cr-group:last-child{margin-bottom:0}
  .dp-credits .cr-label{font-size:8px;font-weight:700;text-transform:uppercase;
    letter-spacing:1.4px;color:rgba(255,255,255,.42);display:block;margin-bottom:3px}
  .dp-credits .cr-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.88);
    display:block;line-height:1.35}
  /* Meta line (year · rating · runtime) */
  .dp-meta{padding:22px var(--edge) 0;font-size:13.5px;color:var(--dim);font-weight:500;
    display:flex;align-items:center;justify-content:center;gap:9px;flex-wrap:wrap;width:100%}
  .dp-meta .sep{width:3px;height:3px;border-radius:50%;background:var(--faint);flex:0 0 auto}
  /* Controls group: stars, rating badges, action buttons */
  .dp-controls{display:flex;flex-direction:column;align-items:center;width:100%}
  .dp-rate{padding:20px var(--edge) 0;display:flex;justify-content:center;width:100%}
  .rate-stars{display:flex;gap:6px}
  .rate-stars button{background:none;border:none;padding:0;cursor:pointer;font-size:28px;line-height:1;
    width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;
    color:var(--faint);transition:color .15s,transform .15s var(--ease)}
  .rate-stars button .svgi.filled{color:var(--accent)}
  .rate-stars button:hover{transform:scale(1.15);color:var(--accent2)}
  .dp-badges{padding:16px var(--edge) 0;display:flex;justify-content:center;width:100%}
  .dp-badges .ratings-row{margin:0;justify-content:center}
  /* Critic ratings live below the summary + squiggle, left-aligned to the edge */
  .dp-summary-wrap .dp-badges{justify-content:flex-start;padding:8px var(--edge) 4px}
  .dp-summary-wrap .dp-badges .ratings-row{justify-content:flex-start}
  .dp-actions{display:flex;gap:16px;padding:24px var(--edge) 32px;flex-wrap:wrap;
    justify-content:center;width:100%}
  /* Pill buttons — override global --radius:0 for detail page actions */
  .dp-actions .btn{border-radius:999px}
  /* Backdrop strip — full bleed with bottom-up dark gradient */
  .dp-backdrop{width:100%;background:var(--bg2);overflow:hidden;position:relative}
  .dp-backdrop::after{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;
    background:linear-gradient(to top,rgba(0,0,0,.82) 0%,rgba(0,0,0,.16) 52%,transparent 76%)}
  .dp-backdrop img{width:100%;aspect-ratio:16/9;object-fit:cover;object-position:62% center;
    display:block;opacity:0;transition:opacity .5s var(--ease)}
  .dp-backdrop img.loaded{opacity:1}
  /* Summary block: heading, genre line, then squiggle + body text */
  .dp-summary-wrap{position:relative;z-index:2;padding:38px 0 0}
  /* When a backdrop sits directly above (mobile flow), the heading overlaps its scrim */
  .dp-summary-wrap.over-backdrop{margin-top:-46px;padding-top:0}
  .dp-summary-wrap h2{font-size:clamp(24px,6vw,34px);font-weight:800;letter-spacing:-.03em;
    line-height:1.08;margin:0;padding:0 var(--edge)}
  .dp-genres{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
    color:var(--faint);padding:14px var(--edge) 0;text-align:right;line-height:1.6}
  /* Two-column body: vertical squiggle | summary text */
  .dp-summary-body{display:grid;grid-template-columns:24px 1fr;gap:0 16px;
    padding:18px var(--edge) 48px;align-items:stretch}
  /* The cell stretches to the row height (= summary text height). The SVG is
     absolutely positioned to fill that cell — percentage SVG heights are
     unreliable against grid-stretched cells, so inset:0 forces an exact match
     and preserveAspectRatio="none" lets the wave squash/stretch to fit. */
  .dp-squiggle{align-self:stretch;width:24px;overflow:hidden;position:relative}
  .dp-squiggle svg{position:absolute;inset:0;width:100%;height:100%;display:block}
  .dp-summary{font-size:14.5px;line-height:1.68;color:var(--dim)}
  /* Large headings for child rails */
  .dp-wrap .section{padding-top:40px;padding-bottom:0}
  .dp-wrap .rail-section{padding-top:40px}
  .dp-wrap .rail-head{margin:0;padding:0 var(--edge) 16px}
  .dp-wrap .rail-head h3,.dp-wrap .section h3{font-size:clamp(24px,6vw,34px);font-weight:800;
    letter-spacing:-.03em;line-height:1.08}
  /* Stats grid (2-col mobile, 4-col desktop) */
  .dp-stats{display:grid;grid-template-columns:1fr 1fr;margin:48px var(--edge) 56px;border:1px solid var(--line)}
  .dp-stat{padding:18px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
  .dp-stat:nth-child(even){border-right:none}
  .dp-stat:nth-last-child(-n+2){border-bottom:none}
  /* When budget/box office cells are injected, restore border logic for 4-cell grids */
  .dp-stat:last-child{border-bottom:none}
  .dp-stat:nth-last-child(2){border-bottom:none}
  .dp-sl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;
    color:var(--faint);display:block;margin-bottom:8px}
  /* Stats values in serif for character and dimension */
  .dp-sv{font-size:19px;font-weight:700;letter-spacing:-.02em;display:block;
    font-family:'Playfair Display',Georgia,'Times New Roman',serif}
  /* Awards one-liner — below stats grid */
  .dp-award{font-style:italic;color:var(--dim);font-size:13.5px;line-height:1.5;
    padding:0 var(--edge) 32px;margin:-28px 0 0}
  .dp-award::before{content:"◆  ";color:var(--accent);font-style:normal;font-size:9px}
  /* Keyword / theme pills */
  .dp-keywords{display:flex;flex-wrap:wrap;gap:8px;padding:0 var(--edge) 40px}
  .dp-keyword{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
    color:var(--dim);border:1px solid var(--line);border-radius:4px;padding:5px 10px;
    line-height:1}
  /* Full crew grid — mirrors .dp-stats visual language */
  .dp-crew-section{padding:0 0 48px}
  .dp-crew-section>h3{font-size:clamp(24px,6vw,34px);font-weight:800;letter-spacing:-.03em;
    line-height:1.08;padding:0 var(--edge) 18px;margin:0}
  .dp-crew{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);
    margin:0 var(--edge)}
  .dp-crew-item{padding:18px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
  .dp-crew-item:nth-child(even){border-right:none}
  .dp-crew-item:nth-last-child(-n+2){border-bottom:none}
  .dp-crew-item:last-child{border-bottom:none}
  .dp-cl{display:block;font-size:9px;font-weight:700;text-transform:uppercase;
    letter-spacing:1.4px;color:var(--faint);margin-bottom:6px}
  .dp-cn{font-size:15px;font-weight:600;line-height:1.3}
  /* ---- RATINGS ---- flat badges, no frost */
  .ratings-row{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin:2px 0 16px}
  .rating-badge{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--text)}
  .rating-badge .src{display:inline-flex;align-items:center;justify-content:center;height:20px;flex:0 0 auto}
  .rating-badge .src img{height:100%;width:auto;display:block}
  .rating-badge b{font-weight:700}
  .rating-badge.trailer{padding:7px 16px;cursor:pointer;border:1px solid var(--line2);
    transition:background-color .15s var(--ease);border-radius:999px}
  .rating-badge.trailer:hover{background:var(--surface2)}
  .rating-badge.trailer .svgi{color:var(--accent);font-size:16px}
  /* ---- STAT ROW (collections/playlists) ---- */
  .stat-row{display:flex;gap:36px;flex-wrap:wrap;padding:26px var(--edge);border-top:1px solid var(--line)}
  .stat{display:flex;flex-direction:column;gap:4px}
  .stat .sl{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);font-weight:700}
  .stat .sv{font-size:14px;font-weight:600;color:var(--text)}

  .section{padding:32px var(--edge) 0;position:relative}
  .section h3{font-size:18px;font-weight:700;margin-bottom:16px;letter-spacing:-.02em}
  /* ---- SETTINGS PAGE ---- */
  .settings-wrap{max-width:720px;padding:0 var(--edge) 48px}
  .settings-group{margin-bottom:8px}
  .settings-group-head{font-size:10px;text-transform:uppercase;letter-spacing:1.3px;
    color:var(--faint);font-weight:700;padding:28px 0 10px}
  .settings-row{display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding:13px 0;border-bottom:1px solid var(--line)}
  .settings-row:last-child{border-bottom:none}
  .settings-label{font-size:14px;font-weight:500;min-width:0;flex:1}
  .settings-label small{display:block;font-size:12px;color:var(--dim);font-weight:400;margin-top:2px}
  .rail-style-btns{display:flex;gap:3px;flex-shrink:0}
  .rail-style-btn{padding:5px 11px;border-radius:0;font-size:12px;font-weight:600;
    border:1px solid var(--line2);background:none;color:var(--dim);cursor:pointer;
    transition:background .15s,color .15s,border-color .15s;white-space:nowrap}
  .rail-style-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
  .rail-style-btn:hover:not(.active){background:var(--surface2);color:var(--text)}
  .sync-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:var(--faint)}
  .sync-dot.ok{background:#3ecf6b;box-shadow:0 0 0 3px rgba(62,207,107,.18)}
  .sync-dot.bad{background:#e0556b;box-shadow:0 0 0 3px rgba(224,85,107,.18)}
  /* ---- GENRE RAIL ---- */
  .genre-card{flex:0 0 auto;border-radius:var(--radius);overflow:hidden;border:none;
    cursor:pointer;background:none;padding:0;display:flex;flex-direction:column;
    transition:transform .2s var(--ease),box-shadow .2s var(--ease);text-align:left}
  .genre-card:hover{transform:scale(1.032);box-shadow:var(--shadow-lg)}
  .genre-card:active{transform:scale(.97)}
  /* Duotone: container bg is the genre color; img desaturated + multiply-blended over it.
     Dark image areas → near-black; light areas → pure genre color. */
  .genre-art{position:relative;overflow:hidden;flex-shrink:0;background:var(--gc,#333)}
  .genre-art img{width:100%;height:100%;object-fit:cover;display:block;
    filter:grayscale(1) contrast(1.1) brightness(1.15);mix-blend-mode:multiply}
  .genre-fade{position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(to bottom,transparent 30%,var(--gc,#333) 96%)}
  .genre-label{background:var(--gc,#333);color:#FFFBF8;font-size:13.5px;font-weight:700;
    text-align:center;padding:10px 14px 13px;letter-spacing:.01em;line-height:1.2;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* Billboard: label floats centered over the image, no solid bottom strip */
  .genre-card--billboard{width:252px;position:relative}
  .genre-card--billboard .genre-art{aspect-ratio:16/9}
  .genre-card--billboard .genre-fade{
    background:linear-gradient(to bottom,rgba(0,0,0,.08) 0%,rgba(0,0,0,.5) 100%)}
  .genre-card--billboard .genre-label{
    position:absolute;inset:0;background:transparent;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:800;letter-spacing:.03em;
    text-shadow:0 2px 20px rgba(0,0,0,.7),0 1px 4px rgba(0,0,0,.4);
    padding:0 16px}
  .genre-card--square{width:160px}
  .genre-card--square .genre-art{aspect-ratio:1/1}
  .genre-card--square .genre-fade{display:none}
  .cast-row{display:flex;gap:20px;overflow-x:auto;padding:4px var(--edge) 16px;
    scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain}
  .cast-row::-webkit-scrollbar{height:0}
  .cast{flex:0 0 auto;width:112px;text-align:center;background:none;border:none;
    padding:0;cursor:default;font-family:var(--font);color:var(--text)}
  .cast[data-actor-id]{cursor:pointer}
  .cast[data-actor-id]:hover .art{border-color:var(--accent)}
  .cast[data-actor-id]:hover .nm{color:var(--accent)}
  .cast .art{width:112px;height:112px;border-radius:50%;overflow:hidden;
    background:var(--bg2);border:1px solid var(--line);margin:0 auto;
    transition:border-color .15s;position:relative}
  .cast .art::before{content:"";position:absolute;border-radius:50%;
    width:34%;height:34%;top:18%;left:50%;transform:translateX(-50%);
    background:rgba(255,255,255,.15)}
  .cast .art::after{content:"";position:absolute;
    width:60%;height:33%;bottom:0;left:50%;transform:translateX(-50%);
    border-radius:50% 50% 0 0;background:rgba(255,255,255,.11)}
  .cast .art img{width:100%;height:100%;object-fit:cover;display:block;position:relative;z-index:1}
  .cast .art.no-img img{display:none}
  .cast .nm{font-size:12.5px;font-weight:600;line-height:1.3;margin-top:9px;
    transition:color .15s}
  .cast .rl{font-size:11.5px;color:var(--dim);margin-top:2px;line-height:1.25}
  .crew{display:flex;gap:28px;flex-wrap:wrap;color:var(--dim);font-size:13px;margin-top:4px}
  .crew b{color:var(--text);font-weight:600}
  .person-card .person-art{aspect-ratio:1/1;border-radius:50%;overflow:hidden;background:var(--bg2);border:1px solid var(--line)}
  .person-card .person-art img{border-radius:50%}
  /* ---- ACTOR DETAIL PAGE ---- */
  .actor-head{display:flex;align-items:flex-end;gap:28px;padding:120px var(--edge) 32px;
    background:linear-gradient(to bottom,transparent 0%,var(--bg) 100%);position:relative}
  .actor-photo{width:140px;height:140px;border-radius:50%;overflow:hidden;flex:0 0 140px;
    background:var(--bg2);border:2px solid var(--line)}
  .actor-photo img{width:100%;height:100%;object-fit:cover;display:block}
  .actor-info{flex:1;min-width:0}
  .actor-info h1{font-size:32px;font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:6px}
  .actor-bio{font-size:13.5px;line-height:1.65;color:var(--dim);margin:8px 0 4px;max-width:640px;
    display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
  .actor-info .actor-sub{font-size:13px;color:var(--faint);margin-top:6px}
  .actor-born{font-size:13px;color:var(--faint);margin-top:3px}
  .actor-bio.expanded{-webkit-line-clamp:unset;overflow:visible}
  .bio-toggle{background:none;border:none;color:var(--faint);font-size:12.5px;font-weight:600;cursor:pointer;padding:3px 0 0;margin:0;display:block;font-family:var(--font);text-align:left}
  .bio-toggle:hover{color:var(--text)}
  .tmdb-card .art{opacity:.65}
  .tmdb-card:hover .art{opacity:.9;transition:opacity .15s}
  .bio-modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:24px}
  .bio-modal{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--radius-lg);max-width:580px;width:100%;max-height:80vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);overflow:hidden}
  .bio-modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
  .bio-modal-head h2{font-size:16px;font-weight:700;letter-spacing:-.02em}
  .bio-modal-close{background:none;border:none;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;width:30px;height:30px;padding:0;font-size:18px}
  .bio-modal-close:hover{background:var(--surface);color:var(--text)}
  .bio-modal-body{padding:20px 22px 24px;overflow-y:auto;line-height:1.72;font-size:14px;color:var(--dim)}
  .bio-modal-body p{margin-bottom:12px}
  .bio-modal-body p:last-child{margin-bottom:0}
  .actor-vitals{display:flex;gap:0;padding:0 var(--edge) 28px;flex-wrap:wrap}
  .vital-item{padding:0 48px 0 0}
  .vital-label{font-size:10.5px;text-transform:uppercase;letter-spacing:1.3px;color:var(--faint);font-weight:700;margin-bottom:5px}
  .vital-value{font-size:14px;color:var(--dim);font-weight:500}
  /* ---- FILMOGRAPHY LIST ---- */
  .filmog-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .filmog-tab{padding:5px 14px;border-radius:0;border:1px solid rgba(255,255,255,.15);
    background:none;color:var(--dim);font-size:13px;font-weight:600;font-family:var(--font);
    cursor:pointer;transition:background .12s,border-color .12s,color .12s}
  .filmog-tab:hover{color:var(--text);border-color:rgba(255,255,255,.3)}
  .filmog-tab.active{background:var(--accent);border-color:transparent;color:#fff}
  .filmog-list{display:flex;flex-direction:column}
  .filmog-item{display:flex;align-items:flex-start;gap:16px;padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,.06);border-top:none;border-left:none;border-right:none;
    background:none;text-align:left;font-family:var(--font);color:var(--text);
    cursor:default;width:100%;transition:color .12s}
  .filmog-item.in-lib{cursor:pointer}
  .filmog-item.in-lib:hover{color:var(--accent)}
  .filmog-item.in-lib:hover .filmog-as{color:inherit}
  .filmog-year{flex:0 0 44px;font-size:13px;color:var(--faint);
    font-variant-numeric:tabular-nums;padding-top:2px;text-align:right}
  .filmog-info{flex:1;min-width:0}
  .filmog-title{font-size:14px;font-weight:600;line-height:1.45}
  .filmog-as{font-weight:400;color:var(--dim);transition:color .12s}
  .filmog-badge{font-size:10.5px;font-weight:700;color:var(--accent);
    letter-spacing:.06em;text-transform:uppercase;margin-top:3px}

  /* ---- EXTRAS (trailers, deleted scenes, featurettes...) ---- */
  .extra-badge{position:absolute;left:8px;top:8px;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
    color:#fff;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
    padding:4px 8px}
  .extra-dur{position:absolute;right:8px;bottom:8px;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
    color:#fff;font-size:11px;font-weight:600;padding:3px 7px}
  .extra-card .ct{font-size:14.5px;font-weight:700}

  /* ---- TRAILER WINDOW ----
     A small floating "now playing" window for trailer extras, opened from
     the Trailers rail or the ratings-row Trailer badge — distinct from the
     full-screen player. */
  .trailer-modal{position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;
    background:rgba(8,8,10,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    padding:24px;opacity:0;transition:opacity .25s var(--ease)}
  .trailer-modal.show{opacity:1}
  .trailer-window{position:relative;width:min(820px,92vw);aspect-ratio:16/9;background:#000;
    border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-lg);
    border:1px solid var(--line2);transform:scale(.96);transition:transform .25s var(--ease)}
  .trailer-modal.show .trailer-window{transform:scale(1)}
  .trailer-window video{width:100%;height:100%;display:block;object-fit:contain;background:#000;
    opacity:0;transition:opacity .3s var(--ease)}
  .trailer-window video.show{opacity:1}
  .trailer-window .pbtn{position:absolute;top:12px;right:12px;z-index:2}
  .trailer-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:10px;color:var(--dim);font-size:13px;font-weight:500}
  .trailer-state.hidden{display:none}
  .trailer-state .ring{width:40px;height:40px;border-radius:50%;
    border:3px solid rgba(255,255,255,.15);border-top-color:var(--accent);animation:spin .8s linear infinite}
  .trailer-state i,.trailer-state .svgi{font-size:28px;width:28px;height:28px;color:var(--faint)}

  /* ---- SEASON SWITCHER (artwork, not pill tabs) ---- */
  .season-rail{display:flex;gap:20px;overflow-x:auto;padding:4px var(--edge) 16px;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain}
  .season-rail::-webkit-scrollbar{height:0}
  .season-card{width:150px}
  .season-card .art{aspect-ratio:2/3;outline:2px solid transparent;outline-offset:2px;
    transition:outline-color .15s var(--ease),box-shadow .2s var(--ease)}
  .season-card.active .art{outline-color:var(--accent);box-shadow:var(--shadow)}
  .season-card.active .ct{color:var(--accent)}

  /* ---- EPISODE CARD RAIL ----
     A horizontal carousel of episode cards — 16:9 art with an "EPISODE N"
     (or "COMING …" for unaired episodes) kicker, bold title, clamped
     synopsis, and a footer with duration plus a "..." overflow for marking
     watched/unwatched — closer to a streaming app's season rail than a
     dense list. */
  .ep-card{position:relative;flex:0 0 auto;width:320px;display:flex;flex-direction:column;
    scroll-snap-align:start}
  .ep-card .ep-thumb{position:relative;display:block;width:100%;aspect-ratio:16/9;
    border-radius:var(--radius-sm);overflow:hidden;background:var(--bg2);border:none;
    padding:0;cursor:pointer}
  .ep-card .ep-thumb img{width:100%;height:100%;object-fit:cover;display:block;
    transition:transform .3s var(--ease)}
  .ep-card .ep-thumb:hover img,.ep-card .ep-thumb:focus-visible img{transform:scale(1.045)}
  .ep-card .ep-thumb:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .ep-tag{position:absolute;left:10px;top:10px;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
    color:#fff;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
    padding:5px 10px}
  .ep-tag.upcoming{background:var(--accent-wash);color:var(--accent)}
  .ep-card .ep-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,.25);color:#fff;font-size:40px;opacity:0;transition:opacity .15s}
  .ep-card .ep-thumb:hover .ep-play,.ep-card .ep-thumb:focus-visible .ep-play{opacity:1}
  .ep-card .ep-prog{position:absolute;left:6px;right:6px;bottom:6px;height:4px;background:rgba(0,0,0,.5);
    overflow:hidden}
  .ep-card .ep-prog>i{display:block;height:100%;background:var(--accent)}
  .ep-card-body{padding-top:12px;display:flex;flex-direction:column;flex:1;min-width:0}
  .ep-card-body .et{font-size:15px;font-weight:700;letter-spacing:-.01em;line-height:1.3}
  .ep-card-body .et i,.ep-card-body .et .svgi{margin-left:6px;font-size:13px;width:13px;height:13px;vertical-align:-1px}
  .ep-card-body .ed{font-size:13px;color:var(--dim);margin-top:6px;line-height:1.55;flex:1;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .ep-card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:12px;min-height:32px}
  .ep-card-foot .edur{font-size:12px;color:var(--dim);font-weight:600;display:inline-flex;align-items:center;gap:6px}
  .ep-card-foot .edur i,.ep-card-foot .edur .svgi{font-size:16px;width:16px;height:16px;color:var(--accent)}

  /* "..." overflow menu — mark an episode watched / unwatched via Plex */
  .ep-menu-wrap{position:relative;margin-left:auto}
  .ep-more{background:none;border:none;color:var(--dim);cursor:pointer;
    width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;
    font-size:18px;transition:background-color .15s,color .15s}
  .ep-more:hover{background:var(--surface);color:var(--text)}
  .ep-menu{position:absolute;bottom:38px;right:0;z-index:5;min-width:190px;
    background:var(--glass);backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    border:1px solid var(--frost-border);border-radius:var(--radius);box-shadow:var(--frost-shadow-lg);
    padding:6px;display:none}
  .ep-menu-wrap.open .ep-menu{display:block}
  .ep-menu button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;
    border:none;color:var(--text);padding:10px 12px;font-size:13px;font-weight:500;border-radius:0;
    cursor:pointer;transition:background-color .1s;font-family:var(--font)}
  .ep-menu button:hover{background:var(--surface2)}
  .ep-menu i,.ep-menu .svgi{font-size:16px;width:16px;height:16px;color:var(--dim);flex:0 0 auto}

  /* ---- COLLECTION / PLAYLIST HERO ---- */
  .coll-hero{position:relative;overflow:hidden;padding:44px var(--edge);display:flex;gap:32px;
    align-items:flex-end;flex-wrap:wrap}
  .coll-art{position:relative;width:220px;aspect-ratio:2/3;flex:0 0 auto;border-radius:var(--radius-lg);
    overflow:hidden;box-shadow:var(--shadow-lg);background:var(--bg2)}
  .coll-art.square{aspect-ratio:1/1}
  .coll-art img{width:100%;height:100%;object-fit:cover;display:block}
  .coll-art .art-fallback{display:none;position:absolute;inset:0;align-items:center;justify-content:center;
    font-size:56px;color:var(--faint)}
  .coll-art.broken img{display:none}
  .coll-art.broken .art-fallback{display:flex}
  .coll-info{position:relative;flex:1;min-width:240px;padding-bottom:6px}
  .coll-kicker{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);
    font-weight:700;margin-bottom:16px}
  .coll-info h2{font-size:clamp(28px,3.8vw,48px);font-weight:900;letter-spacing:-.04em;line-height:.98;
    margin-bottom:14px}
  .coll-desc{color:var(--dim);line-height:1.65;font-size:14px;max-width:680px;margin-bottom:22px}
  .coll-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;color:var(--dim);font-size:13px;
    font-weight:500}
  .coll-meta .sep{width:4px;height:4px;border-radius:50%;background:var(--faint)}
  .coll-actions{display:flex;gap:12px;margin-top:24px}

  /* ---- EPISODE ROW LIST ----
     Compact numbered list used when a collection/playlist consists
     entirely of episodes (mirrors the official Plex app's playlist view):
     index, 16:9 thumb, show + "Sx · Ey — Title", duration. */
  .ep-row-list{display:flex;flex-direction:column;padding:0 var(--edge) 16px}
  .ep-row{display:flex;align-items:center;gap:16px;width:100%;padding:10px 8px;
