<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#09090b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hume">
<meta name="application-name" content="Hume">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'self'; form-action 'self'">
<title>Hume</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="preconnect" href="https://hume-settings.contactdavidbusch.workers.dev" crossorigin>
<link rel="preconnect" href="https://image.tmdb.org" crossorigin>
<link rel="dns-prefetch" href="https://api.themoviedb.org">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800;900&display=swap">
<link rel="preload" href="assets/fonts/Circular/Circular-Book.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="assets/fonts/Circular/Circular-Bold.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js" as="script" crossorigin>
<script>
  if("serviceWorker" in navigator){
    var __hadController=!!navigator.serviceWorker.controller, __swRefreshing=false;
    addEventListener("load",()=>navigator.serviceWorker.register("sw.js")
      .then(reg=>{ reg.update&&reg.update(); })
      .catch(()=>{}));
    navigator.serviceWorker.addEventListener("controllerchange",()=>{
      if(window.__swServerMsg && navigator.serviceWorker.controller)
        navigator.serviceWorker.controller.postMessage(window.__swServerMsg);
      if(__hadController && !__swRefreshing){ __swRefreshing=true; location.reload(); }
    });
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<link rel="stylesheet" href="app.css">
</head>
<body>

<a href="#content" class="skip-link">Skip to content</a>

<div id="ultraBlur" aria-hidden="true">
  <div class="ub-layer" id="ubA"></div>
  <div class="ub-layer" id="ubB"></div>
  <div class="ub-scrim"></div>
</div>
<div id="navBar" aria-hidden="true"></div>

<div id="login">
  <div class="logo-lockup"><span class="svgi" style="--i:url('assets/images/icons/ui/popcorn-duotone.svg')" aria-hidden="true"></span><h1>Hume</h1></div>
  <p>Sign in with your Plex account to stream your video library. Your password never touches this app.</p>
  <button class="btn lg" id="signInBtn"><span class="svgi" style="--i:url('assets/images/icons/ui/sign-in.svg')" aria-hidden="true"></span> Sign in with Plex</button>
  <div id="loginErr" class="err hidden" style="margin:0;max-width:420px" role="alert"></div>
</div>

<div id="servers">
  <h1>Choose a server</h1>
  <div id="serverList"></div>
  <button class="btn glass" id="logoutFromServers" style="margin-top:12px"><span class="svgi" style="--i:url('assets/images/icons/ui/sign-out.svg')" aria-hidden="true"></span> Sign out</button>
</div>

<div id="app">
  <div class="scrim-nav" id="scrimNav"></div>
  <div id="topFrost" aria-hidden="true"></div>
  <div id="tabBar" role="tablist" aria-label="Main navigation">
    <button class="tab-btn" id="tabHome"      role="tab" aria-label="Home"></button>
    <button class="tab-btn" id="tabLib"       role="tab" aria-label="Library"></button>
    <button class="tab-btn" id="tabPlaylists" role="tab" aria-label="Playlists"></button>
    <button class="tab-btn" id="tabSearch"    role="tab" aria-label="Search"></button>
    <button class="tab-btn" id="tabSettings"  role="tab" aria-label="Settings"></button>
  </div>
  <div id="tabLibPicker" role="dialog" aria-label="Choose library"></div>
  <div id="installHint" role="status" aria-live="polite">
    <div class="ih-arrow"><span class="svgi" style="--i:url('assets/images/icons/ui/arrow-right.svg')" aria-hidden="true"></span></div>
    <span class="ih-text">Tap <b>Share</b> then <b>Add to Home Screen</b> for a full-screen experience</span>
    <button class="ih-dismiss" id="installHintDismiss" aria-label="Dismiss">
      <span class="svgi" style="--i:url('assets/images/icons/ui/x.svg')" aria-hidden="true"></span>
    </button>
  </div>
  <div class="shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand"><span class="svgi" style="--i:url('assets/images/icons/ui/popcorn-duotone.svg')" aria-hidden="true"></span><b>Hume</b><span class="ver">v0.4</span></div>
      <nav class="nav" id="nav" aria-label="Main"></nav>
      <div class="sidebar-foot">
        <button class="nav-item nav-collapse-btn" id="navCollapse" aria-label="Collapse sidebar" title="Collapse sidebar" aria-expanded="true"><span class="svgi" style="--i:url('assets/images/icons/ui/back.svg')" aria-hidden="true"></span><span class="nav-text">Collapse</span></button>
        <button class="nav-item" id="logoutBtn" aria-label="Sign out" title="Sign out"><span class="svgi" style="--i:url('assets/images/icons/ui/sign-out.svg')" aria-hidden="true"></span><span class="nav-text">Sign out</span></button>
      </div>
    </aside>
    <main class="main" id="main">
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation" aria-expanded="false"><span class="svgi" style="--i:url('assets/images/icons/ui/list.svg')" aria-hidden="true"></span></button>
      <button class="menu-toggle" id="mobileBack" aria-label="Go back" style="display:none" onclick="history.back()"><span class="svgi" style="--i:url('assets/images/icons/ui/back.svg')" aria-hidden="true"></span></button>
      <div id="libNav" aria-label="Library navigation"></div>
      <div class="searchbox" id="searchBox" role="search">
        <span class="svgi" style="--i:url('assets/images/icons/ui/magnifying-glass.svg')" aria-hidden="true"></span>
        <label class="sr-only" for="search">Search</label>
        <input id="search" placeholder="Search" autocomplete="off">
      </div>
      <h1 id="viewTitle" class="sr-only">Home</h1>
      <div class="content" id="content" tabindex="-1"><div class="loading">Loading…</div></div>
    </main>
  </div>
</div>

<div id="player" role="dialog" aria-modal="true" aria-label="Video player">
  <div class="p-backdrop" id="pBackdrop"></div>
  <video id="video" playsinline x-webkit-airplay="allow"></video>
  <div class="p-pause" id="pPause">
    <img class="p-pause-logo hidden" id="pPauseLogo" alt="">
    <div class="p-pause-title" id="pPauseTitle"></div>
    <div class="p-pause-sub hidden" id="pPauseSub"></div>
    <div class="p-pause-desc hidden" id="pPauseDesc"></div>
    <button class="p-pause-resume" id="pauseResume"><span class="svgi" style="--i:url('assets/images/icons/ui/play-fill.svg')" aria-hidden="true"></span><span>Resume</span></button>
  </div>
  <button class="skip-marker" id="skipIntro" hidden>Skip Intro</button>
  <div class="next-up" id="nextUp">
    <img id="nuImg" alt=""><div class="nu-body"><div class="nu-k">Up next</div>
    <div class="nu-t" id="nuTitle"></div>
    <div class="nu-actions">
      <button class="btn" id="nuPlay" style="padding:8px 16px;font-size:13px"><span class="svgi" style="--i:url('assets/images/icons/ui/play-fill.svg')" aria-hidden="true"></span> Play now</button>
      <button class="btn glass" id="nuCancel" style="padding:8px 16px;font-size:13px">Cancel</button>
    </div></div>
  </div>
  <div id="toast" role="status" aria-live="polite"></div>
  <div class="p-spinner hidden" id="pSpinner" role="status" aria-live="polite"><div class="ring"></div><span id="pSpinnerText">Loading</span></div>
  <div class="p-top" id="pTop">
    <div class="p-top-left">
      <button class="pbtn" id="closePlayer" title="Close" aria-label="Close player"><span class="svgi" style="--i:url('assets/images/icons/ui/back.svg')" aria-hidden="true"></span></button>
      <button class="pbtn" id="minPlayer" title="Minimize" aria-label="Minimize player"><span class="svgi" style="--i:url('assets/images/icons/ui/corners-in.svg')" aria-hidden="true"></span></button>
    </div>
    <div class="pt" id="pTitle"></div>
    <div class="p-top-right">
      <div class="p-status hidden" id="pStatus" role="status"><span class="dot" aria-hidden="true"></span><span id="pStatusText"></span></div>
      <button class="pbtn hidden" id="playOnBtn" title="Play on…" aria-label="Play on another device"><span class="svgi" style="--i:url('assets/images/icons/ui/television.svg')" aria-hidden="true"></span></button>
      <button class="pbtn" id="settingsBtn" title="Settings" aria-label="Playback settings" aria-haspopup="menu" aria-expanded="false"><span class="svgi" style="--i:url('assets/images/icons/ui/gear.svg')" aria-hidden="true"></span></button>
      <div class="p-menu" id="pMenu" role="menu" aria-label="Playback settings"></div>
    </div>
  </div>
  <div class="p-bottom" id="pBottom">
    <div class="p-seek"><div class="p-seek-track" id="seekTrack" role="slider" tabindex="0"
        aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-valuetext="0:00 of 0:00">
      <div class="p-buffered" id="buffered"></div><div class="p-played" id="played"></div>
      <div class="p-chapter-marks" id="chapterMarks"></div>
      <div class="p-knob" id="knob"></div><div class="p-hover-time" id="hoverTime"></div>
    </div></div>
    <div class="p-ctrl-wrap">
      <div class="p-ctl-left">
        <div class="p-time"><span id="curTime">0:00</span><span class="slash">/</span><span id="durTime">0:00</span></div>
        <div class="p-vol"><button class="pbtn bare" id="muteBtn" aria-label="Mute"><span class="svgi" style="--i:url('assets/images/icons/ui/speaker-high.svg')" aria-hidden="true"></span></button>
          <input type="range" id="volSlider" min="0" max="1" step="0.01" value="1" aria-label="Volume"></div>
      </div>
      <div class="p-ctl-center">
        <button class="pbtn bare hidden" id="prevEpBtn" aria-label="Previous episode" title="Previous episode"><span class="svgi flip" style="--i:url('assets/images/icons/ui/skip.svg')" aria-hidden="true"></span></button>
        <button class="pbtn bare skip" id="back10" aria-label="Back 10 seconds" title="Back 10 seconds"><span class="svgi" style="--i:url('assets/images/icons/ui/arrow-counter-clockwise.svg')" aria-hidden="true"></span></button>
        <button class="pbtn play-main" id="playBtn" aria-label="Play"><span class="svgi" style="--i:url('assets/images/icons/ui/play-fill.svg')" aria-hidden="true"></span></button>
        <button class="pbtn bare skip" id="fwd10" aria-label="Forward 10 seconds" title="Forward 10 seconds"><span class="svgi" style="--i:url('assets/images/icons/ui/arrow-clockwise.svg')" aria-hidden="true"></span></button>
        <button class="pbtn bare hidden" id="nextEpBtn" aria-label="Next episode" title="Next episode"><span class="svgi" style="--i:url('assets/images/icons/ui/skip.svg')" aria-hidden="true"></span></button>
      </div>
      <div class="p-ctl-right">
        <button class="pbtn bare" id="chaptersBtn" aria-label="Chapters & play queue" title="Chapters & play queue" aria-haspopup="true" aria-expanded="false" aria-controls="pPanel"><span class="svgi" style="--i:url('assets/images/icons/ui/list-bullets.svg')" aria-hidden="true"></span></button>
        <button class="pbtn bare" id="pipBtn" aria-label="Picture in picture" title="Picture in picture"><span class="svgi" style="--i:url('assets/images/icons/ui/frame-corners.svg')" aria-hidden="true"></span></button>
        <button class="pbtn bare hidden" id="castBtn" aria-label="Cast to device" title="Cast to device"><span class="svgi" style="--i:url('assets/images/icons/ui/screencast.svg')" aria-hidden="true"></span></button>
        <button class="pbtn bare hidden" id="airplayBtn" aria-label="AirPlay" title="AirPlay"><span class="svgi" style="--i:url('assets/images/icons/ui/airplay.svg')" aria-hidden="true"></span></button>
        <button class="pbtn bare" id="fullBtn" aria-label="Fullscreen" title="Fullscreen"><span class="svgi" style="--i:url('assets/images/icons/ui/corners-out.svg')" aria-hidden="true"></span></button>
      </div>
    </div>
  </div>
  <div class="p-panel-scrim" id="pPanelScrim"></div>
  <div class="p-panel" id="pPanel" aria-hidden="true">
    <div class="p-panel-head"><button class="p-panel-close" id="pPanelClose" aria-label="Close"><span class="svgi" style="--i:url('assets/images/icons/ui/x.svg')" aria-hidden="true"></span></button></div>
    <div class="p-panel-body" id="pPanelBody"></div>
  </div>
  <div id="devicePicker" aria-hidden="true">
    <div class="dp-head">
      <h3>Play on…</h3>
      <button class="pbtn" id="devicePickerClose" aria-label="Close picker"><span class="svgi" style="--i:url('assets/images/icons/ui/x.svg')" aria-hidden="true"></span></button>
    </div>
    <div id="deviceList"></div>
  </div>
  <button class="pbtn mini-play" id="miniPlay" aria-label="Play"><span class="svgi" style="--i:url('assets/images/icons/ui/play-fill.svg')" aria-hidden="true"></span></button>
  <div class="mini-bar" id="miniBar">
    <span class="mt" id="miniTitle"></span>
    <button class="pbtn" id="expandPlayer" aria-label="Expand player"><span class="svgi" style="--i:url('assets/images/icons/ui/corners-out.svg')" aria-hidden="true"></span></button>
    <button class="pbtn" id="closeMini" aria-label="Close player"><span class="svgi" style="--i:url('assets/images/icons/ui/x.svg')" aria-hidden="true"></span></button>
  </div>
</div>

<script src="app.js"></script>
<script src="tmdb-backdrop-dedupe.js"></script>
<script src="detail-contrast.js"></script>
<script src="home-polish.js"></script>
<link rel="stylesheet" href="design-system.css">
<script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
</body></html>
