    background:none;border:none;border-radius:var(--radius-sm);cursor:pointer;text-align:left;
    color:inherit;font:inherit}
  .ep-row:hover{background:rgba(255,255,255,.05)}
  .ep-row-num{flex:0 0 24px;text-align:center;color:var(--faint);font-size:13px;font-weight:600}
  .ep-row-thumb{position:relative;flex:0 0 132px;aspect-ratio:16/9;border-radius:var(--radius-sm);
    overflow:hidden;background:var(--bg2)}
  .ep-row-thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .ep-row-prog{position:absolute;left:0;right:0;bottom:0;height:3px;background:rgba(0,0,0,.5)}
  .ep-row-prog>i{display:block;height:100%;background:var(--accent)}
  .ep-row-body{flex:1;min-width:0}
  .ep-row-show{font-size:15px;font-weight:700;letter-spacing:-.01em}
  .ep-row-ep{font-size:13px;color:var(--dim);margin-top:3px;overflow:hidden;text-overflow:ellipsis;
    white-space:nowrap}
  .ep-row-ep i,.ep-row-ep .svgi{margin-left:6px;color:var(--accent);vertical-align:-2px}
  .ep-row-dur{flex:0 0 auto;color:var(--dim);font-size:13px;font-weight:600;
    font-variant-numeric:tabular-nums;padding-left:12px}

  /* ---- PLAYER ---- */
  #player{position:fixed;inset:0;z-index:100;background:#000;display:none;flex-direction:column;overflow:hidden}
  #player.show{display:flex}
  #player video{width:100%;height:100%;background:transparent;object-fit:contain;position:relative;z-index:1;
    transition:opacity .6s var(--ease)}
  #player.paused video{opacity:.3}
  #player.idle{cursor:none}

  .p-backdrop{position:absolute;inset:-10%;background-size:cover;background-position:center;
    opacity:0;transition:opacity .6s var(--ease);filter:blur(90px) saturate(1.9) brightness(1.05)}
  #player.loading .p-backdrop{opacity:.45}
  #player.paused .p-backdrop{opacity:.6}
  .p-spinner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;z-index:3;pointer-events:none}
  .p-spinner .ring{width:52px;height:52px;border-radius:50%;
    border:3px solid rgba(255,255,255,.15);border-top-color:var(--accent);animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* ---- SKELETON SCREENS ---- */
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  .sk{background:linear-gradient(90deg,var(--bg2) 25%,var(--surface) 50%,var(--bg2) 75%);
    background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:var(--radius)}
  .sk-hero{height:min(64vh,600px);min-height:420px;border-radius:0;flex-shrink:0}
  .sk-detail{height:min(72vh,704px);min-height:420px;border-radius:0;flex-shrink:0}
  .sk-rail{padding:12px var(--edge) 8px}
  .sk-title{height:18px;width:140px;margin-bottom:20px}
  .sk-cards{display:flex;gap:var(--rail-gap);overflow:hidden}
  .sk-card{flex:0 0 auto;width:var(--card-w)}
  .sk-card.wide{width:var(--card-w-wide)}
  .sk-art{border-radius:var(--radius);margin-bottom:8px}
  .sk-card:not(.wide) .sk-art{aspect-ratio:2/3}
  .sk-card.wide .sk-art{aspect-ratio:16/9}
  .sk-line{height:12px;margin-bottom:5px}
  .sk-line.short{width:60%}
  /* ── Navigation progress bar ── */
  #navBar{position:fixed;top:0;left:0;width:100%;height:2px;z-index:9999;pointer-events:none;
    background:var(--accent);transform:scaleX(0);transform-origin:left;opacity:0;
    will-change:transform,opacity}
  #navBar.going{opacity:1;transform:scaleX(.72);
    transition:transform 1.6s cubic-bezier(.05,.8,.05,1),opacity .1s}
  #navBar.done{transform:scaleX(1);opacity:0;
    transition:transform .12s var(--ease),opacity .3s .1s}
  /* ── Page crossfade ── */
  @keyframes pgIn{from{opacity:0}}
  #content>*{animation:pgIn .18s var(--ease) both}
  #content{transition:opacity .14s var(--ease)}
  #content.nav-out{opacity:0;pointer-events:none}
  /* ── Card tap feedback ── */
  .art-btn:active{opacity:.72;transform:scale(.96);transition:opacity .08s,transform .08s}
  button.cast[data-actor-id]:active{opacity:.72;transform:scale(.96);transition:opacity .08s,transform .08s}
  .p-spinner span{font-size:13px;color:#cfcfd6;letter-spacing:.3px;font-weight:500}
  /* ── D-pad / keyboard focus: gold frosted glass
     :focus-visible fires only on keyboard/D-pad — never on touch taps — so
     the ring never appears for mouse or touchscreen users. */
  :focus-visible{outline:none}
  /* Cards: scale the whole card — ring is on .art below so it follows 14px radius.
     Genre cards have their own ring here since they don't use .art. */
  button.card:focus-visible{
    outline:none;z-index:4;position:relative;
    transform:scale(1.06);
    transition:transform .14s var(--ease)}
  .genre-card:focus-visible{
    outline:none;z-index:4;position:relative;
    transform:scale(1.06);
    box-shadow:0 0 0 2.5px var(--accent),0 0 0 6px rgba(232,184,37,.18),0 16px 48px rgba(232,184,37,.2);
    transition:transform .14s var(--ease),box-shadow .14s var(--ease)}
  button.cast[data-actor-id]:focus-visible{
    outline:none;z-index:4;position:relative;
    transform:scale(1.06);
    box-shadow:0 0 0 2.5px var(--accent),0 0 0 5px rgba(232,184,37,.18),0 12px 32px rgba(232,184,37,.2);
    transition:transform .14s var(--ease),box-shadow .14s var(--ease)}
  /* Primary (solid gold) buttons: bright white outer ring + gold corona */
  .btn:focus-visible{
    outline:none;
    box-shadow:0 0 0 2.5px #fff,0 0 0 5.5px rgba(232,184,37,.5),0 0 28px rgba(232,184,37,.28)}
  /* Everything else (nav items, settings toggles, see-all, icon buttons):
     gold-tinted frosted glass — the accent colour shines through the blur */
  button:focus-visible:not(.card):not(.genre-card):not([data-actor-id]):not(.btn){
    outline:none;
    background:rgba(232,184,37,.13);
    box-shadow:var(--frost-edge),0 0 0 1.5px var(--accent),0 0 20px rgba(232,184,37,.18);
    backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));
    transition:background .12s var(--ease),box-shadow .12s var(--ease)}
  /* TV mode: hide pointer cursor (navigating by D-pad, not mouse) */
  body.tv-mode{cursor:none}
  /* TV mode toggle button in Settings */
  .toggle-btn{padding:8px 22px;border-radius:var(--radius-sm);background:var(--surface2);
    color:var(--dim);font-size:14px;font-weight:500;border:1px solid var(--line2);
    transition:all .14s var(--ease);cursor:pointer;flex-shrink:0}
  .toggle-btn.active{background:rgba(232,184,37,.13);color:var(--accent);
    border-color:rgba(232,184,37,.38);
    box-shadow:0 0 0 1px rgba(232,184,37,.18),0 0 16px rgba(232,184,37,.1)}

  /* ---- PAUSE SCREEN ----
     Bottom-left ultrablur info panel shown while paused: the show's main
     backdrop fuels the full-screen ultrablur wash (.p-backdrop), and the
     show logo, metadata, and full synopsis sit over a corner scrim.
     pointer-events pass through the empty area so a click anywhere resumes. */
  .p-pause{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:flex-start;
    justify-content:flex-end;gap:14px;text-align:left;padding:0 64px 132px;opacity:0;visibility:hidden;
    pointer-events:none;
    background:linear-gradient(90deg,rgba(8,8,12,.86) 0%,rgba(8,8,12,.45) 42%,transparent 74%),
      linear-gradient(0deg,rgba(8,8,12,.55) 0%,transparent 46%);
    transform:translateY(14px);transition:opacity .45s var(--ease),visibility .45s var(--ease),transform .45s var(--ease)}
  #player.paused .p-pause{opacity:1;visibility:visible;transform:translateY(0)}
  .p-pause-logo{max-width:min(46vw,380px);max-height:132px;width:auto;height:auto;object-fit:contain;
    object-position:left bottom;filter:drop-shadow(0 8px 30px rgba(0,0,0,.6))}
  .p-pause-title{font-size:44px;font-weight:800;letter-spacing:-.02em;max-width:720px;
    text-shadow:0 2px 28px rgba(0,0,0,.55)}
  .p-pause-sub{font-size:14px;font-weight:600;color:var(--dim);letter-spacing:.02em;text-shadow:0 1px 12px rgba(0,0,0,.6)}
  .p-pause-desc{font-size:15px;color:#dcdce2;line-height:1.7;max-width:620px;text-shadow:0 1px 14px rgba(0,0,0,.65)}
  .p-pause-resume{display:inline-flex;align-items:center;gap:10px;align-self:flex-start;margin-top:6px;
    pointer-events:auto;padding:12px 26px;border-radius:0;background:rgba(255,255,255,.14);
    backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));
    border:1px solid rgba(255,255,255,.22);box-shadow:var(--frost-edge),0 12px 36px rgba(0,0,0,.45);
    color:#fff;font-size:15px;font-weight:700;
    transition:transform .15s var(--ease),background-color .15s var(--ease)}
  .p-pause-resume i,.p-pause-resume .svgi{font-size:18px;width:18px;height:18px}
  .p-pause-resume:hover{background:rgba(255,255,255,.24);transform:translateY(-1px)}
  .p-pause-resume:active{transform:scale(.97)}

  .p-top,.p-bottom{position:absolute;left:0;right:0;z-index:4;transition:opacity .25s,transform .25s}
  /* 3-column grid: left group | centered title | right group */
  .p-top{top:0;padding:20px 20px 16px;display:grid;grid-template-columns:auto 1fr auto;
    align-items:center;gap:12px;
    background:linear-gradient(to bottom,rgba(0,0,0,.8) 0%,rgba(0,0,0,.3) 60%,transparent 100%)}
  .p-bottom{bottom:0;padding:0 20px 20px;
    background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.4) 55%,transparent 100%)}
  #player.idle .p-top{opacity:0;transform:translateY(-8px);pointer-events:none}
  #player.idle .p-bottom{opacity:0;transform:translateY(8px);pointer-events:none}
  .p-top-left{display:flex;gap:6px;align-items:center}
  .p-top .pt{min-width:0;text-align:center;display:flex;flex-direction:column;gap:2px}
  .p-top .pt .pt-main{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .p-top .pt .pt-sub{font-size:11.5px;color:var(--dim);font-weight:500;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap}
  .p-top-right{display:flex;align-items:center;gap:6px;position:relative;justify-content:flex-end}

  .pbtn{background:rgba(255,255,255,.1);backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));
    border:1px solid rgba(255,255,255,.14);box-shadow:var(--frost-edge-sm);
    color:#fff;width:44px;height:44px;border-radius:0;display:flex;align-items:center;
    justify-content:center;font-size:19px;flex:0 0 auto;
    transition:background-color .15s var(--ease),border-color .15s var(--ease),color .15s var(--ease),transform .1s var(--ease)}
  .pbtn:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.22)}
  .pbtn:active{transform:scale(.94)}
  .pbtn.bare{background:none;border:none;backdrop-filter:none;box-shadow:none;border-radius:0}
  .pbtn.bare:hover{background:rgba(255,255,255,.12)}
  .pbtn.active{background:rgba(232,184,37,.2);border-color:rgba(232,184,37,.4);color:var(--accent)}
  .pbtn.play-main{background:rgba(232,184,37,.22);border-color:rgba(232,184,37,.5);color:var(--accent);font-size:21px;
    box-shadow:var(--frost-edge-sm),0 4px 20px rgba(232,184,37,.25)}
  .pbtn.play-main:hover{background:rgba(232,184,37,.32);border-color:rgba(232,184,37,.6)}
  .pbtn:disabled{opacity:.32;pointer-events:none}

  .p-seek{padding:6px 2px 10px}
  .p-seek-track{position:relative;height:5px;background:rgba(255,255,255,.18);
    cursor:pointer;transition:height .12s}
  .p-seek-track:hover,.p-seek-track:focus-visible{height:7px}
  .p-seek-track:focus-visible{outline:2px solid var(--accent);outline-offset:6px}
  .p-buffered{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.28)}
  .p-played{position:absolute;left:0;top:0;bottom:0;background:var(--accent);width:0}
  .p-chapter-marks{position:absolute;inset:0;pointer-events:none}
  .p-chapter-mark{position:absolute;top:0;bottom:0;width:2px;background:rgba(10,10,12,.55)}
  .p-knob{position:absolute;top:50%;width:14px;height:14px;border-radius:50%;background:#fff;
    transform:translate(-50%,-50%) scale(0);transition:transform .15s var(--ease);
    box-shadow:0 1px 6px rgba(0,0,0,.4);left:0}
  .p-seek-track:hover .p-knob,.p-seek-track:focus-visible .p-knob{transform:translate(-50%,-50%) scale(1)}
  .p-hover-time{position:absolute;bottom:20px;transform:translateX(-50%);background:rgba(0,0,0,.9);
    padding:4px 10px;font-size:12px;font-weight:600;pointer-events:none;display:none}

  /* 3-group control row: time+vol | center transport | chapters+pip+full */
  .p-ctrl-wrap{display:flex;align-items:center;gap:4px;padding:8px 2px 0}
  .p-ctl-left{display:flex;align-items:center;gap:4px;flex:1}
  .p-ctl-center{display:flex;align-items:center;gap:6px}
  .p-ctl-right{display:flex;align-items:center;gap:4px;flex:1;justify-content:flex-end}
  .p-time{font-size:13px;color:var(--text);font-variant-numeric:tabular-nums;margin:0 8px;white-space:nowrap;
    font-weight:500}
  .p-time .slash{color:var(--faint);margin:0 4px}
  .p-vol{display:flex;align-items:center;gap:2px}
  .p-vol input[type=range]{width:0;opacity:0;transition:width .2s var(--ease),opacity .2s var(--ease);
    accent-color:var(--accent);height:4px}
  .p-vol:hover input[type=range],.p-vol:focus-within input[type=range]{width:80px;opacity:1;margin-left:4px}
  .p-status{font-size:11px;color:var(--dim);background:rgba(255,255,255,.1);backdrop-filter:blur(16px) saturate(var(--frost-sat));
    -webkit-backdrop-filter:blur(16px) saturate(var(--frost-sat));
    border:1px solid rgba(255,255,255,.12);box-shadow:var(--frost-edge-sm);padding:5px 12px;margin-right:6px;
    white-space:nowrap;display:flex;align-items:center;gap:6px;font-weight:600}
  .p-status .dot{width:6px;height:6px;border-radius:50%;background:#6ee7a0;flex:0 0 auto}
  .p-status.transcode .dot{background:var(--accent)}

  .p-menu{position:absolute;top:52px;right:0;background:var(--glass);backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    -webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    border:1px solid var(--frost-border);border-radius:var(--radius);overflow-y:auto;min-width:260px;display:none;
    box-shadow:var(--frost-shadow-lg);max-height:min(70vh,520px)}
  .p-menu.open{display:block}
  .p-menu .mh{padding:12px 18px 6px;font-size:10px;text-transform:uppercase;letter-spacing:1px;
    color:var(--faint);font-weight:700}
  .p-menu button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;
    border:none;color:var(--text);padding:11px 18px;font-size:13px;font-weight:500;
    transition:background-color .1s;min-height:44px}
  .p-menu button:hover{background:var(--surface2)}
  .p-menu button:focus-visible{outline-offset:-2px}
  .p-menu button i.ck,.p-menu button .svgi.ck{font-size:16px;width:18px;height:16px;color:var(--accent);opacity:0;flex:0 0 auto}
  .p-menu button.active i.ck,.p-menu button.active .svgi.ck{opacity:1}
  .p-menu button .ml{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
  .p-menu button .msub{font-size:11px;color:var(--faint);font-weight:500}

  .mini-bar{display:none}
  .mini-play{display:none}
  #player.min{inset:auto 20px 20px auto;width:380px;height:214px;border-radius:0;overflow:hidden;
    box-shadow:var(--shadow-lg);border:1px solid var(--line2);background:#000}
  #player.min .p-top,#player.min .p-bottom,#player.min .p-spinner span,#player.min .p-pause{display:none}
  #player.min video{pointer-events:none}
  #player.min video{opacity:1!important}
  #player.min .mini-bar{display:flex;align-items:center;gap:8px;position:absolute;top:0;left:0;right:0;
    z-index:5;padding:8px 10px;background:linear-gradient(to bottom,rgba(0,0,0,.85),transparent);opacity:0;
    transition:opacity .15s}
  #player.min:hover .mini-bar,#player.min:focus-within .mini-bar{opacity:1}
  #player.min .mini-bar .mt{font-size:12px;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
    font-weight:500}
  #player.min .pbtn{width:32px;height:32px;font-size:14px;border-radius:0}
  #player.min .mini-play{display:flex;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:48px;height:48px;font-size:22px;opacity:0}
  #player.min:hover .mini-play,#player.min:focus-within .mini-play{opacity:1}

  #toast{position:absolute;bottom:110px;left:50%;transform:translate(-50%,10px);z-index:7;
    background:var(--glass);backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    border:1px solid var(--frost-border);box-shadow:var(--frost-shadow);
    padding:10px 20px;font-size:13px;font-weight:500;opacity:0;
    transition:opacity .25s var(--ease),transform .25s var(--ease);pointer-events:none;white-space:nowrap}
  #toast.show{opacity:1;transform:translate(-50%,0)}

  .next-up{position:absolute;right:28px;bottom:110px;z-index:6;background:var(--glass);
    backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    border:1px solid var(--frost-border);border-radius:var(--radius);padding:16px;
    display:none;gap:16px;width:400px;box-shadow:var(--frost-shadow-lg)}
  .next-up.show{display:flex}
  .next-up img{width:140px;aspect-ratio:16/9;border-radius:var(--radius-xs);object-fit:cover;flex:0 0 auto;
    background:var(--bg2)}
  .nu-body{flex:1;min-width:0}
  .nu-k{font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;font-weight:700}
  .nu-t{font-size:13.5px;font-weight:600;margin:6px 0 12px;line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .nu-actions{display:flex;gap:8px}

  /* ---- SKIP INTRO / CREDITS (Plex markers) ---- */
  .skip-marker{position:absolute;right:28px;bottom:110px;z-index:6;
    background:rgba(20,20,24,.82);backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));
    -webkit-backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));
    border:1px solid var(--frost-border);box-shadow:var(--frost-shadow);color:var(--text);
    border-radius:0;padding:11px 20px;font-size:14px;font-weight:600;font-family:var(--font);
    cursor:pointer;transition:background-color .15s,transform .1s var(--ease),opacity .2s var(--ease)}
  .skip-marker:hover{background:rgba(40,40,46,.92)}
  .skip-marker:active{transform:scale(.97)}
  #player.idle .skip-marker{bottom:40px}

  /* ---- RIGHT PANEL: chapters / play queue ---- */
  .p-panel{position:absolute;top:0;right:0;bottom:0;width:min(300px,85%);z-index:15;
    display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s var(--ease);
    background:rgba(10,10,14,.96);backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    -webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    border-left:1px solid var(--frost-border)}
  .p-panel.show{transform:translateX(0)}
  .p-panel-scrim{position:absolute;inset:0;z-index:14;background:rgba(0,0,0,.45);
    opacity:0;pointer-events:none;transition:opacity .25s var(--ease)}
  .p-panel-scrim.show{opacity:1;pointer-events:auto;cursor:pointer}
  /* Device picker sheet */
  #devicePicker{position:absolute;bottom:0;left:0;right:0;z-index:16;
    background:rgba(12,12,18,.97);backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    -webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    border-top:1px solid rgba(255,255,255,.1);
    padding:20px 20px max(20px,env(safe-area-inset-bottom));
    transform:translateY(100%);transition:transform .28s var(--ease);pointer-events:none}
  #devicePicker.open{transform:translateY(0);pointer-events:auto}
  #devicePicker .dp-head{display:flex;flex-direction:row;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0;width:100%}
  #devicePicker .dp-head h3{font-size:16px;font-weight:700;margin:0}
  #deviceList .device-item{display:flex;align-items:center;gap:14px;width:100%;
    padding:13px 8px;border:none;background:none;color:inherit;text-align:left;
    border-bottom:1px solid rgba(255,255,255,.07);cursor:pointer}
  #deviceList .device-item:last-child{border-bottom:none}
  #deviceList .device-item:hover,#deviceList .device-item:focus-visible{background:rgba(255,255,255,.08)}
  #deviceList .device-item .svgi{width:22px;height:22px;color:var(--dim);flex:0 0 auto}
  .di-name{font-size:15px;font-weight:600}
  .di-sub{font-size:12px;color:var(--dim);margin-top:2px}
  #player.panel-open.idle .p-top{opacity:1;transform:none;pointer-events:auto}
  .p-panel-head{display:flex;align-items:center;justify-content:flex-end;padding:10px 12px;
    flex:0 0 auto;border-bottom:1px solid rgba(255,255,255,.08)}
  .p-panel-close{width:32px;height:32px;border:none;background:none;
    color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:color .15s,background-color .15s}
  .p-panel-close:hover{color:var(--text);background:rgba(255,255,255,.08)}
  .p-panel-close .svgi{width:16px;height:16px}
  .p-panel-body{flex:1;overflow-y:auto;padding-bottom:16px}
  .pp-section{padding:4px 0}
  .pp-head{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--faint);padding:12px 16px 6px}
  .pp-item{display:flex;align-items:center;gap:10px;width:100%;border:none;background:none;
    text-align:left;color:var(--text);font-family:var(--font);cursor:pointer;
    padding:6px 16px;transition:background-color .12s}
  .pp-item:hover{background:rgba(255,255,255,.07)}
  .pp-item.now .pp-thumb{outline:2px solid var(--accent);outline-offset:-2px}
  .pp-thumb{flex:0 0 72px;width:72px;height:40px;
    overflow:hidden;background:var(--bg2);position:relative}
  .pp-thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .pp-prog{position:absolute;left:0;right:0;bottom:0;height:2px;background:rgba(0,0,0,.5)}
  .pp-prog>i{display:block;height:100%;background:var(--accent)}
  .pp-text{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
  .pp-t{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pp-s{font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums}
  .pp-item.now .pp-t,.pp-item.now .pp-s{color:var(--accent)}

  /* ---- RESPONSIVE ---- */
  /* ---- DETAIL PAGE: desktop two-column hero ---- */
  @media(min-width:681px){
    /* Fold wrapper dissolves on desktop so its children land in the grid
       (split heroes) or in normal flow (single-column episode heroes) */
    .dp-fold{display:contents}
    /* Editorial asymmetric grid (matches the desktop mockup):
         row1: backdrop (left, partial width) | meta floats top-right
         row2: stars/badges/buttons (left)    | title/wave/tagline (right)
         row3: summary (left)                 | square art (right)
       The 16:9 backdrop deliberately does NOT span full width — it stops at
       ~78%, leaving a black gap on the right where the meta line sits. */
    .dp-hero.dp-hero--split{display:grid;position:relative;
      grid-template-columns:1.22fr .88fr;column-gap:48px;align-items:start;
      grid-template-areas:"quote quote" "backdrop backdrop" "controls head" "summary poster";
      padding-top:0}
    .dp-hero.dp-hero--split>*{order:0}
    /* Pull quote sits full-width above the billboard art */
    .dp-hero.dp-hero--split .dp-dropquote{grid-area:quote;margin:0 auto;
      padding:40px var(--edge) 36px;max-width:32ch}
    .dp-hero.dp-hero--split .dp-backdrop{grid-area:backdrop;width:78%;margin-bottom:10px}
    .dp-hero.dp-hero--split .dp-meta{position:absolute;top:24px;right:calc(var(--edge) + 56px);
      width:auto;padding:0;justify-content:flex-end}
    .dp-hero.dp-hero--split .dp-head{grid-area:head;align-items:flex-end;text-align:right;
      padding:10px var(--edge) 0 0}
    .dp-hero.dp-hero--split .dp-head .wave-wrap{justify-content:flex-end}
    .dp-hero.dp-hero--split .dp-head .dp-rate{padding:4px 0 0;justify-content:flex-end}
    .dp-hero.dp-hero--split .dp-controls{grid-area:controls;align-items:flex-start;
      padding:8px 0 0 var(--edge)}
    .dp-hero.dp-hero--split .dp-actions{justify-content:flex-start;padding:24px 0 0 0}
    .dp-hero.dp-hero--split .dp-poster{grid-area:poster;align-self:start;margin-right:var(--edge)}
    .dp-hero.dp-hero--split .dp-summary-wrap{grid-area:summary;margin-top:0;padding-top:24px}
    .dp-hero.dp-hero--split .dp-summary-wrap h2{padding:0 24px 0 var(--edge)}
    .dp-hero.dp-hero--split .dp-genres{text-align:left;padding:14px 24px 0 var(--edge)}
    .dp-hero.dp-hero--split .dp-summary-body{padding:18px 24px 8px var(--edge)}
    /* Single-column heroes (episodes) centered and constrained on desktop */
    .dp-hero:not(.dp-hero--split){max-width:920px;margin:0 auto}
    .dp-hero:not(.dp-hero--split) .dp-poster{margin-top:28px}
    .dp-title{font-size:clamp(40px,4vw,66px);max-width:16ch}
    .rate-stars button{width:44px;height:44px;font-size:34px}
    .dp-summary{font-size:15.5px}
    .dp-stats{grid-template-columns:repeat(4,1fr);margin:56px var(--edge) 72px}
    .dp-stat{border-bottom:none}
    .dp-stat:nth-child(even){border-right:1px solid var(--line)}
    .dp-stat:last-child{border-right:none}
    /* Crew grid: 4 columns on desktop */
    .dp-crew{grid-template-columns:repeat(4,1fr)}
    .dp-crew-item:nth-child(n){border-right:1px solid var(--line);border-bottom:none}
    .dp-crew-item:last-child{border-right:none}
  }
  @media(max-width:900px){
    .rate-stars{gap:5px}
    .rate-stars button{font-size:18px}
    .coll-hero{padding:28px var(--edge);flex-direction:column;align-items:center;text-align:center;gap:24px}
    .coll-art{width:190px}
    .coll-info{min-width:unset;width:100%}
    .coll-meta{justify-content:center}
    .coll-actions{justify-content:center}
    .carousel .card{width:150px}.carousel .card.wide{width:216px}
    .featured .carousel .card{width:200px}.featured .carousel .card.wide{width:272px}
    .ep-card{width:260px}
    #player.min{width:260px;height:146px;bottom:14px;right:14px}
    .p-pause{padding:0 44px 120px}
    .p-pause-title{font-size:36px}
    .p-pause-logo{max-height:110px}
  }
  /* ── Status-bar dark veil: shown only when scrolled past the top (mobile only) */
  #topFrost{display:none;position:fixed;top:0;left:0;right:0;z-index:8;
    height:calc(var(--pill-clear) + 24px);
    background:linear-gradient(to bottom,
      #000 0%,rgba(0,0,0,.87) 15%,rgba(0,0,0,.7) 30%,
      rgba(0,0,0,.51) 45%,rgba(0,0,0,.34) 60%,rgba(0,0,0,.17) 75%,
      rgba(0,0,0,.05) 90%,transparent 100%);
    pointer-events:none;opacity:0;transition:opacity .4s cubic-bezier(.4,0,.2,1)}
  /* ── Mobile bottom tab bar ──────────────────────────────────────────────── */
  /* SOLID background (no backdrop-filter): a frosted bar must re-blur the
     content behind it on every scroll frame, which is expensive on phones and
     made scrolling janky. A solid fill is free and, because padding-bottom
     extends the SAME solid colour through the home-indicator safe area, there
     is no "black strip" — the bar and the safe area are one continuous block. */
  #tabBar{
    display:none;       /* shown only inside @media(max-width:680px) */
    position:fixed;bottom:0;left:0;right:0;z-index:100;
    background:#0d0d12;
    border-top:1px solid rgba(255,255,255,.07);
    padding-bottom:env(safe-area-inset-bottom);
    align-items:stretch}
  .tab-btn{
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:4px;
    padding:8px 4px;background:none;border:none;cursor:pointer;
    color:var(--faint);font-size:10px;font-weight:600;letter-spacing:.03em;
    transition:color .15s var(--ease)}
  .tab-btn .svgi{width:22px;height:22px}
  .tab-btn.active{color:var(--accent)}
  /* Library section picker sheet — slides up above the tab bar */
  #tabLibPicker{
    display:none;position:fixed;
    bottom:calc(var(--tab-h) + env(safe-area-inset-bottom));
    left:0;right:0;z-index:99;
    background:rgba(15,15,19,.96);
    backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    -webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    border-top:1px solid rgba(255,255,255,.08);
    border-radius:var(--radius-lg) var(--radius-lg) 0 0;
    padding:16px 24px;
    transform:translateY(100%);
    transition:transform .25s var(--ease),opacity .2s;
    opacity:0}
  #tabLibPicker.open{display:block;transform:translateY(0);opacity:1}
  .tab-lib-option{
    display:flex;align-items:center;gap:12px;width:100%;
    padding:14px 4px;border:none;background:none;text-align:left;
    color:var(--text);font-size:16px;font-weight:500;cursor:pointer;
    border-bottom:1px solid var(--line)}
  .tab-lib-option:last-child{border-bottom:none}
  .tab-lib-option .svgi{width:20px;height:20px;color:var(--accent)}
  /* iOS "Add to Home Screen" install hint — shown only in browser mode, mobile only */
  #installHint{
    display:none;position:fixed;
    bottom:calc(var(--tab-h) + env(safe-area-inset-bottom));
    left:0;right:0;z-index:98;
    background:rgba(10,10,14,.94);
    backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    -webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    border-top:1px solid rgba(255,255,255,.08);
    padding:10px 14px;align-items:center;gap:10px}
  #installHint .ih-arrow{
    flex:0 0 28px;width:28px;height:28px;
    background:rgba(255,255,255,.07);
    display:flex;align-items:center;justify-content:center}
  #installHint .ih-arrow .svgi{width:14px;height:14px;transform:rotate(-90deg);color:var(--accent)}
  #installHint .ih-text{flex:1;font-size:12px;line-height:1.35;color:var(--dim)}
  #installHint .ih-text b{color:var(--text);font-weight:600}
  #installHint .ih-dismiss{
    flex:0 0 auto;background:none;border:none;cursor:pointer;
    color:var(--faint);padding:4px}
  #installHint .ih-dismiss .svgi{width:14px;height:14px}
  @media(max-width:680px){#installHint.visible{display:flex}}
  /* Below this, even the persistent 240px sidebar column gets too tight
     for both itself and a usable content column, so it becomes an
     off-canvas drawer over a scrim instead. */
  @media(max-width:680px){
    :root{--edge:24px}
    .rail-arrow,.hub-ca{display:none}
    /* ── DOCUMENT SCROLL (not inner-container scroll) ──────────────────────
       The desktop layout scrolls .main (an inner overflow:auto element) inside
       a fixed-height shell. iOS Safari only shrinks its address bar when the
       ROOT DOCUMENT scrolls — an inner scroll container never triggers it, so
       the toolbar stayed full-size and the usable viewport never grew. Here we
       unwind every height/overflow lock so the page itself is the scroller:
       html scrolls, the bar collapses, and the layout uses the real viewport. */
    html{height:auto;overflow-x:clip}
    body{height:auto;overflow:visible}
    #app{height:auto;min-height:100svh}
    .shell{display:block;height:auto;min-height:100svh}
    .main{overflow:visible;height:auto;scroll-behavior:auto}
    /* Status-bar veil: visible only when scrolled away from top */
    #topFrost{display:block}
    body.scrolled-down #topFrost{opacity:1}
    /* Tab bar replaces sidebar + hamburger entirely on mobile */
    #tabBar{display:flex}
    #menuToggle{display:none}
    .searchbox{display:none}
    .sidebar{display:none !important}
    .scrim-nav{display:none !important}
    /* Content clears the fixed tab bar at the bottom of the scroll */
    .content{padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom) + 16px)}
    /* Collapse toggle is desktop-only */
    .nav-collapse-btn{display:none}
    /* libNav: pills float at the top with no frosted backing */
    #libNav{left:0;right:0;top:0;padding:env(safe-area-inset-top) var(--edge) 10px;
      overflow-x:auto;-webkit-overflow-scrolling:touch;
      scrollbar-width:none;justify-content:flex-start}
    #libNav::-webkit-scrollbar{display:none}
    #libNavName{display:none}
    /* Back button disappears when the library pill bar is showing */
    body:has(#libNav.visible) #mobileBack{display:none !important}
  }
  @media(max-width:560px){
    .p-vol{display:none}
    /* ---- MOBILE HERO — keep full-bleed, use 4:3ish crop so it's not too squat ---- */
    .hero{aspect-ratio:unset;height:75vw;min-height:260px;max-height:80vw;justify-content:flex-end}
    .hero-bg-img,.hero-video{inset:0;width:100%;height:100%;object-fit:cover;object-position:center 20%}
    .hero-top{padding:0 var(--edge) 0;text-align:center}
    .hero-bottom{padding:12px var(--edge) 24px}
    .hero h2{font-size:clamp(22px,7.5vw,34px)}
    .hero .title-logo{height:60px;max-width:min(260px,72vw);width:100%;
      object-fit:contain;object-position:center bottom;margin:0 auto}
    .hero-tagline{display:none}
    .hero-kicker{display:none}
    .hero-actions{justify-content:center}
    .hero-trailer-ctrls{bottom:80px}
    /* Hub carousel on mobile: same editorial look, stacked content */
    .hub-carousel{aspect-ratio:unset;height:calc(100vw * .75 + 180px);max-height:unset;min-height:unset}
    .hub-cs-slide{padding:0 var(--edge) 48px;justify-content:flex-end;align-items:flex-start}
    .hub-carousel .hero-top,.hub-carousel .hero-bottom{text-align:left;width:100%}
    .hub-carousel .hero-meta{justify-content:flex-start}
    .hub-carousel .ratings-row{display:none}
    .hub-carousel .hero-actions{justify-content:flex-start}
    .hub-carousel .title-logo{max-height:80px;max-width:min(68%,300px);object-position:left bottom;margin:0 0 8px}
    .hub-carousel .hero-top h2{font-size:clamp(20px,6.5vw,32px)}
    .hub-carousel-dots{bottom:16px;left:0;right:0;justify-content:center;padding:6px 0}
    /* Editorial cards — stack vertically on mobile */
    .editorial-card{grid-template-columns:1fr;grid-template-rows:auto auto auto;padding:20px 0 28px}
    .ec-art{grid-column:1;grid-row:1;width:82%;aspect-ratio:1/1}
    .ec-art::after{background:linear-gradient(to bottom,transparent 62%,var(--bg) 97%)}
    .ec-title{grid-column:1;grid-row:2;padding:0 var(--edge);margin-top:-28px;align-self:start;text-align:left}
    .ec-title .ec-logo{margin-left:0;object-position:left center}
    .ec-title h3{font-size:clamp(20px,7vw,32px)}
    .ec-meta{grid-column:1;grid-row:3;padding:10px var(--edge) 0;text-align:left}
    .ec-summary{-webkit-line-clamp:3}
    .next-up{right:12px;left:12px;width:auto;bottom:100px}
    .carousel .card{width:130px}.carousel .card.wide{width:188px}
    .featured .carousel .card{width:170px}
    /* Detail page v2 mobile: single-column, poster full-width */
    .dp-title{font-size:clamp(26px,7.5vw,40px)}
    .dp-summary-body{grid-template-columns:20px 1fr;gap:0 12px}
    .dp-squiggle{width:20px}
    .ep-card{width:220px}
    .coll-art{width:120px}
    .coll-hero{gap:20px}
    .ep-row{gap:10px;padding:8px 4px}
    .ep-row-num{flex:0 0 18px;font-size:12px}
    .ep-row-thumb{flex:0 0 96px}
    .ep-row-dur{font-size:12px;padding-left:8px}
    .lib-toolbar .lib-title{font-size:18px}
    .lib-ctrl .cap{display:none}
    .lib-menu{max-width:calc(100vw - 24px)}

    .searchbox:focus-within{width:min(72vw,260px)}
    /* Mobile search landing: min-height reaches the tab bar top so the flex
       spacer always fills the gap between the last content item and the tab bar.
       Do NOT subtract safe-area-inset-top — the spacer needs that extra room. */
    .mobile-search-landing{display:flex;flex-direction:column;
      min-height:calc(100dvh - var(--tab-h) - env(safe-area-inset-bottom))}
    .ms-spacer{flex:1}
    .ms-hero{padding:calc(var(--pill-clear) + 8px) 16px 24px;
      background:linear-gradient(to bottom,rgba(255,255,255,.05) 0%,transparent 80%)}
    .ms-hero h2{font-size:34px;font-weight:800;letter-spacing:-.03em;line-height:1}
    .search-head{margin:0 16px 8px}
    .ms-field{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.08);
      border-radius:0;padding:13px 16px;margin-top:12px}
    .ms-field .svgi{width:18px;height:18px;color:var(--dim);flex:0 0 auto}
    .ms-field input{flex:1;background:none;border:none;color:var(--text);font-size:16px;
      outline:none;-webkit-appearance:none}
    .ms-field input::placeholder{color:var(--dim)}

    /* Player chrome: tighten controls so nothing overflows narrow screens. */
    /* ---- Mobile player redesign ---- */
    /* Panel: bottom sheet on mobile */
    .p-panel{top:auto;left:0;right:0;bottom:0;width:100%;height:min(62vh,520px);
      transform:translateY(100%);border-left:none;
      border-top:1px solid var(--frost-border)}
    .p-panel.show{transform:translateY(0)}
    .p-panel::before{content:"";display:block;width:36px;height:2px;
      background:rgba(255,255,255,.22);
      margin:10px auto 0;flex-shrink:0}
    .p-panel-head{justify-content:flex-end;padding:8px 12px 4px}
    .p-top{padding:max(env(safe-area-inset-top),14px) 14px 12px;gap:10px}
    .p-top .pt .pt-main{font-size:14px}
    .p-top .pt .pt-sub{font-size:11px}
    /* Bottom: stack seek → time → transport → options */
    .p-bottom{padding:0 16px max(env(safe-area-inset-bottom),20px)}
    .p-seek{padding:10px 2px 4px}
    .p-seek-track{height:4px}
    .p-seek-track:hover,.p-seek-track:focus-visible{height:6px}
    .p-ctrl-wrap{flex-direction:column;align-items:stretch;gap:0;padding:0}
    /* Time row: current left, duration right */
    .p-ctl-left{justify-content:space-between;padding:8px 2px 12px}
    .p-time{margin:0;font-size:12px;color:var(--dim)}
    /* Transport row: large centered buttons */
    .p-ctl-center{justify-content:center;gap:12px;padding:0 0 14px}
    .pbtn.play-main{width:64px;height:64px;border-radius:0;font-size:26px}
    .pbtn.bare.skip{width:50px;height:50px;border-radius:0;font-size:20px}
    #prevEpBtn,#nextEpBtn{width:44px;height:44px}
    /* Options row: centered secondary controls */
    .p-ctl-right{justify-content:center;gap:18px;padding-bottom:6px}
    #pipBtn{display:none}
    #castBtn.casting{color:var(--accent)}
    /* Pause overlay: centered on mobile */
    #player.paused .p-pause{opacity:0;visibility:hidden}
    .p-pause-logo{max-height:72px;max-width:min(72vw,280px);object-position:center bottom}
    .p-pause-title{font-size:24px}
    .p-pause-sub{font-size:12px}
    .p-pause-desc{font-size:13px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .p-pause-resume{align-self:center;padding:10px 24px;font-size:14px}
    /* Skip intro: slightly higher to clear the transport row */
    .skip-marker{right:50%;transform:translateX(50%);bottom:160px}
    #player.idle .skip-marker{bottom:100px}
    /* Next up: full width on mobile */
    .next-up{left:16px;right:16px;width:auto;bottom:180px}
    .p-menu{min-width:220px;max-width:calc(100vw - 24px)}
    /* Settings hub rows: stack label above buttons so long hub names don't squish */
    .settings-row:has(.rail-style-btns){flex-direction:column;align-items:flex-start;gap:8px}
    /* Toggle rows: keep toggle pinned to the right */
    .settings-row .toggle-btn{margin-left:auto}
  }
</style>
</head>
<body>

<a href="#content" class="skip-link">Skip to content</a>

<!-- Ambient UltraBlur underlay: a single fixed, blurred color wash derived
     from the current page's artwork. Hidden on flat grid/list pages. -->
<div id="ultraBlur" aria-hidden="true">
  <div class="ub-layer" id="ubA"></div>
  <div class="ub-layer" id="ubB"></div>
  <div class="ub-scrim"></div>
</div>
<div id="navBar" aria-hidden="true"></div>

<!-- LOGIN -->
<div id="login">
  <div class="logo-lockup"><span class="svgi" style="--i:url('assets/images/icons/ui/popcorn-duotone.svg')" aria-hidden="true"></span><h1>Hume</h1></div>
  <p>Sign in with your Plex account to stream your video library. Your password never touches this app.</p>
  <button class="btn lg" id="signInBtn"><span class="svgi" style="--i:url('assets/images/icons/ui/sign-in.svg')" aria-hidden="true"></span> Sign in with Plex</button>
  <div id="loginErr" class="err hidden" style="margin:0;max-width:420px" role="alert"></div>
</div>

<!-- SERVERS -->
<div id="servers">
  <h1>Choose a server</h1>
  <div id="serverList"></div>
  <button class="btn glass" id="logoutFromServers" style="margin-top:12px"><span class="svgi" style="--i:url('assets/images/icons/ui/sign-out.svg')" aria-hidden="true"></span> Sign out</button>
</div>

<!-- APP -->
<div id="app">
  <div class="scrim-nav" id="scrimNav"></div>
  <div id="topFrost" aria-hidden="true"></div>
  <div id="tabBar" role="tablist" aria-label="Main navigation">
    <button class="tab-btn" id="tabHome"      role="tab" aria-label="Home"></button>
    <button class="tab-btn" id="tabLib"       role="tab" aria-label="Library"></button>
    <button class="tab-btn" id="tabPlaylists" role="tab" aria-label="Playlists"></button>
    <button class="tab-btn" id="tabSearch"    role="tab" aria-label="Search"></button>
    <button class="tab-btn" id="tabSettings"  role="tab" aria-label="Settings"></button>
  </div>
  <div id="tabLibPicker" role="dialog" aria-label="Choose library"></div>
  <div id="installHint" role="status" aria-live="polite">
    <div class="ih-arrow"><span class="svgi" style="--i:url('assets/images/icons/ui/arrow-right.svg')" aria-hidden="true"></span></div>
    <span class="ih-text">Tap <b>Share</b> then <b>Add to Home Screen</b> for a full-screen experience</span>
    <button class="ih-dismiss" id="installHintDismiss" aria-label="Dismiss">
      <span class="svgi" style="--i:url('assets/images/icons/ui/x.svg')" aria-hidden="true"></span>
    </button>
  </div>
  <div class="shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand"><span class="svgi" style="--i:url('assets/images/icons/ui/popcorn-duotone.svg')" aria-hidden="true"></span><b>Hume</b><span class="ver">v0.4</span></div>
      <nav class="nav" id="nav" aria-label="Main"></nav>
      <div class="sidebar-foot">
        <button class="nav-item nav-collapse-btn" id="navCollapse" aria-label="Collapse sidebar" title="Collapse sidebar" aria-expanded="true"><span class="svgi" style="--i:url('assets/images/icons/ui/back.svg')" aria-hidden="true"></span><span class="nav-text">Collapse</span></button>
        <button class="nav-item" id="logoutBtn" aria-label="Sign out" title="Sign out"><span class="svgi" style="--i:url('assets/images/icons/ui/sign-out.svg')" aria-hidden="true"></span><span class="nav-text">Sign out</span></button>
      </div>
    </aside>
    <main class="main" id="main">
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation" aria-expanded="false"><span class="svgi" style="--i:url('assets/images/icons/ui/list.svg')" aria-hidden="true"></span></button>
      <button class="menu-toggle" id="mobileBack" aria-label="Go back" style="display:none" onclick="history.back()"><span class="svgi" style="--i:url('assets/images/icons/ui/back.svg')" aria-hidden="true"></span></button>
      <div id="libNav" aria-label="Library navigation"></div>
      <div class="searchbox" id="searchBox" role="search">
        <span class="svgi" style="--i:url('assets/images/icons/ui/magnifying-glass.svg')" aria-hidden="true"></span>
        <label class="sr-only" for="search">Search</label>
        <input id="search" placeholder="Search" autocomplete="off">
      </div>
      <h1 id="viewTitle" class="sr-only">Home</h1>
      <div class="content" id="content" tabindex="-1"><div class="loading">Loading…</div></div>
    </main>
  </div>
</div>

<!-- PLAYER -->
<div id="player" role="dialog" aria-modal="true" aria-label="Video player">
  <div class="p-backdrop" id="pBackdrop"></div>
  <video id="video" playsinline x-webkit-airplay="allow"></video>
  <div class="p-pause" id="pPause">
    <img class="p-pause-logo hidden" id="pPauseLogo" alt="">
    <div class="p-pause-title" id="pPauseTitle"></div>
    <div class="p-pause-sub hidden" id="pPauseSub"></div>
    <div class="p-pause-desc hidden" id="pPauseDesc"></div>
    <button class="p-pause-resume" id="pauseResume"><span class="svgi" style="--i:url('assets/images/icons/ui/play-fill.svg')" aria-hidden="true"></span><span>Resume</span></button>
  </div>
  <button class="skip-marker" id="skipIntro" hidden>Skip Intro</button>
  <div class="next-up" id="nextUp">
    <img id="nuImg" alt=""><div class="nu-body"><div class="nu-k">Up next</div>
    <div class="nu-t" id="nuTitle"></div>
    <div class="nu-actions">
      <button class="btn" id="nuPlay" style="padding:8px 16px;font-size:13px"><span class="svgi" style="--i:url('assets/images/icons/ui/play-fill.svg')" aria-hidden="true"></span> Play now</button>
      <button class="btn glass" id="nuCancel" style="padding:8px 16px;font-size:13px">Cancel</button>
    </div></div>
  </div>
  <div id="toast" role="status" aria-live="polite"></div>
  <div class="p-spinner hidden" id="pSpinner" role="status" aria-live="polite"><div class="ring"></div><span id="pSpinnerText">Loading</span></div>
  <!-- Top bar: [close + minimize] | [title centered] | [status + settings] -->
  <div class="p-top" id="pTop">
    <div class="p-top-left">
      <button class="pbtn" id="closePlayer" title="Close" aria-label="Close player"><span class="svgi" style="--i:url('assets/images/icons/ui/back.svg')" aria-hidden="true"></span></button>
      <button class="pbtn" id="minPlayer" title="Minimize" aria-label="Minimize player"><span class="svgi" style="--i:url('assets/images/icons/ui/corners-in.svg')" aria-hidden="true"></span></button>
    </div>
    <div class="pt" id="pTitle"></div>
    <div class="p-top-right">
      <div class="p-status hidden" id="pStatus" role="status"><span class="dot" aria-hidden="true"></span><span id="pStatusText"></span></div>

<script>
"use strict";
console.log("Hume v0.4");

/* ============================================================ CONFIG */
const PRODUCT="Hume";
const PLEX_TV="https://plex.tv";
const LS={clientId:"hume_cid",token:"hume_token",server:"hume_server",railStyles:"hume_rail_styles",navCollapsed:"hume_nav_collapsed",font:"hume_font",detailArt:"hume_detail_art",tvMode:"hume_tv_mode",heroStyle:"hume_hero_style",hubSummaries:"hume_hub_summaries",watchedBadges:"hume_watched_badges",spoilerBlur:"hume_spoiler_blur"};
const SETTINGS_WORKER="https://hume-settings.contactdavidbusch.workers.dev";

/* ---- FONT THEMING ---- */
const FONT_STACKS={
  circular:"'Circular','SF Pro Display',-apple-system,BlinkMacSystemFont,system-ui,sans-serif",
  inter:"'Inter','SF Pro Text',-apple-system,BlinkMacSystemFont,system-ui,sans-serif",
  outfit:"'Outfit','SF Pro Display',-apple-system,BlinkMacSystemFont,system-ui,sans-serif",
};
function _loadGFont(family){
  const id="gf-"+family.toLowerCase(); if(document.getElementById(id)) return;
  const l=document.createElement("link"); l.id=id; l.rel="stylesheet";
  l.href=`https://fonts.googleapis.com/css2?family=${family.replace(/ /g,"+")}:wght@400;500;600;700;800;900&display=swap`;
  document.head.appendChild(l);
}
// Typography is fixed: Inter for body/UI, Playfair Display for all headings.
// (applyFont ignores its argument — kept as a no-op shim for legacy callers.)
function applyFont(){
  document.documentElement.style.setProperty("--font",FONT_STACKS.inter);
  _loadGFont("Inter"); _loadGFont("Playfair Display");
}
applyFont();
// Restore TV mode (applies body class before paint so cursor:none is immediate)
if(localStorage.getItem(LS.tvMode)==="1") document.body.classList.add("tv-mode");

/* ---- GENRE COLOURS ---- */
// All palette entries calibrated for:
//  (a) white text contrast — luminance kept below 155
//  (b) duotone visibility — mid-range luminance (90-145) so multiply-blending
//      a grayscale image produces visible highlights, not a near-black wash.
//  Dark originals (deep-purple, forest, maroon, black) replaced with
//  vivid mid-luminance equivalents.
const GENRE_COLORS={
  action:"#C14F30",adventure:"#BF8E00",animation:"#4CAF40",
  comedy:"#BF8E00",crime:"#A8386F",documentary:"#1E8A7A",
  drama:"#6B5BD6",fantasy:"#6B5BD6",history:"#C14F30",
  horror:"#4A5AA5",music:"#15A9FC",mystery:"#A8386F",
  romance:"#F74366","science fiction":"#15A9FC","sci-fi":"#15A9FC",
  sport:"#4CAF40",sports:"#4CAF40",thriller:"#A8386F",
  war:"#1E8A7A",western:"#C14F30",family:"#15A9FC",
  kids:"#F74366",anime:"#F74366",biography:"#6B5BD6",
  reality:"#F74366",suspense:"#A8386F",short:"#1E8A7A",
};
const _GENRE_CLR_POOL=["#C14F30","#15A9FC","#F74366","#6B5BD6","#1E8A7A","#A8386F","#BF8E00","#4CAF40"];
function genreColor(name){
  const k=(name||"").toLowerCase();
  if(GENRE_COLORS[k]) return GENRE_COLORS[k];
  let h=0; for(let i=0;i<k.length;i++) h=(h*31+k.charCodeAt(i))&0xFF;
  return _GENRE_CLR_POOL[h%_GENRE_CLR_POOL.length];
}

/* ---- CROSS-DEVICE SETTINGS SYNC (Cloudflare Worker + KV) ----
   Keyed by a stable, opaque hash of the Plex ACCOUNT id (same on every
   device for a given account) — NOT the server token, which can differ
   per device/login. FNV-1a is used instead of crypto.subtle so it works
   in any context (http/https/file); the key only needs to be deterministic
   and opaque, not cryptographically strong. No credentials ever leave the
   client. */
let _syncState="idle";          // idle | ok | unavailable
function _fnv1a(str){
  let h=0x811c9dc5;
  for(let i=0;i<str.length;i++){ h^=str.charCodeAt(i); h=Math.imul(h,0x01000193); }
  return (h>>>0).toString(16).padStart(8,"0");
}
// Resolve (and cache) a per-account sync key. Prefers the Plex account uuid/id
// from plex.tv; falls back to the server token only if that lookup fails.
async function accountKey(){
  let cached=localStorage.getItem("hume_synckey");
  if(cached) return cached;
  let id="";
  try{
    const r=await fetch(`${PLEX_TV}/api/v2/user`,{headers:plexHeaders(accountToken)});
    if(r.ok){ const u=await r.json(); id=String(u.uuid||u.id||""); }
  }catch(_){}
  if(!id && server&&server.token) id=server.token;   // fallback identity
  if(!id) return null;
  const key=_fnv1a("hume:"+id);
  localStorage.setItem("hume_synckey",key);
  return key;
}
async function loadRemoteSettings(){
  try{
    const key=await accountKey(); if(!key){ _syncState="unavailable"; return false; }
    const r=await fetch(`${SETTINGS_WORKER}/?token=${key}`);
    if(!r.ok) throw new Error("HTTP "+r.status);
    const remote=await r.json();
    let changed=false;
    if(remote && typeof remote==="object"){
      if(remote[LS.railStyles]){
        const next=JSON.stringify(remote[LS.railStyles]);
        if(next!==localStorage.getItem(LS.railStyles)){ localStorage.setItem(LS.railStyles,next); changed=true; }
      }
      if(remote[LS.navCollapsed]!=null){
        const next=String(remote[LS.navCollapsed]);
        if(next!==localStorage.getItem(LS.navCollapsed)){ localStorage.setItem(LS.navCollapsed,next); changed=true; }
      }
      if(remote[LS.detailArt]==="backdrop"||remote[LS.detailArt]==="square"){
        const next=remote[LS.detailArt];
        if(next!==localStorage.getItem(LS.detailArt)){ localStorage.setItem(LS.detailArt,next); changed=true; }
      }
      if(remote[LS.heroStyle]==="backdrop"||remote[LS.heroStyle]==="square"){
        const next=remote[LS.heroStyle];
        if(next!==localStorage.getItem(LS.heroStyle)){ localStorage.setItem(LS.heroStyle,next); changed=true; }
      }
      if(remote[LS.hubSummaries]==="0"||remote[LS.hubSummaries]==="1"){
        const next=remote[LS.hubSummaries];
        if(next!==localStorage.getItem(LS.hubSummaries)){ localStorage.setItem(LS.hubSummaries,next); changed=true; }
      }
    }
    _syncState="ok";
    return changed;
  }catch(e){ _syncState="unavailable"; console.warn("[sync] load failed:",e.message); return false; }
}
let _pushTimer=null;
function pushRemoteSettings(){
  clearTimeout(_pushTimer);
  _pushTimer=setTimeout(async()=>{
    try{
      const key=await accountKey(); if(!key){ _syncState="unavailable"; return; }
      const payload={
        [LS.railStyles]:getRailStyles(),
        [LS.navCollapsed]:localStorage.getItem(LS.navCollapsed)||"0",
        [LS.font]:localStorage.getItem(LS.font)||"circular",
        [LS.detailArt]:localStorage.getItem(LS.detailArt)||"backdrop",
        [LS.heroStyle]:localStorage.getItem(LS.heroStyle)||"backdrop",
        [LS.hubSummaries]:localStorage.getItem(LS.hubSummaries)||"0",
      };
      const r=await fetch(`${SETTINGS_WORKER}/?token=${key}`,{method:"PUT",body:JSON.stringify(payload)});
      _syncState=r.ok?"ok":"unavailable";
      if(!r.ok) console.warn("[sync] save failed: HTTP",r.status);
    }catch(e){ _syncState="unavailable"; console.warn("[sync] save failed:",e.message); }
  },800);  // debounce: batch rapid changes into one write
}
// Lightweight status probe (read-only, no localStorage mutation) for the UI.
async function pingSync(){
  try{
    const key=await accountKey(); if(!key) return "unavailable";
    const r=await fetch(`${SETTINGS_WORKER}/?token=${key}`);
    return (_syncState=r.ok?"ok":"unavailable");
  }catch(_){ return (_syncState="unavailable"); }
}
const VIDEO_TYPES=["movie","show","season","episode","clip"];

function clientId(){
  let id=localStorage.getItem(LS.clientId);
  if(!id){ id="hume-"+crypto.randomUUID(); localStorage.setItem(LS.clientId,id); }
  return id;
}
function plexHeaders(token){
  const h={"Accept":"application/json","X-Plex-Product":PRODUCT,"X-Plex-Version":"1.0",
    "X-Plex-Client-Identifier":clientId(),"X-Plex-Platform":"Web","X-Plex-Device":"Browser"};
  if(token) h["X-Plex-Token"]=token;
  return h;
}
const $=s=>document.querySelector(s);
const el=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};

document.addEventListener('click',e=>{if(e.target.closest('button')&&navigator.vibrate)navigator.vibrate(1);},{capture:true,passive:true});
window.addEventListener('scroll',()=>{document.body.classList.toggle('scrolled-down',window.scrollY>0);},{passive:true});
/* ============================================================ STATE */
let accountToken=localStorage.getItem(LS.token)||null;
let server=JSON.parse(localStorage.getItem(LS.server)||"null");
let sections=[];

/* ============================================================ AUTH */
$("#signInBtn").addEventListener("click",startLogin);
$("#logoutBtn").addEventListener("click",logout);
$("#logoutFromServers").addEventListener("click",logout);

async function startLogin(){
  $("#loginErr").classList.add("hidden");
  const popup=window.open("about:blank","plexAuth","width=620,height=720");
  try{
    const pinRes=await fetch(`${PLEX_TV}/api/v2/pins?strong=true`,{method:"POST",headers:plexHeaders()});
    const pin=await pinRes.json();
    const url=`https://app.plex.tv/auth#?clientID=${encodeURIComponent(clientId())}`
      +`&code=${pin.code}&context%5Bdevice%5D%5Bproduct%5D=${encodeURIComponent(PRODUCT)}`;
    if(popup) popup.location.href=url;
    const token=await pollPin(pin.id);
    if(popup) popup.close();
    if(!token) throw new Error("Login timed out. Try again.");
    accountToken=token; localStorage.setItem(LS.token,token);
    await afterLogin();
  }catch(e){ if(popup)popup.close(); loginErr(e.message||"Login failed"); }
}
function pollPin(id){
  return new Promise(res=>{
    let n=0;
    const iv=setInterval(async()=>{
      n++;
      try{ const r=await fetch(`${PLEX_TV}/api/v2/pins/${id}`,{headers:plexHeaders()});
        const d=await r.json(); if(d.authToken){clearInterval(iv);res(d.authToken);} }catch(_){}
      if(n>120){clearInterval(iv);res(null);}
    },1000);
  });
}
function loginErr(m){ const e=$("#loginErr"); e.textContent=m; e.classList.remove("hidden"); }
function logout(){ localStorage.removeItem(LS.token); localStorage.removeItem(LS.server);
  localStorage.removeItem("hume_synckey");
  accountToken=null; server=null; location.reload(); }

/* ============================================================ SERVER */
async function discoverServers(){
  const r=await fetch(`${PLEX_TV}/api/v2/resources?includeHttps=1&includeRelay=1`,
    {headers:plexHeaders(accountToken)});
  return (await r.json()).filter(x=>(x.provides||"").includes("server"));
}
function orderConns(c){ return [...c].sort((a,b)=>{ const s=x=>(x.local?0:1)+(x.relay?2:0); return s(a)-s(b); }); }
async function probe(uri,token){
  const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),3500);
  try{ const r=await fetch(`${uri}/identity`,{headers:plexHeaders(token),signal:ctrl.signal});
    clearTimeout(t); return r.ok; }catch(_){ clearTimeout(t); return false; }
}
async function pickConnection(res){
  for(const c of orderConns(res.connections||[]))
    if(await probe(c.uri,res.accessToken))
      return {name:res.name,uri:c.uri,token:res.accessToken,local:c.local,relay:c.relay};
  return null;
}
async function showServerPicker(servers){
  $("#login").style.display="none"; $("#servers").style.display="flex";
  const wrap=$("#serverList"); wrap.innerHTML="<div class='loading'>Testing connections…</div>";
  const results=[];
  for(const s of servers){ const c=await pickConnection(s); if(c) results.push(c); }
  if(!results.length){
    wrap.innerHTML="";
    const box=el("div","err err-offline"); box.setAttribute("role","alert");
    box.innerHTML=`${svgIcon("wifi-slash")}
      <div><b>Can't reach your Plex server</b><div>Make sure it's online and reachable from this device, then try again.</div></div>`;
    const b=el("button","btn glass sm"); b.innerHTML=`${svgIcon("arrow-clockwise")} Try Again`;
    b.onclick=()=>showServerPicker(servers);
    box.appendChild(b); wrap.appendChild(box);
    return;
  }
  wrap.innerHTML="";
  results.forEach(c=>{
    const card=el("div","server-card");
    const tag=c.local?"<span class='badge'>Local</span>":(c.relay?"<span class='badge relay'>Relay</span>":"<span class='badge remote'>Remote</span>");
    card.innerHTML=`<div><div class="sn">${esc(c.name)}</div><div class="meta">${tag} ${new URL(c.uri).host}</div></div>`;
    const b=el("button","btn"); b.innerHTML=`${svgIcon("plug")} Connect`;
    b.onclick=()=>selectServer(c); card.appendChild(b); wrap.appendChild(card);
  });
}
function selectServer(c){ server=c; localStorage.setItem(LS.server,JSON.stringify(c));
  $("#servers").style.display="none"; bootApp(); }

/* ============================================================ API
   Stale-while-revalidate: return cached data immediately (zero flicker on
   revisit) then silently revalidate in the background so fresh data is ready
   for the next interaction. Cache TTL is 5 minutes for stale tolerance,
   but revalidation fires after 60s so data is never more than 60s stale
   for the subsequent render. */
const _apiCache=new Map();
const _apiBg=new Set();
const _apiInflight=new Map(); // dedup concurrent requests for the same path
/* Persistent API cache (IndexedDB).
   The in-memory Map above dies on reload; persisting it means a cold start
   paints from the last session's data, then stale-while-revalidate quietly
   refreshes it — exactly how a native app feels. Hydration is lazy (per path,
   on first touch) so boot only reads the handful of responses the first screen
   needs, not the whole store. Bounded by count + age so it can't grow forever. */
const IDB_NAME="hume-cache", IDB_STORE="api", IDB_MAX=220, IDB_TTL=864e5; // 24h
const _idbTried=new Set();
function idbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(IDB_NAME,1);
    r.onupgradeneeded=()=>{ const db=r.result; if(!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE); };
    r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
  });
}
function idbGet(key){
  return idbOpen().then(db=>new Promise(res=>{
    const r=db.transaction(IDB_STORE,"readonly").objectStore(IDB_STORE).get(key);
    r.onsuccess=()=>res(r.result||null); r.onerror=()=>res(null);
  })).catch(()=>null);
}
function idbSet(key,val){
  idbOpen().then(db=>{ db.transaction(IDB_STORE,"readwrite").objectStore(IDB_STORE).put(val,key); }).catch(()=>{});
}
function idbDel(keys){
  if(!keys||!keys.length) return;
  idbOpen().then(db=>{ const st=db.transaction(IDB_STORE,"readwrite").objectStore(IDB_STORE); keys.forEach(k=>st.delete(k)); }).catch(()=>{});
}
function idbAllKeys(){
  return idbOpen().then(db=>new Promise(res=>{
    const r=db.transaction(IDB_STORE,"readonly").objectStore(IDB_STORE).getAllKeys();
    r.onsuccess=()=>res(r.result||[]); r.onerror=()=>res([]);
  })).catch(()=>[]);
}
function idbGetAll(){
  return idbOpen().then(db=>new Promise(res=>{
    const out=[], cur=db.transaction(IDB_STORE,"readonly").objectStore(IDB_STORE).openCursor();
    cur.onsuccess=e=>{ const c=e.target.result; if(c){ out.push([c.key,c.value]); c.continue(); } else res(out); };
    cur.onerror=()=>res(out);
  })).catch(()=>[]);
}
// Bound the on-disk cache. Cheap path (under cap) is a single keys-only count;
// only when we're actually over the cap do we read everything to trim oldest +
// expired. Runs once at boot, off the critical path. Touched-but-stale entries
// are also cleaned lazily in api() as they're read.
async function pruneIdb(){
  const keys=await idbAllKeys();
  if(keys.length<=IDB_MAX) return;
  const all=await idbGetAll(), now=Date.now(), drop=[];
  let live=all.filter(([k,v])=>{ if(v&&v.ts&&now-v.ts<IDB_TTL) return true; drop.push(k); return false; });
  if(live.length>IDB_MAX){ live.sort((a,b)=>a[1].ts-b[1].ts); live.slice(0,live.length-IDB_MAX).forEach(([k])=>drop.push(k)); }
  idbDel(drop);
}
async function api(path,{_bg=false}={}){
  let hit=_apiCache.get(path);
  // Lazy disk hydration: race IDB against a 25ms timeout so a cold-cache miss
  // never delays the network fetch by more than one tick.
  if(!hit&&!_bg&&!_idbTried.has(path)){
    _idbTried.add(path);
    const disk=await Promise.race([idbGet(path),new Promise(r=>setTimeout(()=>r(null),25))]);
    if(disk&&disk.ts&&Date.now()-disk.ts<IDB_TTL){ _apiCache.set(path,disk); hit=disk; }
    else if(disk){ idbDel([path]); }
  }
  const age=hit?Date.now()-hit.ts:Infinity;
  if(hit&&!_bg){
    // Serve stale immediately; kick off silent revalidation if stale > 60s
    if(age>60000&&!_apiBg.has(path)){
      _apiBg.add(path);
      api(path,{_bg:true}).catch(()=>{}).finally(()=>_apiBg.delete(path));
    }
    return hit.data;
  }
  // Dedup: if a fetch for this path is already in-flight (e.g. from a prefetch),
  // attach to it rather than firing a second identical request.
  if(_apiInflight.has(path)) return _apiInflight.get(path);
  const sep=path.includes("?")?"&":"?";
  const promise=(async()=>{
    let r;
    try{
      r=await fetch(`${server.uri}${path}${sep}X-Plex-Token=${server.token}`,{headers:plexHeaders(server.token)});
    }catch(_){
      if(hit) return hit.data; // offline: serve stale indefinitely
      const err=new Error(`Can't reach ${(server&&server.name)||"your Plex server"}. Check that it's online and try again.`);
      err.offline=true; throw err;
    }
    if(!r.ok) throw new Error(`Server error ${r.status}`);
    const data=(await r.json()).MediaContainer||{};
    const entry={data,ts:Date.now()};
    _apiCache.set(path,entry);
    idbSet(path,entry);   // persist for instant cold-start next session
    return data;
  })();
  _apiInflight.set(path,promise);
  try{ return await promise; }finally{ _apiInflight.delete(path); }
}

// Playlist/collection composite art is server-generated and isn't a valid
// photo-transcoder resource — serve it directly instead.
function isDirectArt(thumb){ return thumb.startsWith("/playlists/")||thumb.includes("/composite/"); }
function img(thumb,w,h){
  if(!thumb) return "";
  if(isDirectArt(thumb)) return imgDirect(thumb,w,h);
  return `${server.uri}/photo/:/transcode?width=${w}&height=${h}&minSize=1&upscale=1`
    +`&url=${encodeURIComponent(thumb)}&X-Plex-Token=${server.token}`;
}
// Logos must keep their full shape. minSize=1 makes Plex scale-to-FILL the WxH
// box and crop the overflow (cover) — that's what chopped "MORTAL KOMBAT" to
// "RTAL KOMI". minSize=0 makes Plex scale-to-FIT inside the box (contain),
// returning the whole logo letterboxed; CSS object-fit handles final placement.
function imgLogo(thumb,w,h){
  if(!thumb) return "";
  return `${server.uri}/photo/:/transcode?width=${w}&height=${h}&minSize=0&upscale=0`
    +`&url=${encodeURIComponent(thumb)}&X-Plex-Token=${server.token}`;
}
// Composite/playlist art is generated on demand from its OWN endpoint and must
// carry explicit width/height — the photo transcoder can't size it, and the
// composite endpoint returns nothing when dimensions are omitted.
function imgDirect(path,w,h){
  if(!path) return "";
  const sep=path.includes("?")?"&":"?";
  const dims=(w?`width=${Math.round(w)}&`:"")+(h?`height=${Math.round(h)}&`:"");
  return `${server.uri}${path}${sep}${dims}minSize=1&upscale=1&X-Plex-Token=${server.token}`;
}
function imgAmbient(thumb){
  if(!thumb) return "";
  if(isDirectArt(thumb)) return imgDirect(thumb,240,240);
  // A small, lightly-blurred source preserves distinct color regions from
  // the artwork; the heavy CSS blur on #ultraBlur turns them into soft,
  // saturated color blobs rather than a single muddy wash.
  return `${server.uri}/photo/:/transcode?width=240&height=240&minSize=1&upscale=1&blur=30`
    +`&url=${encodeURIComponent(thumb)}&X-Plex-Token=${server.token}`;
}
// Spotify-style 2x2 mosaic built from the first few items' thumbs — used as
// cover art for playlists/collections that have no composite/thumb of their own.
function mosaicHTML(items){
  const pics=(items||[]).map(it=>it.thumb||it.parentThumb||it.grandparentThumb).filter(Boolean).slice(0,4);
  if(!pics.length) return "";
  return `<div class="art-mosaic n${pics.length}">`
    +pics.map(t=>`<img src="${img(t,160,160)}" alt="" loading="lazy">`).join("")
    +`</div>`;
}

/* ── TV / D-pad spatial navigation ────────────────────────────────────────
   Arrow keys move focus to the nearest focusable element in that direction
   using a weighted-distance algorithm (primary axis cheap, cross axis costly
   so the cursor doesn't jump diagonally when moving along a rail).
   Works for TV remotes, game controllers, and keyboard users equally. */
function _tvFocusables(){
  return Array.from(document.querySelectorAll(
    "#content button:not([disabled]),#content a[href],.nav-item"
  )).filter(el=>{
    const r=el.getBoundingClientRect();
    return r.width>0&&r.height>0&&r.bottom>0&&r.top<innerHeight+200;
  });
}
function _tvNav(dir){
  const cur=document.activeElement;
  const all=_tvFocusables();
  if(!all.length) return;
  if(!cur||cur===document.body||!all.includes(cur)){
    all[0].focus({preventScroll:true}); return;
  }
  const cr=cur.getBoundingClientRect();
  const cx=cr.left+cr.width/2, cy=cr.top+cr.height/2;
  const horiz=dir==="left"||dir==="right";
  const cands=all.filter(el=>{
    if(el===cur) return false;
    const r=el.getBoundingClientRect();
    if(dir==="right") return r.left   >cr.right -8;
    if(dir==="left")  return r.right  <cr.left  +8;
    if(dir==="down")  return r.top    >cr.bottom-8;
    if(dir==="up")    return r.bottom <cr.top   +8;
  });
  if(!cands.length) return;
  const best=cands.sort((a,b)=>{
    const ra=a.getBoundingClientRect(), rb=b.getBoundingClientRect();
    const ax=ra.left+ra.width/2, ay=ra.top+ra.height/2;
    const bx=rb.left+rb.width/2, by=rb.top+rb.height/2;
    // Primary-axis distance × 1, cross-axis × 4 to prefer straight movement
    const da=horiz?Math.abs(ax-cx)+Math.abs(ay-cy)*4:Math.abs(ay-cy)+Math.abs(ax-cx)*4;
    const db=horiz?Math.abs(bx-cx)+Math.abs(by-cy)*4:Math.abs(by-cy)+Math.abs(bx-cx)*4;
    return da-db;
  })[0];
  best.focus({preventScroll:true});
  // Scroll the horizontal carousel if the card would go off-screen
  const row=best.closest(".carousel,.cast-row,.season-rail");
  if(row){
    const br=best.getBoundingClientRect(), rr=row.getBoundingClientRect();
    if(br.right>rr.right-20) row.scrollLeft+=br.right-rr.right+52;
    else if(br.left<rr.left+20) row.scrollLeft-=rr.left-br.left+52;
  }
  best.scrollIntoView({block:"nearest",inline:"nearest",behavior:"smooth"});
}
function applyTvMode(on){
  document.body.classList.toggle("tv-mode",on);
  localStorage.setItem(LS.tvMode,on?"1":"0");

// Arrow/D-pad keys always active (even without TV mode) for keyboard users
document.addEventListener("keydown",e=>{
  const dir={ArrowLeft:"left",ArrowRight:"right",ArrowUp:"up",ArrowDown:"down"}[e.key];
  if(dir){ e.preventDefault(); _tvNav(dir); return; }
  // Back button (Android TV sends Escape; some remotes send BrowserBack)
  if((e.key==="Escape"||e.key==="BrowserBack")&&!document.querySelector(".modal.open")){
    e.preventDefault(); history.back(); return;
  }
  // Media play/pause key and spacebar-on-player
  if(e.key==="MediaPlayPause"){
    const vid=document.querySelector("#player video");
    if(vid){ e.preventDefault(); vid.paused?vid.play():vid.pause(); }
  }
},true);

/* On mobile the document scrolls (so iOS collapses its toolbar); on desktop the
   inner .main element scrolls. These helpers read/write whichever is active so

function _docScrolls(){ return window.matchMedia("(max-width:680px)").matches; }

async function route(){
  const gen=++_routeGen;
  setScrollY(0);   // fresh navigation starts at top; pages that restore a saved position override this in their render
  $("#content")?.classList.remove("dp-wrap");
  closeSidebar(); closeLibMenus(); cleanupHeroVideo(); cleanupCarousels(); closeTrailerModal(); hideLibNav(); closeTabLibPicker();
  const raw=location.hash.replace(/^#\/?/,"");
  const [pathPart,queryPart]=raw.split("?");
  const parts=pathPart.split("/").filter(Boolean).map(p=>{ try{return decodeURIComponent(p);}catch(_){return p;} });
  const params=new URLSearchParams(queryPart||"");
  const seg=parts[0];
  const mb=$("#mobileBack");
  if(mb) mb.style.display=(!seg||seg==="home")?"none":"flex";
  highlightNav(seg,parts[1]);
  try{
    switch(seg){
      case undefined: case "": case "home": return showHome(gen);
      case "library": {
        const section=sections.find(s=>String(s.key)===parts[1]);
        if(!section) return showHome(gen);

        if(parts[2]==="playlists") return showLibraryPlaylists(section,gen);
        return showLibraryRecommended(section,gen);
      }
      case "movie": { const it=await metaItem(parts[1]); if(gen!==_routeGen) return; return openMovie(it); }
      case "show": { const it=await metaItem(parts[1]); if(gen!==_routeGen) return; return openShow(it,parts[2]==="season"?parts[3]:undefined); }
      case "episode": { const it=await metaItem(parts[1]); if(gen!==_routeGen) return; return openEpisode(it); }
      case "collection": { const it=await metaItem(parts[1]); if(gen!==_routeGen) return; return openCollection({...it,_collection:true}); }
      case "playlist": { const it=await playlistMeta(parts[1]); if(gen!==_routeGen) return; return openPlaylist(it); }
      case "playlists": return showPlaylists(gen);
      case "genre": return showGenrePage();
      case "settings": return showSettings();
      case "actor": return openActor(parts[1]);
      case "see-all": return showSeeAll();
      case "search": {
        const q=params.get("q")||"";
        if($("#search")) $("#search").value=q;
        if(window.innerWidth<=680) return showMobileSearch(q||undefined);
        return q ? runSearch(q) : showHome(gen);

  }catch(e){ if(gen===_routeGen) $("#content").innerHTML=errHTML(e); }
}

/* ---- BILLBOARD CARD + RAIL ----
   Plex image types: backgroundSquare=1:1 art, background=backdrop,
   coverPoster=portrait, clearLogo=transparent title logo.
   Art fallback: backgroundSquare → backdrop (it.art) → poster (it.thumb).
   Logo centered inside art; metadata in blurred-art panel below. */
function billboardCard(it,rank){
  const b=el("button","card billboard");
  const imgs=it.Image||[];
  const squareImg=imgs.find(i=>i.type==="backgroundSquare");
  // For episodes use grandparent (show) art; fallback: backdrop → poster
  const artSrc=img((squareImg&&squareImg.url)||it.art||it.grandparentArt||it.thumb,560,560);
  const logoImg=imgs.find(i=>i.type==="clearLogo");
  const logoSrc=logoImg?imgLogo(logoImg.url,600,300):"";
  // For episodes display show title, not episode title
  const title=it.type==="episode"?(it.grandparentTitle||it.title||""):(it.title||"");
  // Genre only — no Movie/TV type prefix
  const meta=(it.Genre||[]).slice(0,3).map(g=>g.tag).join(" · ");
  b.innerHTML=`
    <div class="art${artSrc?"":" broken"}">
      ${artSrc?`<img loading="lazy" decoding="async" alt="${esc(title)}" src="${artSrc}" onerror="this.closest('.art').classList.add('broken')">`
              :`<span class="art-fallback">${svgIcon(it.type==="show"?"television":"movies")}</span>`}
      ${rank!=null?`<div class="bill-rank">${rank}</div>`:""}
      <div class="play-hover">${svgIcon("play-circle-fill")}</div>
      <div class="bill-logo-wrap">
        ${logoSrc?`<img class="bill-logo" src="${logoSrc}" alt="${esc(title)}" onerror="this.nextElementSibling.style.display='block';this.remove()">`:""}
        <div class="bill-title"${logoSrc?' style="display:none"':''}>${esc(title)}</div>
      </div>
    </div>
    <div class="bill-meta">
      <span class="cs">${esc(meta)}</span>
    </div>`;
  // Wash behind the whole card uses the same art; guarded so broken art falls back
  if(artSrc) b.style.setProperty("--bill-bg",`url('${artSrc.replace(/'/g,"\\'")}')`);
  // Episodes: link to the show page, not the individual episode
  const dest=it.type==="episode"?`/show/${it.grandparentRatingKey||it.ratingKey}`:pathForItem(it);
  b.onclick=()=>{if(dest)navigate(dest);else openItem(it);};
  return b;
}
function squareBoardRailSection(title,items,libLabel,numbered,summary){

  const head=el("div","rail-head");

  const viewport=el("div","rail-viewport");

  items.forEach((it,i)=>bfrag.appendChild(billboardCard(it,numbered?i+1:null)));
  row.appendChild(bfrag);

  prev.innerHTML=svgIcon("caret-down");prev.firstChild.style.transform="rotate(90deg)";

}
