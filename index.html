<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#09090b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Hume</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/favicon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<style>
  @font-face{font-family:'Circular';font-weight:400;font-style:normal;font-display:swap;
    src:url('assets/fonts/Circular/Circular-Book.ttf') format('truetype')}
  @font-face{font-family:'Circular';font-weight:500;font-style:normal;font-display:swap;
    src:url('assets/fonts/Circular/Circular-Medium.ttf') format('truetype')}
  @font-face{font-family:'Circular';font-weight:700;font-style:normal;font-display:swap;
    src:url('assets/fonts/Circular/Circular-Bold.ttf') format('truetype')}
  @font-face{font-family:'Circular';font-weight:900;font-style:normal;font-display:swap;
    src:url('assets/fonts/Circular/Circular-Black.ttf') format('truetype')}
  :root{
    --bg:#0a0a0c; --bg2:#131316; --surface:rgba(255,255,255,.06); --surface2:rgba(255,255,255,.09);
    --surface3:rgba(255,255,255,.14); --glass:rgba(20,20,24,.8);
    --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.13);
    --text:#f5f5f7; --dim:#aeaeb6; --faint:#8e8e96;
    --accent:#e8b825; --accent2:#d4a620; --accent-wash:rgba(232,184,37,.14);
    --radius:16px; --radius-sm:10px; --radius-xs:8px; --radius-lg:22px;
    --shadow-sm:0 1px 3px rgba(0,0,0,.3); --shadow:0 4px 24px rgba(0,0,0,.4);
    --shadow-lg:0 12px 48px rgba(0,0,0,.55);
    --font:'Circular','SF Pro Display',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    --ease:cubic-bezier(.22,1,.36,1);
    /* Floating menu-toggle/search pills sit at top:max(16px,safe-area) and are
       44px tall — flat pages need at least that much clearance so their first
       row of content doesn't render underneath the pills. */
    --pill-clear:max(76px,calc(env(safe-area-inset-top) + 60px));
    /* Shared horizontal rhythm: every top-level section (hero, rails, grids,
       toolbars, detail/collection heroes) aligns to this edge so content
       lines up into a single column instead of drifting between 36/44px. */
    --edge:72px;
    /* Backdrop images are scaled to the hero's full height and pinned right;
       this mask fades their left side into the blurred echo behind them with
       soft, rounded (vignette-like) edges rather than a hard vertical line. */
    --bg-vignette:radial-gradient(ellipse 78% 90% at 100% 50%,#000 48%,transparent 100%);
    /* ---- VIDEO FROST ----
       The shared "Liquid Glass" recipe for every translucent surface in the
       app — search bar, buttons, controls, nav, the rating panel, menus and
       overlays. Each pairs a saturated backdrop blur with a stack of inset
       shadows that catch light along the top/left edge and fall into shadow
       along the bottom/right, like the rim of a thick glass slab, finished
       with a soft outer drop shadow that seats it on the page. */
    --frost-blur:24px; --frost-blur-lg:40px; --frost-sat:1.8;
    --frost-border:var(--line2);
    /* A thinner, more translucent glass for panels that float directly over
       backdrop art (e.g. the rating panel) - lets the blurred/saturated
       artwork read through as a frosted tint instead of a solid card. */
    --frost-tint:rgba(20,20,24,.4);
    --frost-edge:
      inset 0 0 0 1px rgba(255,255,255,.07),
      inset 1.5px 2px 1px -1.5px rgba(255,255,255,.55),
      inset -1.5px -1.5px 1px -1px rgba(255,255,255,.3),
      inset -3px -8px 2px -7px rgba(255,255,255,.18),
      inset 0 -1px 3px rgba(0,0,0,.3),
      inset -1.5px 2.5px 0 -2px rgba(0,0,0,.35),
      inset 0 3px 5px -3px rgba(0,0,0,.35),
      inset 2px -6px 1px -5px rgba(0,0,0,.18);
    --frost-edge-sm:
      inset 0 0 0 1px rgba(255,255,255,.07),
      inset 1px 1px 1px -1px rgba(255,255,255,.5),
      inset -1px -1px 1px -1px rgba(255,255,255,.25),
      inset 0 -1px 2px rgba(0,0,0,.3),
      inset 0 2px 3px -2px rgba(0,0,0,.3);
    --frost-shadow-sm:var(--frost-edge-sm),0 1px 3px rgba(0,0,0,.3);
    --frost-shadow:var(--frost-edge),0 1px 4px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.32);
    --frost-shadow-lg:var(--frost-edge),0 4px 24px rgba(0,0,0,.4),0 16px 48px rgba(0,0,0,.42);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--font);
    -webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;text-size-adjust:100%;overflow:hidden}
  button,input{font-family:inherit;color:inherit}
  button{cursor:pointer}
  img{display:block}
  .hidden{display:none !important}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
    clip:rect(0,0,0,0);white-space:nowrap;border:0}
  .skip-link{position:fixed;top:-100px;left:12px;z-index:300;background:var(--accent);color:#141005;
    padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;
    transition:top .15s var(--ease)}
  .skip-link:focus-visible{top:12px}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
  ::-webkit-scrollbar{width:8px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.18)}
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;
      transition-duration:.01ms !important;scroll-behavior:auto !important}
  }

  /* ---- BTN ---- */
  .btn{background:var(--accent);color:#141005;border:none;padding:12px 24px;border-radius:100px;
    font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:8px;
    transition:filter .15s var(--ease),background-color .15s var(--ease);letter-spacing:-.01em}
  .btn:hover{filter:brightness(1.08)}
  .btn:active{filter:brightness(.94)}
  .btn.glass{background:var(--surface2);backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));
    color:var(--text);border:1px solid var(--frost-border);box-shadow:var(--frost-shadow-sm)}
  .btn.glass:hover{background:var(--surface3)}
  .btn i{font-size:17px}
  .btn.lg{padding:14px 30px;font-size:15px}
  .btn.sm{padding:8px 16px;font-size:13px}

  /* ---- LOGIN ---- */
  #login{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:28px;text-align:center;padding:24px;z-index:1;
    background:radial-gradient(ellipse 900px 450px at 50% 30%, var(--accent-wash),transparent),var(--bg)}
  .logo-lockup{display:flex;align-items:center;gap:14px}
  .logo-lockup i{font-size:48px;color:var(--accent)}
  .logo-lockup h1{font-size:44px;font-weight:800;letter-spacing:-.03em}
  #login p{color:var(--dim);max-width:400px;line-height:1.6;font-size:14px}

  /* ---- SERVERS ---- */
  #servers{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;padding:24px;z-index:1}
  #servers h1{margin-bottom:6px;font-size:24px;font-weight:700;letter-spacing:-.02em}
  .server-card{background:var(--glass);backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));border:1px solid var(--frost-border);
    border-radius:var(--radius);padding:18px 22px;min-width:340px;display:flex;
    justify-content:space-between;align-items:center;gap:18px;box-shadow:var(--frost-shadow)}
  .server-card .sn{font-weight:600;font-size:15px}
  .server-card .meta{font-size:12px;color:var(--dim);margin-top:4px;display:flex;align-items:center;gap:8px}
  .badge{font-size:10px;text-transform:uppercase;letter-spacing:.8px;padding:3px 8px;border-radius:6px;
    background:rgba(110,231,160,.12);color:#6ee7a0;font-weight:600}
  .badge.remote{background:var(--accent-wash);color:var(--accent)}
  .badge.relay{background:rgba(255,100,100,.1);color:#ff9090}

  /* ---- ULTRABLUR UNDERLAY ----
     Single fixed, blurred color wash derived from the current page's artwork.
     Used on detail-style pages (movie/show/season/collection/playlist) and the
     player. Grid/list pages leave it hidden to keep things calm and legible. */
  #ultraBlur{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .ub-layer{position:absolute;inset:-20%;background-size:cover;background-position:center;
    opacity:0;transition:opacity 1.2s var(--ease);filter:blur(110px) saturate(1.9) brightness(1.05)}
  .ub-layer.show{opacity:.65}
  .ub-scrim{position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(10,10,12,.35) 0%,rgba(10,10,12,.6) 50%,rgba(10,10,12,.78) 100%)}

  /* ---- APP SHELL ---- */
  #app{display:none;height:100%;position:relative;z-index:1}
  .shell{display:grid;grid-template-columns:240px 1fr;height:100%}
  .sidebar{background:rgba(15,15,19,.94);backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    -webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));border-right:1px solid var(--frost-border);
    display:flex;flex-direction:column;overflow-y:auto;z-index:20}
  .brand{display:flex;align-items:center;gap:10px;padding:22px 20px 20px}
  .brand i{font-size:24px;color:var(--accent)}
  .brand b{font-size:18px;font-weight:800;letter-spacing:-.02em}
  .brand .ver{font-size:10px;color:var(--faint);margin-left:4px}
  .nav{display:flex;flex-direction:column;padding:4px 10px;gap:2px}
  .nav-label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--faint);
    padding:18px 12px 6px;font-weight:700}
  .nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--radius-xs);
    color:var(--dim);background:rgba(255,255,255,.045);backdrop-filter:blur(16px) saturate(var(--frost-sat));
    -webkit-backdrop-filter:blur(16px) saturate(var(--frost-sat));border:1px solid rgba(255,255,255,.06);
    box-shadow:var(--frost-edge-sm);text-align:left;font-size:14px;font-weight:500;
    width:100%;transition:background-color .15s var(--ease),color .15s var(--ease),border-color .15s var(--ease);
    position:relative;min-height:40px}
  .nav-item i{font-size:18px;width:20px;text-align:center}
  .nav-item .svgi{width:20px;height:18px}
  .nav-item:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.12);color:var(--text)}
  .nav-item.active{background:rgba(255,255,255,.14);
    border-color:var(--frost-border);box-shadow:var(--frost-edge-sm);color:var(--text)}
  .nav-item.active i{color:var(--accent)}
  .nav-item.active .svgi{color:var(--accent)}
  .nav-item.active::before{content:"";position:absolute;left:-10px;top:50%;transform:translateY(-50%);
    width:3px;height:18px;border-radius:0 3px 3px 0;background:var(--accent)}
  .sidebar-foot{margin-top:auto;padding:10px;border-top:1px solid var(--line)}

  .main{overflow-y:auto;position:relative;scroll-behavior:smooth}
  .content{padding:0 0 max(80px,env(safe-area-inset-bottom));position:relative}
  #content > .rail-section:first-child,#content > .rail-head:first-child,
  #content > .grid-view:first-child,#content > .empty:first-child,
  #content > .loading:first-child,#content > .err:first-child,
  #content > .lib-tabs:first-child,#content > .search-head:first-child{margin-top:var(--pill-clear)}

  /* ---- FLOATING GLASS BAR ----
     No header bar: a single floating "Liquid Glass" search pill hovers over
     the page (and, on mobile, a matching nav toggle). Both stay fixed in
     place while content and color scroll beneath them. */
  .menu-toggle{display:none;position:fixed;top:max(16px,env(safe-area-inset-top));
    left:max(16px,env(safe-area-inset-left));z-index:15;background:var(--surface2);
    backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    border:1px solid var(--frost-border);width:44px;height:44px;border-radius:50%;
    align-items:center;justify-content:center;font-size:18px;color:var(--text);
    box-shadow:var(--frost-shadow);
    transition:background-color .15s,box-shadow .15s}
  .menu-toggle:hover{background:var(--surface3)}
  .searchbox{position:fixed;top:max(16px,env(safe-area-inset-top));
    right:max(24px,env(safe-area-inset-right));z-index:15;display:flex;align-items:center;gap:8px;
    background:var(--surface2);backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    border:1px solid var(--frost-border);border-radius:100px;height:44px;padding:0 18px;width:240px;
    box-shadow:var(--frost-shadow);
    transition:border-color .15s,background-color .15s,box-shadow .15s,width .2s,padding .2s}
  .searchbox:focus-within{background:var(--surface3);box-shadow:var(--frost-shadow-lg)}
  .searchbox i{color:var(--faint);font-size:16px;flex:0 0 auto}
  .searchbox input{background:none;border:none;color:var(--text);font-size:13px;width:100%;outline:none;
    font-family:var(--font)}
  .searchbox input::placeholder{color:var(--faint)}

  /* ---- HERO ---- */
  .hero{position:relative;height:min(64vh,600px);min-height:420px;display:flex;align-items:flex-end;
    overflow:hidden}
  /* Backdrop: a heavily blurred, saturated "echo" of the artwork fills the
     whole hero; the crisp image sits on top, scaled to the hero's full
     height (no cropping) and pinned to the right, with its left edge
     fading into the blurred echo for a soft vignette blend. */
  .hero-bg{position:absolute;inset:0;overflow:hidden}
  .hero-bg-blur{position:absolute;inset:-15%;background-size:cover;background-position:center;
    filter:blur(100px) saturate(1.9) brightness(1.05)}
  .hero-bg-img,.hero-video{position:absolute;top:0;right:0;height:100%;width:auto;max-width:none;
    opacity:0;transition:opacity .6s var(--ease);
    -webkit-mask-image:var(--bg-vignette);mask-image:var(--bg-vignette)}
  .hero-bg-img.loaded,.hero-video.show{opacity:1}
  .hero-scrim{position:absolute;inset:0;
    background:linear-gradient(to top,var(--bg) 0%,rgba(10,10,12,.55) 35%,rgba(10,10,12,.15) 80%),
    linear-gradient(to right,rgba(10,10,12,.8) 0%,rgba(10,10,12,.35) 42%,rgba(10,10,12,.1) 65%,transparent 85%)}
  .hero-inner{position:relative;padding:0 var(--edge) 50px;max-width:700px}
  .hero-kicker{display:inline-flex;align-items:center;gap:7px;font-size:11px;letter-spacing:1px;
    text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:18px}
  .hero h2{font-size:clamp(40px,7.5vw,92px);font-weight:900;letter-spacing:-.04em;line-height:.97}
  .hero-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;color:var(--dim);font-size:13px;
    margin:18px 0 14px;font-weight:500}
  .hero-meta .sep{width:4px;height:4px;border-radius:50%;background:var(--faint)}
  .pill{display:inline-flex;align-items:center;gap:5px;background:var(--surface2);backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));
    -webkit-backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));border:1px solid var(--frost-border);border-radius:8px;padding:4px 10px;
    font-size:12px;font-weight:600;box-shadow:var(--frost-shadow-sm)}
  .svgi{display:inline-block;width:1em;height:1em;flex:0 0 auto;background-color:currentColor;
    -webkit-mask:var(--i) center/contain no-repeat;mask:var(--i) center/contain no-repeat}
  .svgi.flip{transform:scaleX(-1)}
  .hero p{color:var(--dim);line-height:1.6;font-size:14px;max-width:560px;margin-bottom:24px;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .hero-actions{display:flex;gap:12px;flex-wrap:wrap}
  .hero-trailer-ctrls{position:absolute;right:var(--edge);bottom:24px;z-index:2;display:flex;gap:8px;
    opacity:0;transition:opacity .4s var(--ease)}
  .hero-trailer-ctrls.show{opacity:1}
  .hero-trailer-ctrls .pbtn{width:40px;height:40px;font-size:17px;border-radius:10px}
  .title-logo{display:block;max-width:min(72%,560px);max-height:120px;width:auto;height:auto;
    object-fit:contain;object-position:left bottom;margin-bottom:2px;
    filter:drop-shadow(0 6px 28px rgba(0,0,0,.55))}

  /* ---- SECTION / RAIL ----
     Each rail can carry its own ambient color wash (.rail-ambient), a
     blurred, saturated smear of its first item's art sitting behind the
     header — a per-row echo of the page-level UltraBlur underlay. */
  .rail-section{position:relative;padding:40px 0 10px;overflow:hidden}
  .rail-ambient{position:absolute;top:-90px;left:6%;right:6%;height:260px;
    background-size:cover;background-position:center;opacity:.28;
    filter:blur(70px) saturate(1.8);pointer-events:none;transform:scale(1.25)}
  .rail-head{display:flex;align-items:flex-end;gap:12px;margin:0 var(--edge) 16px;position:relative}
  .rail-head-text{display:flex;flex-direction:column;gap:5px;min-width:0}
  .rail-lib{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:var(--faint);font-weight:700}
  .rail-head h3{font-size:21px;font-weight:800;letter-spacing:-.02em}
  .featured .rail-head h3{font-size:27px}
  .rail-head .count{font-size:12px;color:var(--faint);font-weight:500;padding-bottom:3px}
  .see-all{margin-left:auto;display:inline-flex;align-items:center;gap:4px;font-size:13px;
    font-weight:600;color:var(--dim);background:none;border:none;cursor:pointer;
    padding-bottom:3px;font-family:var(--font);transition:color .15s var(--ease)}
  .see-all:hover{color:var(--text)}
  .see-all i{font-size:14px;transition:transform .15s var(--ease)}
  .see-all:hover i{transform:translateX(2px)}
  .carousel{display:flex;gap:20px;overflow-x:auto;padding:4px var(--edge) 16px;scroll-snap-type:x mandatory;
    scroll-padding-inline:var(--edge);-webkit-overflow-scrolling:touch}
  .carousel::-webkit-scrollbar{height:0}
  .grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:24px;
    padding:4px var(--edge) 16px}

  /* ---- LIBRARY TABS ----
     Plex-style "Recommended" / "Library" switcher shown at the top of
     every library page. */
  .lib-tabs{display:flex;gap:8px;margin:0 var(--edge) 24px}
  .lib-tab{background:var(--surface2);backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));
    -webkit-backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));border:1px solid var(--frost-border);
    border-radius:100px;height:38px;padding:0 20px;color:var(--dim);font-size:13px;
    font-weight:600;font-family:var(--font);cursor:pointer;box-shadow:var(--frost-shadow-sm);
    transition:background-color .15s,color .15s,border-color .15s}
  .lib-tab:hover{background:var(--surface3);color:var(--text)}
  .lib-tab.active{background:var(--accent);color:#141005;border-color:var(--accent);box-shadow:none}

  /* ---- LIBRARY TOOLBAR ----
     A "Liquid Glass" control strip for the library grid: live, client-side
     sort / watch-state filter / genre filter — no round-trip, no reload. */
  .lib-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 var(--edge) 6px}
  .lib-toolbar .lib-title{font-size:22px;font-weight:800;letter-spacing:-.02em}
  .lib-toolbar .lib-count{font-size:12px;color:var(--faint);font-weight:500}
  .lib-toolbar .spacer{flex:1 1 auto}

  /* ---- SEARCH RESULTS HEADER ---- */
  .search-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin:0 var(--edge) 8px}
  .search-head h2{font-size:28px;font-weight:900;letter-spacing:-.03em}
  .search-head .count{font-size:13px;color:var(--faint);font-weight:500}
  .lib-ctrl-wrap{position:relative}
  .lib-ctrl{display:inline-flex;align-items:center;gap:8px;background:var(--surface2);
    backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));
    border:1px solid var(--frost-border);border-radius:100px;height:38px;padding:0 14px;color:var(--text);
    font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);
    box-shadow:var(--frost-shadow-sm);transition:background-color .15s,border-color .15s}
  .lib-ctrl:hover{background:var(--surface3)}
  .lib-ctrl i.lead{font-size:15px;color:var(--faint)}
  .lib-ctrl .cap{color:var(--faint);font-weight:500}
  .lib-ctrl i.caret{font-size:12px;color:var(--faint);transition:transform .15s var(--ease)}
  .lib-ctrl-wrap.open .lib-ctrl{background:var(--surface3);border-color:var(--accent)}
  .lib-ctrl-wrap.open .lib-ctrl i.caret{transform:rotate(180deg)}
  .lib-menu{position:absolute;top:46px;right:0;z-index:14;min-width:210px;max-height:min(60vh,420px);
    overflow-y:auto;background:var(--glass);backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    -webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));border:1px solid var(--frost-border);
    border-radius:var(--radius);box-shadow:var(--frost-shadow-lg);padding:6px;display:none}
  .lib-ctrl-wrap.open .lib-menu{display:block}
  .lib-menu button{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;
    border:none;color:var(--text);padding:10px 12px;font-size:13px;font-weight:500;border-radius:9px;
    cursor:pointer;transition:background-color .1s;min-height:40px;font-family:var(--font)}
  .lib-menu button:hover{background:var(--surface2)}
  .lib-menu button.active{color:var(--accent)}
  .lib-menu button i.ck{font-size:15px;color:var(--accent);opacity:0;width:16px;flex:0 0 auto}
  .lib-menu button.active i.ck{opacity:1}
  .lib-menu button .ml{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ---- CARD ----
     Hover feedback is a single, gentle elevation cue (shadow) plus a soft
     play affordance — no movement, scaling, or stacked effects. */
  .card{scroll-snap-align:start;cursor:pointer;border:none;background:none;text-align:left;
    flex:0 0 auto;color:inherit;outline:none;border-radius:var(--radius-sm)}
  .carousel .card{width:180px}
  .carousel .card.wide{width:290px}
  .card:focus-visible .art{outline:2px solid var(--accent);outline-offset:2px}
  .art{position:relative;border-radius:14px;overflow:hidden;background:var(--bg2);
    box-shadow:var(--shadow-sm);transition:box-shadow .2s var(--ease);aspect-ratio:2/3}
  .card.wide .art{aspect-ratio:16/9}
  .card.square .art{aspect-ratio:1/1}
  .card:hover .art,.card:focus-visible .art{box-shadow:var(--shadow)}
  .art img{width:100%;height:100%;object-fit:cover;display:block}
  .art .art-fallback{display:none;position:absolute;inset:0;align-items:center;justify-content:center;
    font-size:40px;color:var(--faint)}
  .art.broken img{display:none}
  .art.broken .art-fallback{display:flex}
  .art .play-hover{position:absolute;inset:0;background:rgba(0,0,0,.25);
    display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s var(--ease)}
  .card:hover .art .play-hover,.card:focus-visible .art .play-hover{opacity:1}
  .play-hover i{font-size:40px;color:#fff;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4))}
  .art .watch-prog{position:absolute;left:6px;right:6px;bottom:6px;height:4px;background:rgba(0,0,0,.5);
    border-radius:3px;overflow:hidden}
  .art .watch-prog > i{display:block;height:100%;background:var(--accent);border-radius:3px}
  .art .unwatched-dot{position:absolute;top:8px;right:8px;width:11px;height:11px;border-radius:50%;
    background:var(--accent);box-shadow:0 0 0 2px rgba(0,0,0,.45)}
  .art .unwatched-badge{position:absolute;top:8px;right:8px;min-width:22px;height:22px;padding:0 6px;
    border-radius:11px;background:var(--accent);color:#141005;font-size:12px;font-weight:800;
    display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 2px rgba(0,0,0,.45)}

  /* The card for the episode whose page you're on gets an accent ring + a
     "Now viewing" tag so the current item reads as current in its own rail. */
  .card.current .art{outline:2.5px solid var(--accent);outline-offset:2px}
  .card.current .ct{color:var(--accent)}
  .art .now-badge{position:absolute;left:8px;top:8px;z-index:3;display:inline-flex;align-items:center;gap:5px;
    background:var(--accent);color:#141005;font-size:10px;font-weight:800;text-transform:uppercase;
    letter-spacing:.4px;padding:4px 9px;border-radius:100px;box-shadow:0 2px 12px rgba(0,0,0,.45)}
  .art .now-badge i{font-size:11px}

  /* Spotify-style mosaic cover for playlists/collections with no art of
     their own — built from the first few items' thumbnails. */
  .art .art-mosaic,.coll-art .art-mosaic{position:absolute;inset:0;display:grid;
    grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1px;background:var(--bg2)}
  .art-mosaic img{width:100%;height:100%;object-fit:cover;display:block}
  .art-mosaic.n1{grid-template-columns:1fr;grid-template-rows:1fr}
  .art-mosaic.n2{grid-template-rows:1fr}
  .art-mosaic.n3 img:first-child{grid-row:1/3}

  .card .ct{font-size:13.5px;margin-top:10px;line-height:1.3;font-weight:600;letter-spacing:-.01em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card .cs{font-size:12px;color:var(--dim);margin-top:3px;font-weight:500;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* Featured (first rail): bigger cards */
  .featured .carousel .card{width:260px}
  .featured .carousel .card.wide{width:380px}
  .featured .art img{aspect-ratio:2/3}
  .featured .art img.wide{aspect-ratio:16/9}

  .loading,.empty{color:var(--dim);font-size:14px;padding:48px var(--edge)}
  .empty i,.empty .svgi{font-size:38px;color:var(--faint);display:block;margin-bottom:12px}
  .err{color:#ff8585;background:rgba(255,80,80,.08);border:1px solid rgba(255,80,80,.15);
    border-radius:var(--radius-sm);padding:16px 18px;margin:20px var(--edge);font-size:13.5px;
    display:flex;gap:10px;align-items:flex-start;backdrop-filter:blur(12px)}
  .err i{font-size:18px;margin-top:1px}
  /* Distinct, non-alarming treatment for "can't reach the Plex server" -
     this is an external/network condition, not an app error. */
  .err.err-offline{color:var(--dim);background:var(--surface);border-color:var(--line2);
    align-items:center;flex-wrap:wrap;gap:14px}
  .err-offline i{font-size:22px;color:var(--faint);margin-top:0}
  .err-offline b{color:var(--text);font-size:14px}
  .err-offline .btn{margin-left:auto}

  /* ---- DETAIL ----
     The global UltraBlur underlay supplies the ambient color wash. Movie/show
     detail pages use the "full" variant: a near-full-viewport hero with a
     crisp backdrop, metadata pinned top-left (.detail-top) and cast/stats
     pinned bottom-left (.detail-bottom), leaving the art to read large on the
     right. Episode pages keep the original poster+info row layout. */
  .detail-wrap{position:relative}
  .detail-hero{position:relative;min-height:520px;display:flex;align-items:flex-end;overflow:hidden}
  .detail-hero.full{min-height:min(90vh,880px);align-items:stretch;flex-direction:column;
    justify-content:space-between;padding:calc(var(--pill-clear) + 8px) var(--edge) var(--edge)}
  .detail-bg{position:absolute;inset:0;overflow:hidden}
  /* Shared "scale-to-height + blurred-echo + vignette" backdrop, reused by
     every hero (.hero above, .detail-hero, .detail-hero.full, .coll-hero):
     the artwork is scaled to the hero's full height with no cropping and
     pinned to the right, vignetting into the blurred echo on the left. */
  .detail-bg-blur{position:absolute;inset:-15%;background-size:cover;background-position:center;
    filter:blur(100px) saturate(1.9) brightness(1.05)}
  .detail-bg-img{position:absolute;top:0;right:0;height:100%;width:auto;max-width:none;
    opacity:0;transition:opacity .6s var(--ease);
    -webkit-mask-image:var(--bg-vignette);mask-image:var(--bg-vignette)}
  .detail-bg-img.loaded{opacity:1}
  .detail-scrim{position:absolute;inset:0;
    background:linear-gradient(to top,rgba(10,10,12,.68) 2%,rgba(10,10,12,.55) 40%,rgba(10,10,12,.2) 100%),
    linear-gradient(to right,rgba(10,10,12,.85),transparent 55%)}
  .detail-hero.full .detail-scrim{
    background:linear-gradient(to right,rgba(10,10,12,.7) 0%,rgba(10,10,12,.5) 35%,rgba(10,10,12,.18) 60%,transparent 80%),
    linear-gradient(to top,rgba(10,10,12,.85) 0%,rgba(10,10,12,.4) 26%,transparent 52%),
    linear-gradient(to bottom,rgba(10,10,12,.45) 0%,transparent 24%)}
  .detail-row{position:relative;display:flex;gap:40px;padding:calc(var(--pill-clear) + 8px) var(--edge) 48px;
    align-items:flex-start;width:100%}
  .detail-poster{width:220px;flex:0 0 auto;border-radius:var(--radius-lg);
    box-shadow:var(--shadow-lg);aspect-ratio:2/3;object-fit:cover;background:var(--bg2)}
  /* Episode thumbnail: pinned top-right with its top edge aligned to the
     breadcrumb, so the info column reads cleanly down the left. */
  .detail-poster.wide{width:360px;aspect-ratio:16/9;border:1px solid var(--line2)}
  .detail-info{flex:1;min-width:0;padding-bottom:6px}
  /* breadcrumb back-nav: a glass circular arrow chip + show / season crumb */
  .ep-kicker{display:inline-flex;align-items:center;gap:11px;font-size:11.5px;letter-spacing:1.4px;
    text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:20px;
    background:none;border:none;padding:0;cursor:pointer}
  .ep-kicker-ico{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;
    border-radius:50%;background:var(--surface2);border:1px solid var(--frost-border);font-size:14px;flex:0 0 auto;
    backdrop-filter:blur(12px) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(12px) saturate(var(--frost-sat));
    box-shadow:var(--frost-shadow-sm);
    transition:background-color .15s var(--ease),transform .15s var(--ease)}
  .ep-kicker:hover .ep-kicker-ico{background:var(--surface3);transform:translateX(-2px)}
  .ep-kicker-text{display:inline-flex;align-items:center;gap:10px;min-width:0;text-align:left}
  .ep-kicker .sep{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:.55;flex:0 0 auto}
  .detail-info h2{font-size:clamp(28px,3.8vw,48px);font-weight:900;letter-spacing:-.04em;line-height:.98}
  .detail-info .sub{display:flex;align-items:center;gap:10px;flex-wrap:wrap;color:var(--dim);font-size:13px;
    margin:16px 0;font-weight:500}
  .sub .sep{width:4px;height:4px;border-radius:50%;background:var(--faint)}
  .summary{color:var(--dim);line-height:1.65;font-size:14px;max-width:680px;margin-bottom:22px}
  .detail-actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center}

  /* ---- FULL HERO (movie/show detail) ---- */
  .detail-top{position:relative;max-width:800px}
  .detail-top h2{font-size:clamp(40px,7.5vw,92px);font-weight:900;letter-spacing:-.04em;line-height:.97}
  .detail-top .sub{display:flex;align-items:center;gap:10px;flex-wrap:wrap;color:var(--dim);font-size:13px;
    margin:16px 0;font-weight:500}
  .genres{color:var(--dim);font-size:14px;font-weight:500;margin:0 0 16px}
  .detail-bottom{position:relative;max-width:800px;display:flex;flex-direction:column;gap:18px}
  .detail-bottom .stat-row{padding:0;border-top:none}

  /* ---- RATE FLOAT (star rating) ---- */
  .rate-float{position:absolute;right:var(--edge);bottom:var(--edge);z-index:4;
    background:var(--frost-tint);backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    border:1px solid var(--frost-border);border-radius:var(--radius);padding:12px 16px;
    box-shadow:var(--frost-shadow-lg)}
  .rate-stars{display:flex;gap:8px}
  .rate-stars button{background:none;border:none;padding:0;cursor:pointer;font-size:24px;line-height:1;
    width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;
    color:var(--faint);transition:color .15s,transform .15s var(--ease)}
  .rate-stars button .svgi.filled{color:var(--accent)}
  .rate-stars button:hover{transform:scale(1.15);color:var(--accent2)}

  /* ---- RATINGS ---- */
  .ratings-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:2px 0 16px}
  .rating-badge{display:inline-flex;align-items:center;gap:8px;background:var(--surface2);
    backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));border:1px solid var(--frost-border);border-radius:8px;
    padding:4px 14px 4px 4px;font-size:13px;font-weight:600;color:var(--text);
    box-shadow:var(--frost-shadow-sm)}
  .rating-badge .src{display:inline-flex;align-items:center;justify-content:center;height:22px;flex:0 0 auto}
  .rating-badge .src img{height:100%;width:auto;display:block}
  .rating-badge b{font-weight:700}
  .rating-badge.trailer{padding:7px 16px}
  .rating-badge.trailer .svgi{color:var(--accent);font-size:16px}

  /* ---- META STAT ROW (added / watched history) ---- */
  .stat-row{display:flex;gap:36px;flex-wrap:wrap;padding:26px var(--edge);border-top:1px solid var(--line)}
  .stat{display:flex;flex-direction:column;gap:4px}
  .stat .sl{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);font-weight:700}
  .stat .sv{font-size:14px;font-weight:600;color:var(--text)}

  .section{padding:32px var(--edge) 0;position:relative}
  .section h3{font-size:18px;font-weight:700;margin-bottom:16px;letter-spacing:-.02em}
  .cast-row{display:flex;gap:20px;overflow-x:auto;padding:4px var(--edge) 16px;
    scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
  .cast-row::-webkit-scrollbar{height:0}
  .cast{flex:0 0 auto;width:112px;text-align:center}
  .cast .art{width:112px;height:112px;border-radius:50%;overflow:hidden;
    background:var(--bg2);border:1px solid var(--line);margin:0 auto}
  .cast .art img{width:100%;height:100%;object-fit:cover;display:block}
  .cast .nm{font-size:12.5px;font-weight:600;line-height:1.3;margin-top:9px}
  .cast .rl{font-size:11.5px;color:var(--dim);margin-top:2px;line-height:1.25}
  .crew{display:flex;gap:28px;flex-wrap:wrap;color:var(--dim);font-size:13px;margin-top:4px}
  .crew b{color:var(--text);font-weight:600}

  /* ---- EXTRAS (trailers, deleted scenes, featurettes...) ---- */
  .extra-badge{position:absolute;left:8px;top:8px;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
    color:#fff;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
    padding:4px 8px;border-radius:6px}
  .extra-dur{position:absolute;right:8px;bottom:8px;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
    color:#fff;font-size:11px;font-weight:600;padding:3px 7px;border-radius:6px}
  .extra-card .ct{font-size:14.5px;font-weight:700}

  /* ---- TRAILER WINDOW ----
     A small floating "now playing" window for trailer extras, opened from
     the Trailers rail or the ratings-row Trailer badge — distinct from the
     full-screen player. */
  .trailer-modal{position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;
    background:rgba(8,8,10,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    padding:24px;opacity:0;transition:opacity .25s var(--ease)}
  .trailer-modal.show{opacity:1}
  .trailer-window{position:relative;width:min(820px,92vw);aspect-ratio:16/9;background:#000;
    border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-lg);
    border:1px solid var(--line2);transform:scale(.96);transition:transform .25s var(--ease)}
  .trailer-modal.show .trailer-window{transform:scale(1)}
  .trailer-window video{width:100%;height:100%;display:block;object-fit:contain;background:#000;
    opacity:0;transition:opacity .3s var(--ease)}
  .trailer-window video.show{opacity:1}
  .trailer-window .pbtn{position:absolute;top:12px;right:12px;z-index:2}
  .trailer-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:10px;color:var(--dim);font-size:13px;font-weight:500}
  .trailer-state.hidden{display:none}
  .trailer-state .ring{width:40px;height:40px;border-radius:50%;
    border:3px solid rgba(255,255,255,.15);border-top-color:var(--accent);animation:spin .8s linear infinite}
  .trailer-state i{font-size:28px;color:var(--faint)}

  /* ---- SEASON SWITCHER (artwork, not pill tabs) ---- */
  .season-rail{display:flex;gap:20px;overflow-x:auto;padding:4px var(--edge) 16px;-webkit-overflow-scrolling:touch}
  .season-rail::-webkit-scrollbar{height:0}
  .season-card{width:150px}
  .season-card .art{aspect-ratio:2/3;outline:2px solid transparent;outline-offset:2px;
    transition:outline-color .15s var(--ease),box-shadow .2s var(--ease)}
  .season-card.active .art{outline-color:var(--accent);box-shadow:var(--shadow)}
  .season-card.active .ct{color:var(--accent)}

  /* ---- EPISODE CARD RAIL ----
     A horizontal carousel of episode cards — 16:9 art with an "EPISODE N"
     (or "COMING …" for unaired episodes) kicker, bold title, clamped
     synopsis, and a footer with duration plus a "..." overflow for marking
     watched/unwatched — closer to a streaming app's season rail than a
     dense list. */
  .ep-card{position:relative;flex:0 0 auto;width:320px;display:flex;flex-direction:column;
    scroll-snap-align:start}
  .ep-card .ep-thumb{position:relative;display:block;width:100%;aspect-ratio:16/9;
    border-radius:var(--radius-sm);overflow:hidden;background:var(--bg2);border:none;
    padding:0;cursor:pointer}
  .ep-card .ep-thumb img{width:100%;height:100%;object-fit:cover;display:block;
    transition:transform .3s var(--ease)}
  .ep-card .ep-thumb:hover img,.ep-card .ep-thumb:focus-visible img{transform:scale(1.045)}
  .ep-card .ep-thumb:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .ep-tag{position:absolute;left:10px;top:10px;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
    color:#fff;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
    padding:5px 10px;border-radius:6px}
  .ep-tag.upcoming{background:var(--accent-wash);color:var(--accent)}
  .ep-card .ep-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,.25);color:#fff;font-size:40px;opacity:0;transition:opacity .15s}
  .ep-card .ep-thumb:hover .ep-play,.ep-card .ep-thumb:focus-visible .ep-play{opacity:1}
  .ep-card .ep-prog{position:absolute;left:6px;right:6px;bottom:6px;height:4px;background:rgba(0,0,0,.5);
    border-radius:3px;overflow:hidden}
  .ep-card .ep-prog>i{display:block;height:100%;background:var(--accent)}
  .ep-card-body{padding-top:12px;display:flex;flex-direction:column;flex:1;min-width:0}
  .ep-card-body .et{font-size:15px;font-weight:700;letter-spacing:-.01em;line-height:1.3}
  .ep-card-body .et i{margin-left:6px;font-size:13px;vertical-align:-1px}
  .ep-card-body .ed{font-size:13px;color:var(--dim);margin-top:6px;line-height:1.55;flex:1;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .ep-card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:12px;min-height:32px}
  .ep-card-foot .edur{font-size:12px;color:var(--dim);font-weight:600;display:inline-flex;align-items:center;gap:6px}
  .ep-card-foot .edur i{font-size:16px;color:var(--accent)}

  /* "..." overflow menu — mark an episode watched / unwatched via Plex */
  .ep-menu-wrap{position:relative;margin-left:auto}
  .ep-more{background:none;border:none;color:var(--dim);cursor:pointer;
    width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;
    border-radius:8px;font-size:18px;transition:background-color .15s,color .15s}
  .ep-more:hover{background:var(--surface);color:var(--text)}
  .ep-menu{position:absolute;bottom:38px;right:0;z-index:5;min-width:190px;
    background:var(--glass);backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    border:1px solid var(--frost-border);border-radius:var(--radius);box-shadow:var(--frost-shadow-lg);
    padding:6px;display:none}
  .ep-menu-wrap.open .ep-menu{display:block}
  .ep-menu button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;
    border:none;color:var(--text);padding:10px 12px;font-size:13px;font-weight:500;border-radius:9px;
    cursor:pointer;transition:background-color .1s;font-family:var(--font)}
  .ep-menu button:hover{background:var(--surface2)}
  .ep-menu i{font-size:16px;color:var(--dim);flex:0 0 auto}

  /* ---- COLLECTION / PLAYLIST HERO ---- */
  .coll-hero{position:relative;overflow:hidden;padding:44px var(--edge);display:flex;gap:32px;
    align-items:flex-end;flex-wrap:wrap}
  .coll-art{position:relative;width:220px;aspect-ratio:2/3;flex:0 0 auto;border-radius:var(--radius-lg);
    overflow:hidden;box-shadow:var(--shadow-lg);background:var(--bg2)}
  .coll-art.square{aspect-ratio:1/1}
  .coll-art img{width:100%;height:100%;object-fit:cover;display:block}
  .coll-art .art-fallback{display:none;position:absolute;inset:0;align-items:center;justify-content:center;
    font-size:56px;color:var(--faint)}
  .coll-art.broken img{display:none}
  .coll-art.broken .art-fallback{display:flex}
  .coll-info{position:relative;flex:1;min-width:240px;padding-bottom:6px}
  .coll-kicker{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);
    font-weight:700;margin-bottom:16px}
  .coll-info h2{font-size:clamp(28px,3.8vw,48px);font-weight:900;letter-spacing:-.04em;line-height:.98;
    margin-bottom:14px}
  .coll-desc{color:var(--dim);line-height:1.65;font-size:14px;max-width:680px;margin-bottom:22px}
  .coll-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;color:var(--dim);font-size:13px;
    font-weight:500}
  .coll-meta .sep{width:4px;height:4px;border-radius:50%;background:var(--faint)}
  .coll-actions{display:flex;gap:12px;margin-top:24px}

  /* ---- EPISODE ROW LIST ----
     Compact numbered list used when a collection/playlist consists
     entirely of episodes (mirrors the official Plex app's playlist view):
     index, 16:9 thumb, show + "Sx · Ey — Title", duration. */
  .ep-row-list{display:flex;flex-direction:column;padding:0 var(--edge) 16px}
  .ep-row{display:flex;align-items:center;gap:16px;width:100%;padding:10px 8px;
    background:none;border:none;border-radius:var(--radius-sm);cursor:pointer;text-align:left;
    color:inherit;font:inherit}
  .ep-row:hover{background:rgba(255,255,255,.05)}
  .ep-row-num{flex:0 0 24px;text-align:center;color:var(--faint);font-size:13px;font-weight:600}
  .ep-row-thumb{position:relative;flex:0 0 132px;aspect-ratio:16/9;border-radius:var(--radius-sm);
    overflow:hidden;background:var(--bg2)}
  .ep-row-thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .ep-row-prog{position:absolute;left:0;right:0;bottom:0;height:3px;background:rgba(0,0,0,.5)}
  .ep-row-prog>i{display:block;height:100%;background:var(--accent)}
  .ep-row-body{flex:1;min-width:0}
  .ep-row-show{font-size:15px;font-weight:700;letter-spacing:-.01em}
  .ep-row-ep{font-size:13px;color:var(--dim);margin-top:3px;overflow:hidden;text-overflow:ellipsis;
    white-space:nowrap}
  .ep-row-ep i{margin-left:6px;color:var(--accent)}
  .ep-row-dur{flex:0 0 auto;color:var(--dim);font-size:13px;font-weight:600;
    font-variant-numeric:tabular-nums;padding-left:12px}

  /* ---- PLAYER ---- */
  #player{position:fixed;inset:0;z-index:100;background:#000;display:none;flex-direction:column;overflow:hidden}
  #player.show{display:flex}
  #player video{width:100%;height:100%;background:transparent;object-fit:contain;position:relative;z-index:1;
    transition:opacity .6s var(--ease)}
  #player.paused video{opacity:.3}
  #player.idle{cursor:none}

  .p-backdrop{position:absolute;inset:-10%;background-size:cover;background-position:center;
    opacity:0;transition:opacity .6s var(--ease);filter:blur(90px) saturate(1.9) brightness(1.05)}
  #player.loading .p-backdrop{opacity:.45}
  #player.paused .p-backdrop{opacity:.6}
  .p-spinner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;z-index:3;pointer-events:none}
  .p-spinner .ring{width:52px;height:52px;border-radius:50%;
    border:3px solid rgba(255,255,255,.15);border-top-color:var(--accent);animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .p-spinner span{font-size:13px;color:#cfcfd6;letter-spacing:.3px;font-weight:500}

  /* ---- PAUSE SCREEN ----
     Bottom-left ultrablur info panel shown while paused: the show's main
     backdrop fuels the full-screen ultrablur wash (.p-backdrop), and the
     show logo, metadata, and full synopsis sit over a corner scrim.
     pointer-events pass through the empty area so a click anywhere resumes. */
  .p-pause{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:flex-start;
    justify-content:flex-end;gap:14px;text-align:left;padding:0 64px 132px;opacity:0;visibility:hidden;
    pointer-events:none;
    background:linear-gradient(90deg,rgba(8,8,12,.86) 0%,rgba(8,8,12,.45) 42%,transparent 74%),
      linear-gradient(0deg,rgba(8,8,12,.55) 0%,transparent 46%);
    transform:translateY(14px);transition:opacity .45s var(--ease),visibility .45s var(--ease),transform .45s var(--ease)}
  #player.paused .p-pause{opacity:1;visibility:visible;transform:translateY(0)}
  .p-pause-logo{max-width:min(46vw,380px);max-height:132px;width:auto;height:auto;object-fit:contain;
    object-position:left bottom;filter:drop-shadow(0 8px 30px rgba(0,0,0,.6))}
  .p-pause-title{font-size:44px;font-weight:800;letter-spacing:-.02em;max-width:720px;
    text-shadow:0 2px 28px rgba(0,0,0,.55)}
  .p-pause-sub{font-size:14px;font-weight:600;color:var(--dim);letter-spacing:.02em;text-shadow:0 1px 12px rgba(0,0,0,.6)}
  .p-pause-desc{font-size:15px;color:#dcdce2;line-height:1.7;max-width:620px;text-shadow:0 1px 14px rgba(0,0,0,.65)}
  .p-pause-resume{display:inline-flex;align-items:center;gap:10px;align-self:flex-start;margin-top:6px;
    pointer-events:auto;padding:12px 26px;border-radius:100px;background:rgba(255,255,255,.14);
    backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));
    border:1px solid rgba(255,255,255,.22);box-shadow:var(--frost-edge),0 12px 36px rgba(0,0,0,.45);
    color:#fff;font-size:15px;font-weight:700;
    transition:transform .15s var(--ease),background-color .15s var(--ease)}
  .p-pause-resume i{font-size:18px}
  .p-pause-resume:hover{background:rgba(255,255,255,.24);transform:translateY(-1px)}
  .p-pause-resume:active{transform:scale(.97)}

  .p-top,.p-bottom{position:absolute;left:0;right:0;z-index:4;transition:opacity .25s,transform .25s}
  .p-top{top:0;padding:18px 24px;display:flex;align-items:center;gap:12px;
    background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent)}
  .p-bottom{bottom:0;padding:8px 24px 20px;
    background:linear-gradient(to top,rgba(0,0,0,.75),transparent)}
  #player.idle .p-top{opacity:0;transform:translateY(-8px);pointer-events:none}
  #player.idle .p-bottom{opacity:0;transform:translateY(8px);pointer-events:none}
  .p-top .pt{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
  .p-top .pt .pt-main{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .p-top .pt .pt-sub{font-size:11.5px;color:var(--dim);font-weight:500;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap}
  .p-top-right{display:flex;align-items:center;gap:8px;position:relative}

  .pbtn{background:rgba(255,255,255,.1);backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur)) saturate(var(--frost-sat));
    border:1px solid rgba(255,255,255,.14);box-shadow:var(--frost-edge-sm);
    color:#fff;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;
    justify-content:center;font-size:19px;flex:0 0 auto;
    transition:background-color .15s var(--ease),border-color .15s var(--ease),color .15s var(--ease),transform .1s var(--ease)}
  .pbtn:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.22)}
  .pbtn:active{transform:scale(.94)}
  .pbtn.bare{background:none;border:none;backdrop-filter:none;box-shadow:none;border-radius:10px}
  .pbtn.bare:hover{background:rgba(255,255,255,.12)}
  .pbtn.active{background:rgba(232,184,37,.2);border-color:rgba(232,184,37,.4);color:var(--accent)}
  .pbtn.play-main{background:var(--accent);border-color:transparent;color:#141005;font-size:21px;
    box-shadow:0 4px 20px rgba(232,184,37,.3)}
  .pbtn.play-main:hover{background:var(--accent2);border-color:transparent}
  .pbtn:disabled{opacity:.32;pointer-events:none}
  .pbtn.skip{position:relative}
  .pbtn.skip .skip-n{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    margin-top:2px;font-size:9px;font-weight:800;letter-spacing:-.02em;pointer-events:none}

  .p-seek{padding:6px 2px 10px}
  .p-seek-track{position:relative;height:5px;background:rgba(255,255,255,.18);border-radius:3px;
    cursor:pointer;transition:height .12s}
  .p-seek-track:hover,.p-seek-track:focus-visible{height:7px}
  .p-seek-track:focus-visible{outline:2px solid var(--accent);outline-offset:6px}
  .p-buffered{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.28);border-radius:3px}
  .p-played{position:absolute;left:0;top:0;bottom:0;background:var(--accent);border-radius:3px;width:0}
  .p-chapter-marks{position:absolute;inset:0;pointer-events:none}
  .p-chapter-mark{position:absolute;top:0;bottom:0;width:2px;background:rgba(10,10,12,.55)}
  .p-knob{position:absolute;top:50%;width:14px;height:14px;border-radius:50%;background:#fff;
    transform:translate(-50%,-50%) scale(0);transition:transform .15s var(--ease);
    box-shadow:0 1px 6px rgba(0,0,0,.4);left:0}
  .p-seek-track:hover .p-knob,.p-seek-track:focus-visible .p-knob{transform:translate(-50%,-50%) scale(1)}
  .p-hover-time{position:absolute;bottom:20px;transform:translateX(-50%);background:rgba(0,0,0,.9);
    padding:4px 10px;border-radius:8px;font-size:12px;font-weight:600;pointer-events:none;display:none}

  .p-controls{display:flex;align-items:center;gap:6px}
  .p-controls .spacer{flex:1}
  .p-controls .p-divider{width:1px;height:22px;background:rgba(255,255,255,.12);flex:0 0 auto;margin:0 2px}
  .p-time{font-size:13px;color:var(--text);font-variant-numeric:tabular-nums;margin:0 10px;white-space:nowrap;
    font-weight:500}
  .p-time .slash{color:var(--faint);margin:0 4px}
  .p-vol{display:flex;align-items:center;gap:2px}
  .p-vol input[type=range]{width:0;opacity:0;transition:width .2s var(--ease),opacity .2s var(--ease);
    accent-color:var(--accent);height:4px}
  .p-vol:hover input[type=range],.p-vol:focus-within input[type=range]{width:80px;opacity:1;margin-left:4px}
  .p-status{font-size:11px;color:var(--dim);background:rgba(255,255,255,.1);backdrop-filter:blur(16px) saturate(var(--frost-sat));
    -webkit-backdrop-filter:blur(16px) saturate(var(--frost-sat));
    border:1px solid rgba(255,255,255,.12);box-shadow:var(--frost-edge-sm);padding:5px 12px;border-radius:100px;margin-right:6px;
    white-space:nowrap;display:flex;align-items:center;gap:6px;font-weight:600}
  .p-status .dot{width:6px;height:6px;border-radius:50%;background:#6ee7a0;flex:0 0 auto}
  .p-status.transcode .dot{background:var(--accent)}

  .p-menu{position:absolute;top:52px;right:0;background:var(--glass);backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    -webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    border:1px solid var(--frost-border);border-radius:var(--radius);overflow-y:auto;min-width:260px;display:none;
    box-shadow:var(--frost-shadow-lg);max-height:min(70vh,520px)}
  .p-menu.open{display:block}
  .p-menu.chapters{top:auto;bottom:64px;right:16px;min-width:320px}
  .p-menu .mh{padding:12px 18px 6px;font-size:10px;text-transform:uppercase;letter-spacing:1px;
    color:var(--faint);font-weight:700}
  .p-menu button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;
    border:none;color:var(--text);padding:11px 18px;font-size:13px;font-weight:500;
    transition:background-color .1s;min-height:44px}
  .p-menu button:hover{background:var(--surface2)}
  .p-menu button:focus-visible{outline-offset:-2px}
  .p-menu button i.ck{font-size:16px;color:var(--accent);opacity:0;width:18px;flex:0 0 auto}
  .p-menu button.active i.ck{opacity:1}
  .p-menu button .ml{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
  .p-menu button .msub{font-size:11px;color:var(--faint);font-weight:500}

  /* chapter list items inside the chapters menu */
  .chapter-item img{width:64px;height:36px;border-radius:6px;object-fit:cover;background:var(--bg2);flex:0 0 auto}
  .chapter-item .ci{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
  .chapter-item .ci-t{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .chapter-item .ci-time{font-size:11px;color:var(--faint);font-weight:500;font-variant-numeric:tabular-nums}

  .mini-bar{display:none}
  .mini-play{display:none}
  #player.min{inset:auto 20px 20px auto;width:380px;height:214px;border-radius:var(--radius-lg);overflow:hidden;
    box-shadow:var(--shadow-lg);border:1px solid var(--line2);background:#000}
  #player.min .p-top,#player.min .p-bottom,#player.min .p-spinner span,#player.min .p-pause{display:none}
  #player.min video{pointer-events:none}
  #player.min video{opacity:1!important}
  #player.min .mini-bar{display:flex;align-items:center;gap:8px;position:absolute;top:0;left:0;right:0;
    z-index:5;padding:8px 10px;background:linear-gradient(to bottom,rgba(0,0,0,.85),transparent);opacity:0;
    transition:opacity .15s}
  #player.min:hover .mini-bar,#player.min:focus-within .mini-bar{opacity:1}
  #player.min .mini-bar .mt{font-size:12px;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
    font-weight:500}
  #player.min .pbtn{width:32px;height:32px;font-size:14px;border-radius:8px}
  #player.min .mini-play{display:flex;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:48px;height:48px;font-size:22px;opacity:0}
  #player.min:hover .mini-play,#player.min:focus-within .mini-play{opacity:1}

  #toast{position:absolute;bottom:110px;left:50%;transform:translate(-50%,10px);z-index:7;
    background:var(--glass);backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    border:1px solid var(--frost-border);box-shadow:var(--frost-shadow);
    padding:10px 20px;border-radius:100px;font-size:13px;font-weight:500;opacity:0;
    transition:opacity .25s var(--ease),transform .25s var(--ease);pointer-events:none;white-space:nowrap}
  #toast.show{opacity:1;transform:translate(-50%,0)}

  .next-up{position:absolute;right:28px;bottom:110px;z-index:6;background:var(--glass);
    backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));-webkit-backdrop-filter:blur(var(--frost-blur-lg)) saturate(var(--frost-sat));
    border:1px solid var(--frost-border);border-radius:var(--radius);padding:16px;
    display:none;gap:16px;width:400px;box-shadow:var(--frost-shadow-lg)}
  .next-up.show{display:flex}
  .next-up img{width:140px;aspect-ratio:16/9;border-radius:var(--radius-xs);object-fit:cover;flex:0 0 auto;
    background:var(--bg2)}
  .nu-body{flex:1;min-width:0}
  .nu-k{font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;font-weight:700}
  .nu-t{font-size:13.5px;font-weight:600;margin:6px 0 12px;line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .nu-actions{display:flex;gap:8px}

  /* ---- RESPONSIVE ---- */
  @media(max-width:900px){
    .searchbox{width:160px}
    .detail-row{padding:calc(var(--pill-clear) + 4px) var(--edge) 32px;gap:28px}
    .detail-poster{width:140px}
    .detail-poster.wide{width:260px}
    .rate-float{padding:10px 12px;border-radius:var(--radius-sm)}
    .rate-stars{gap:5px}
    .rate-stars button{font-size:18px}
    .coll-hero{padding:28px var(--edge)}
    .coll-art{width:160px}
    .carousel .card{width:150px}.carousel .card.wide{width:240px}
    .featured .carousel .card{width:200px}.featured .carousel .card.wide{width:300px}
    .ep-card{width:260px}
    #player.min{width:260px;height:146px;bottom:14px;right:14px}
    .p-pause{padding:0 44px 120px}
    .p-pause-title{font-size:32px}
    .p-pause-logo{max-height:104px}
  }
  /* Below this, even the persistent 240px sidebar column gets too tight
     for both itself and a usable content column, so it becomes an
     off-canvas drawer over a scrim instead. */
  @media(max-width:680px){
    :root{--edge:24px}
    .shell{grid-template-columns:1fr}
    .sidebar{position:fixed;left:0;top:0;bottom:0;width:248px;transform:translateX(-100%);
      transition:transform .25s var(--ease);box-shadow:var(--shadow-lg)}
    .sidebar.open{transform:translateX(0)}
    .scrim-nav{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:19;display:none}
    .scrim-nav.show{display:block}
    .menu-toggle{display:flex}
  }
  @media(max-width:560px){
    .p-vol{display:none}.p-status{display:none}
    .hero h2{font-size:40px}
    .hero-inner{padding-bottom:36px}
    .next-up{right:12px;left:12px;width:auto;bottom:100px}
    .carousel .card{width:130px}.carousel .card.wide{width:210px}
    .featured .carousel .card{width:170px}
    .detail-info h2{font-size:28px}
    .rate-float{display:none}
    .detail-poster{width:110px}
    .detail-row{flex-wrap:wrap;gap:20px}
    /* On phones the thumbnail stacks back on top of the info column. */
    .detail-poster.wide{width:100%;order:-1}
    .ep-card{width:220px}
    .coll-art{width:120px}
    .coll-hero{gap:20px}
    .ep-row{gap:10px;padding:8px 4px}
    .ep-row-num{flex:0 0 18px;font-size:12px}
    .ep-row-thumb{flex:0 0 96px}
    .ep-row-dur{font-size:12px;padding-left:8px}
    .lib-toolbar .lib-title{font-size:18px}
    .lib-ctrl .cap{display:none}
    .lib-menu{max-width:calc(100vw - 24px)}

    /* Collapse the floating search to a glass icon button; it expands to a
       pill once focused so it doesn't dominate small screens. */
    .searchbox{width:44px;padding:0;justify-content:center;cursor:pointer}
    .searchbox input{width:0;opacity:0;transition:width .2s var(--ease),opacity .2s var(--ease)}
    .searchbox:focus-within{width:min(72vw,260px);padding:0 16px;justify-content:flex-start}
    .searchbox:focus-within input{width:100%;opacity:1;margin-left:8px}

    /* Player chrome: tighten controls so nothing overflows narrow screens. */
    .pbtn{width:38px;height:38px;font-size:16px;border-radius:10px}
    .p-top{padding:14px 12px}
    .p-bottom{padding:8px 12px max(16px,env(safe-area-inset-bottom))}
    .p-controls{gap:2px}
    .p-pause{padding:0 22px 108px;gap:8px}
    .p-pause-logo{max-height:72px;max-width:60vw}
    .p-pause-title{font-size:22px}
    .p-pause-sub{font-size:12px}
    .p-pause-desc{font-size:13px;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
    .p-pause-resume{padding:10px 20px;font-size:14px}
    .p-controls .p-divider{display:none}
    .p-time{font-size:12px;margin:0 4px}
    #pipBtn{display:none}
    .p-menu{min-width:220px;max-width:calc(100vw - 24px)}
    .p-menu.chapters{right:12px;min-width:0;max-width:calc(100vw - 24px)}
  }
</style>
</head>
<body>

<a href="#content" class="skip-link">Skip to content</a>

<!-- Ambient UltraBlur underlay: a single fixed, blurred color wash derived
     from the current page's artwork. Hidden on flat grid/list pages. -->
<div id="ultraBlur" aria-hidden="true">
  <div class="ub-layer" id="ubA"></div>
  <div class="ub-layer" id="ubB"></div>
  <div class="ub-scrim"></div>
</div>

<!-- LOGIN -->
<div id="login">
  <div class="logo-lockup"><i class="ph-fill ph-popcorn" aria-hidden="true"></i><h1>Hume</h1></div>
  <p>Sign in with your Plex account to stream your video library. Your password never touches this app.</p>
  <button class="btn lg" id="signInBtn"><i class="ph ph-sign-in" aria-hidden="true"></i> Sign in with Plex</button>
  <div id="loginErr" class="err hidden" style="margin:0;max-width:420px" role="alert"></div>
</div>

<!-- SERVERS -->
<div id="servers">
  <h1>Choose a server</h1>
  <div id="serverList"></div>
  <button class="btn glass" id="logoutFromServers" style="margin-top:12px"><span class="svgi" style="--i:url('assets/images/icons/ui/sign-out.svg')" aria-hidden="true"></span> Sign out</button>
</div>

<!-- APP -->
<div id="app">
  <div class="scrim-nav" id="scrimNav"></div>
  <div class="shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand"><i class="ph-fill ph-popcorn" aria-hidden="true"></i><b>Hume</b><span class="ver">v0.4</span></div>
      <nav class="nav" id="nav" aria-label="Main"></nav>
      <div class="sidebar-foot">
        <button class="nav-item" id="logoutBtn"><span class="svgi" style="--i:url('assets/images/icons/ui/sign-out.svg')" aria-hidden="true"></span> Sign out</button>
      </div>
    </aside>
    <main class="main" id="main">
